              items: scoreAndSort(
                D.D_NOT_NOW.map((x, i) => ({
                  key: `D_NOT_NOW:${i}`,
                  text: x.t || x,
                  tags: x.tags || [],
                  idx: i,
                  selected: P.outcomeNotNowIdx === i,
                  threadClass: "thread-recruit",
                })),
                fTags,
              ),
              splitByScore: true,
              onSelect: (dn, i) => {
                P.outcomeNotNowIdx = P.outcomeNotNowIdx === i ? (delete P.outcomeNotNowIdx, undefined) : i;
                P.outcomeSeen = true;
                render();
              },
            });
            // return after not-now
            cols.push({
              id: "outcome_return",
              label: "→ npc returns (4-7s later)",
              deckName: "D_RETURN",
              role: "npc",
              tc: null,
              stepNote: "DECK_RETURN · NPC rejoins · recruited · end",
              pathNote: "good",
              pathNoteText: "returns → recruited",
              items: scoreAndSort(
                D.D_RETURN.map((x, i) => ({
                  key: `D_RETURN:${i}`,
                  text: x.t || x,
                  tags: x.tags || [],
                  idx: i,
                  selected: P.outcomeReturnIdx === i,
                  threadClass: "thread-terminal",
                })),
                fTags,
              ),
              splitByScore: true,
              onSelect: (dn, i) => {
                P.outcomeReturnIdx = P.outcomeReturnIdx === i ? (delete P.outcomeReturnIdx, undefined) : i;
                render();
              },
            });
          }
        }

        return cols;
      }

      // ── clear helpers ──
      const CLEAR_ORDER = [
        "greetIdx",
        "tone",
        "npcType",
        "prefixIdx",
        "helloIdx",
        "helloDN",
        "helloTags",
        "pitchDeck",
        "pitchIdx",
        "pitchTags",
        "isBoEarly",
        "walkedAway",
        "fillerIdx",
        "fillerSeen",
        "fInviteIdx",
        "smDeck",
        "smIdx",
        "smTags",
        "joinedEarly",
        "strongerDeck",
        "strongerIdx",
        "isBOLate",
        "outcomeSeen",
        "outcomeJoinIdx",
        "outcomeNotNowIdx",
        "outcomeReturnIdx",
      ];
      function _clearFrom(key) {
        const idx = CLEAR_ORDER.indexOf(key);
        if (idx === -1) return;
        CLEAR_ORDER.slice(idx).forEach((k) => delete P[k]);
      }

      function scrollColTop(colId) {
        setTimeout(() => {
          const col = document.querySelector(`.col[data-col-id="${colId}"]`);
          if (col) {
            const b = col.querySelector(".col-body");
            if (b) b.scrollTop = 0;
          }
        }, 30);
      }

      function render() {
        renderFlowBar();
        updateBC();
        const wrap = document.getElementById("cols");
        const sc = document.getElementById("cols-scroll");
        const scrolls = {};
        wrap.querySelectorAll(".col").forEach((c) => {
          const b = c.querySelector(".col-body");
          if (b) scrolls[c.dataset.colId] = b.scrollTop;
        });
        const hx = sc.scrollLeft;
        wrap.innerHTML = "";
        buildCols().forEach((cd) => {
          const el = buildColEl(cd);
          el.dataset.colId = cd.id;
          wrap.appendChild(el);
        });
        sc.scrollLeft = hx;
        wrap.querySelectorAll(".col").forEach((c) => {
          const b = c.querySelector(".col-body");
          if (b && scrolls[c.dataset.colId]) b.scrollTop = scrolls[c.dataset.colId];
        });
        if (EDIT_KEY)
          setTimeout(() => {
            const el = document.querySelector(`[data-key="${EDIT_KEY}"]`);
            if (el) {
              el.scrollIntoView({ behavior: "smooth", block: "nearest" });
              const ta = el.querySelector("textarea");
              if (ta) {
                ta.focus();
                ta.setSelectionRange(ta.value.length, ta.value.length);
              }
            }
          }, 60);
        if (lastFocusColId)
          setTimeout(() => {
            const col = document.querySelector(`.col[data-col-id="${lastFocusColId}"]`);
            if (col) {
              const fi = col.querySelector("input[placeholder='filter…']");
              if (fi) {
                fi.focus();
                const l = fi.value.length;
                fi.setSelectionRange(l, l);
              }
            }
            lastFocusColId = null;
          }, 60);
        renderScriptPanel();
      }

      // ── script panel ──────────────────────────────────────────────────────────
      let scriptPanelOpen = false;

      function toggleScriptPanel() {
        scriptPanelOpen = !scriptPanelOpen;
        document.getElementById("script-panel").classList.toggle("open", scriptPanelOpen);
        document.getElementById("script-toggle").textContent = scriptPanelOpen ? "script ▼" : "script ▲";
        if (scriptPanelOpen) renderScriptPanel();
      }

      // keyboard shortcut: S toggles panel
      document.addEventListener("keydown", (e) => {
        if (e.key === "s" && !e.metaKey && !e.ctrlKey && !e.target.matches("input,textarea")) toggleScriptPanel();
      });

      function spLine(speaker, text, cls, tags, prevTags) {
        // speaker: "player" | "npc"
        // text: string
        // cls: "" | "placeholder" | "missing"
        // tags: tags on this item (forwarded to next)
        // prevTags: tags from previous item (used to check if this matched)
        const wrap = document.createElement("div");
        wrap.className = "sp-line";

        const sp = document.createElement("div");
        sp.className = `sp-speaker ${speaker}`;
        sp.textContent = speaker === "player" ? "PLAYER" : "NPC";
        wrap.appendChild(sp);

        const tx = document.createElement("div");
        tx.className = `sp-text ${cls}`;
        tx.textContent = text;
        wrap.appendChild(tx);

        // tag row: show match status against prevTags, then forward tags
        if ((prevTags && prevTags.length) || (tags && tags.length)) {
          const tr = document.createElement("div");
          tr.className = "sp-tags";

          // did this line match any of the previous tags?
          if (prevTags && prevTags.length && tags && tags.length && cls === "") {
            const matched = tags.some((t) => prevTags.includes(t));
            const sharedTags = tags.filter((t) => prevTags.includes(t));
            const missTags = prevTags.filter((t) => !tags.includes(t));
            if (matched) {
              sharedTags.forEach((t) => {
                const s = document.createElement("span");
                s.className = "sp-tag match";
                s.textContent = "✓ " + t;
                tr.appendChild(s);
              });
            } else {
              // show what we were looking for vs what we got
              prevTags.slice(0, 3).forEach((t) => {
                const s = document.createElement("span");
                s.className = "sp-tag miss";
                s.textContent = "✗ " + t;
                tr.appendChild(s);
              });
            }
          }

          // forward tags (what the next line should match)
          if (tags && tags.length && cls === "") {
            const fwdTags = tags.filter((t) => !(prevTags || []).includes(t));
            fwdTags.slice(0, 3).forEach((t) => {
              const s = document.createElement("span");
              s.className = "sp-tag fwd";
              s.textContent = "→ " + t;
              tr.appendChild(s);
            });
          }

          if (tr.children.length) wrap.appendChild(tr);
        }

        return wrap;
      }

      function spPlaceholder(speaker, label) {
        return spLine(speaker, "[ " + label + " ]", "placeholder", [], []);
      }

      function spMissing(speaker, label) {
        return spLine(speaker, "✗ " + label, "missing", [], []);
      }

      function spDivider() {
        const d = document.createElement("div");
        d.className = "sp-divider";
        return d;
      }

      function renderScriptPanel() {
        const body = document.getElementById("script-panel-body");
        if (!body) return;
        body.innerHTML = "";

        // nothing selected yet
        if (P.greetIdx == null) {
          const e = document.createElement("div");
          e.className = "sp-empty";
          e.textContent = "select a greeting to begin.";
          body.appendChild(e);
          return;
        }

        // helper: get item text and tags from a deck by index
        function itemAt(dn, idx) {
          if (idx == null || !D[dn]) return null;
          const x = D[dn][idx];
          if (!x) return null;
          const text = typeof x === "string" ? x : x.t || (x.join ? `"${x.join}" / "${x.consent}"` : "");
          const tags = (typeof x === "object" ? x.tags : null) || [];
          return { text, tags };
        }

        let prevTags = [];

        // ── PLAYER GREET ──
        const greet = D.P_GREET[P.greetIdx];
        const greetTags = greet.tags || [];
        body.appendChild(spLine("player", greet.t, "", greetTags, []));
        prevTags = greetTags.filter((t) => !["casual", "concerned", "direct"].includes(t));

        // ── NPC PREFIX + HELLO ──
        if (P.helloIdx == null) {
          body.appendChild(spPlaceholder("npc", "hello — not chosen"));
        } else {
          const helloDN = P.helloDN;
          const helloItem = D[helloDN][P.helloIdx];
          const helloText = helloItem.t || helloItem;
          const helloTags = helloItem.tags || [];
          // prefix
          const tone = P.tone || "casual";
          const kind = P.npcType === "narc" ? "narc" : P.npcType || "hungry";
          const prefixPool = D[`PREFIX_${tone}_${kind}`] || [];
          const prefixText = prefixPool.length ? (prefixPool[0].t || prefixPool[0]) + " — " : "";
          body.appendChild(spLine("npc", prefixText + helloText, "", helloTags, prevTags));
          prevTags = helloTags;
        }

        body.appendChild(spDivider());

        // ── PLAYER PITCH ──
        if (P.pitchDeck == null) {
          body.appendChild(spPlaceholder("player", "pitch — not chosen"));
        } else if (P.pitchDeck === "D_BACK_OFF_EARLY") {
          const item = itemAt("D_BACK_OFF_EARLY", P.pitchIdx);
          body.appendChild(spLine("player", item ? item.text : "[ bail ]", "", [], prevTags));
          body.appendChild(spDivider());
          // bail path
          body.appendChild(spPlaceholder("npc", "bail response"));
          const end = document.createElement("div");
          end.className = "sp-text missing";
          end.textContent = "— end —";
          body.appendChild(end);
          return;
        } else if (P.pitchDeck === "DECK_BAD_READ") {
          const item = itemAt("DECK_BAD_READ", P.pitchIdx);
          body.appendChild(spLine("player", item ? item.text : "[ bad read ]", "", item ? item.tags : [], prevTags));
          body.appendChild(spDivider());
          const mdn = P.npcType === "hungry" ? "DECK_MISMATCH_TOO_STRUCTURAL" : "DECK_MISMATCH_TOO_LITERAL";
          body.appendChild(spMissing("npc", "mismatch + no/bye → end"));
          return;
        } else {
          const item = itemAt(P.pitchDeck, P.pitchIdx);
          if (item) {
            body.appendChild(spLine("player", item.text, "", item.tags, prevTags));
            prevTags = item.tags;
          } else {
            body.appendChild(spPlaceholder("player", "pitch — not chosen"));
          }
        }

        body.appendChild(spDivider());

        // ── NPC FILLER ──
        if (P.fillerIdx == null) {
          body.appendChild(spPlaceholder("npc", `filler — needs tag: ${prevTags[0] || "?"}`));
        } else {
          const item = itemAt("D_FILLER", P.fillerIdx);
          if (item) {
            body.appendChild(spLine("npc", item.text, "", item.tags, prevTags));
            prevTags = item.tags;
          }
        }

        // ── PLAYER RECRUIT / WALK ──
        if (P.fInviteIdx == null) {
          body.appendChild(spPlaceholder("player", "recruit or walk — not chosen"));
        } else if (P.walkedAway) {
          const item = itemAt("D_BACK_OFF_EARLY", P.fInviteIdx);
          body.appendChild(spLine("player", item ? item.text : "[ walk away ]", "", [], prevTags));
          const end = document.createElement("div");
          end.className = "sp-text missing";
          end.textContent = "— end —";
          body.appendChild(end);
          return;
        } else {
          const item = itemAt("D_F_INVITE", P.fInviteIdx);
          if (item) {
            body.appendChild(spLine("player", item.text, "", item.tags, prevTags));
            prevTags = item.tags;
          }
        }

        body.appendChild(spDivider());

        // ── NPC RESPONSE ──
        if (P.smDeck == null) {
          body.appendChild(spPlaceholder("npc", `response — needs tag: ${prevTags[0] || "?"}`));
          return;
        }

        if (P.smDeck === "D_JOIN_CONSENT_PAIRS") {
          const item = D.D_JOIN_CONSENT_PAIRS[P.smIdx];
          if (item) {
            body.appendChild(spLine("npc", `"${item.join}"`, "", item.tags || [], prevTags));
            body.appendChild(spLine("npc", `"${item.consent}"`, "", [], []));
          }
          const end = document.createElement("div");
          end.className = "sp-text";
          end.style.color = "#4a9a68";
          end.style.marginTop = "8px";
          end.textContent = "✓ recruited";
          body.appendChild(end);
          return;
        }

        const smItem = itemAt(P.smDeck, P.smIdx);
        if (smItem) {
          const label = P.smDeck === "D_SAY_MORE_SKEPTICAL" ? "[skeptical] " : "[say more] ";
          body.appendChild(spLine("npc", label + smItem.text, "", smItem.tags, prevTags));
          prevTags = smItem.tags.length ? smItem.tags : prevTags;
        }

        body.appendChild(spDivider());

        // ── PLAYER STRONGER PITCH ──
        if (P.strongerDeck == null) {
          body.appendChild(spPlaceholder("player", `stronger pitch — needs tag: ${prevTags[0] || "?"}`));
          return;
        }

        if (P.strongerDeck === "D_BACK_OFF_LATE") {
          const item = itemAt("D_BACK_OFF_LATE", P.strongerIdx);
          body.appendChild(spLine("player", item ? item.text : "[ walk late ]", "", [], prevTags));
          const end = document.createElement("div");
          end.className = "sp-text missing";
          end.textContent = "— end —";
          body.appendChild(end);
          return;
        }

        const strongerItem = itemAt("DECK_STRONGER_PITCH", P.strongerIdx);
        if (strongerItem) {
          body.appendChild(spLine("player", strongerItem.text, "", strongerItem.tags, prevTags));
          prevTags = strongerItem.tags;
        }

        body.appendChild(spDivider());

        // ── OUTCOME ──
        if (P.npcType === "narc") {
          body.appendChild(spPlaceholder("npc", "narc reveal → heat +1"));
        } else {
          // 60% join path
          const joinLabel = document.createElement("div");
          joinLabel.className = "sp-speaker npc";
          joinLabel.textContent = "NPC  60% · join";
          body.appendChild(joinLabel);
          if (P.outcomeJoinIdx != null) {
            const jItem = D.D_JOIN_CONSENT_PAIRS[P.outcomeJoinIdx];
            if (jItem) {
              body.appendChild(spLine("npc", `"${jItem.join}"`, "", jItem.tags || [], prevTags));
              body.appendChild(spLine("npc", `"${jItem.consent}"`, "", [], []));
              const rec = document.createElement("div");
              rec.className = "sp-text";
              rec.style.color = "#4a9a68";
              rec.style.marginTop = "4px";
              rec.textContent = "✓ recruited";
              body.appendChild(rec);
            }
          } else {
            body.appendChild(spPlaceholder("npc", `join — needs tag: ${prevTags[0] || "?"}`));
          }

          // 40% not-now path
          const notNowLabel = document.createElement("div");
          notNowLabel.className = "sp-speaker npc";
          notNowLabel.style.marginTop = "12px";
          notNowLabel.textContent = "NPC  40% · not now → returns";
          body.appendChild(notNowLabel);
          if (P.outcomeNotNowIdx != null) {
            const nnItem = D.D_NOT_NOW[P.outcomeNotNowIdx];
            if (nnItem) {
              body.appendChild(spLine("npc", nnItem.t || nnItem, "", nnItem.tags || [], prevTags));
            }
          } else {
            body.appendChild(spPlaceholder("npc", `not now — needs tag: ${prevTags[0] || "?"}`));
          }
          if (P.outcomeReturnIdx != null) {
            const retItem = D.D_RETURN[P.outcomeReturnIdx];
            if (retItem) {
              body.appendChild(spLine("npc", retItem.t || retItem, "", retItem.tags || [], []));
              const rec2 = document.createElement("div");
              rec2.className = "sp-text";
              rec2.style.color = "#4a9a68";
              rec2.style.marginTop = "4px";
              rec2.textContent = "✓ recruited";
              body.appendChild(rec2);
            }
          } else if (P.outcomeNotNowIdx != null) {
            body.appendChild(spPlaceholder("npc", "return line — not chosen"));
          }
        }
      }

      function buildColEl(cd) {
        const el = document.createElement("div");
        let cls = "col";
        if (cd.isBrowse) cls += " browse";
        if (cd.role) cls += " " + cd.role;
        if (cd.isEndCol) cls += " end-col";
        if (cd.tc) cls += ` tc-${cd.tc}`;
        el.className = cls;

        const hdr = document.createElement("div");
        hdr.className = "col-hdr";
        const lbl = document.createElement("span");
        lbl.className = "col-hdr-label";
        lbl.textContent = cd.label;
        hdr.appendChild(lbl);

        const filterIn = document.createElement("input");
        filterIn.placeholder = "filter…";
        filterIn.value = colFilters[cd.id] || "";
        filterIn.style.cssText =
          "font-family:Courier New,monospace;font-size:1rem;padding:2px 6px;background:#faf8f2;border:1px solid var(--border2);color:var(--text);border-radius:2px;width:80px;outline:none;";
        filterIn.addEventListener("input", () => {
          colFilters[cd.id] = filterIn.value;
          lastFocusColId = cd.id;
          render();
        });
        filterIn.addEventListener("click", (e) => e.stopPropagation());
        hdr.appendChild(filterIn);

        if (cd.clearKey && !cd.locked) {
          const clr = document.createElement("button");
          clr.style.cssText =
            "background:none;border:none;cursor:pointer;font-family:Courier New,monospace;font-size:9px;color:var(--dim);padding:2px 4px;letter-spacing:1px;text-transform:uppercase;";
          clr.textContent = "✕ clear";
          clr.title = "clear this selection and all downstream";
          clr.onmouseenter = () => (clr.style.color = "var(--danger)");
          clr.onmouseleave = () => (clr.style.color = "var(--dim)");
          clr.onclick = (e) => {
            e.stopPropagation();
            (cd.clearKey || []).forEach((k) => delete P[k]);
            render();
          };
          hdr.appendChild(clr);
        }
        el.appendChild(hdr);

        if (cd.stepNote) {
          const sn = document.createElement("div");
          sn.className = "col-path-note";
          sn.textContent = cd.stepNote;
          el.appendChild(sn);
        }
        if (cd.pathNote) {
          const pn = document.createElement("div");
          pn.className = `col-path-note ${cd.pathNote}`;
          pn.textContent = cd.pathNoteText || "";
          el.appendChild(pn);
        }

        const prog = document.createElement("div");
        prog.className = "col-prog";
        const pb = document.createElement("div");
        pb.className = "col-prog-bar";
        const all = cd.items ? cd.items : (cd.sections || []).flatMap((s) => s.items);
        pb.style.width = all.length ? `${(all.filter((x) => x.key && vis(x.key)).length / all.length) * 100}%` : "0%";
        prog.appendChild(pb);
        el.appendChild(prog);

        const body = document.createElement("div");
        body.className = "col-body";

        const applyFilter = (items) => {
          const q = (colFilters[cd.id] || "").toLowerCase().trim();
          if (!q) return items;
          return items.filter((x) => (x.text || "").toLowerCase().includes(q) || (x.tags || []).some((t) => t.toLowerCase().includes(q)));
        };

        // render items with optional score-split (matched / unmatched toggle)
        const renderItems = (target, items, deckName, opts = {}) => {
          items = applyFilter(items);
          const anySelected = items.some((x) => x.selected);
          const tc = opts.threadClass;
          const splitByScore = opts.splitByScore;

          if (splitByScore && items.length) {
            const matched = items.filter((x) => x.score > 0);
            const unmatched = items.filter((x) => !x.score || x.score === 0);
            matched.forEach((item) => target.appendChild(makeItemEl(item, deckName, cd.onSelect, anySelected, tc)));
            if (unmatched.length) {
              const ukKey = `${cd.id}::${deckName}::unmatched`;
              const open = isUnmatchedOpen(ukKey);
              const tog = document.createElement("div");
              tog.className = "unmatched-toggle";
              tog.innerHTML = `<span>${open ? "▾" : "▸"}</span><span>${open ? "hide" : "show"} ${unmatched.length} unmatched</span>`;
              tog.onclick = (e) => {
                e.stopPropagation();
                toggleUnmatched(ukKey);
              };
              target.appendChild(tog);
              const uw = document.createElement("div");
              uw.className = "unmatched-items" + (open ? "" : " hidden");
              unmatched.forEach((item) => uw.appendChild(makeItemEl(item, deckName, cd.onSelect, anySelected, tc)));
              target.appendChild(uw);
            }
          } else {
            items.forEach((item) => target.appendChild(makeItemEl(item, deckName, cd.onSelect, anySelected, tc)));
          }
        };

        if (cd.sections) {
          cd.sections.forEach((sec) => {
            const collapsed = isSec(cd.id, sec.label);
            const sep = document.createElement("div");
            sep.className = "section-sep" + (sec.secTc ? " " + sec.secTc : "");
            const sl = document.createElement("span");
            sl.textContent = sec.label;
            const st = document.createElement("span");
            st.className = "sec-tog";
            st.textContent = collapsed ? "▸" : "▾";
            sep.appendChild(sl);
            sep.appendChild(st);
            sep.onclick = () => toggleSec(cd.id, sec.label);
            body.appendChild(sep);
            const sw = document.createElement("div");
            sw.className = "section-items" + (collapsed ? " collapsed-sec" : "");
            if (sec.deckName) sw.appendChild(makeAddBtn(sec.deckName));
            renderItems(sw, sec.items, sec.deckName, { threadClass: sec.threadClass, splitByScore: sec.splitByScore });
            body.appendChild(sw);
          });
        } else if (cd.items) {
          if (cd.deckName && !cd.isEndCol) body.appendChild(makeAddBtn(cd.deckName));
          renderItems(body, cd.items, cd.deckName, { threadClass: cd.items[0] && cd.items[0].threadClass, splitByScore: cd.splitByScore });
        }
        el.appendChild(body);
        return el;
      }

      function makeItemEl(item, deckName, onSelect, anySelected, forceThreadClass) {
        const el = document.createElement("div");
        if (item.isEnd) {
          el.className = "end-note" + (item.endGood ? " good" : item.endBad ? " bad" : "");
          el.textContent = item.text;
          return el;
        }
        const dn = deckName || item.deckName;

        let cls = "item ";
        cls += vis(item.key) ? "visited " : "unvisited ";
        if (item.selected && item.inferred) cls += "inferred ";
        else if (item.selected) cls += "selected ";
        else if (anySelected) cls += "other ";
        if (dn === "DECK_ANGRY_HELLO" || dn === "DECK_ANGRY_PITCH") cls += "angry ";
        if (dn === "DECK_HUNGRY_HELLO" || dn === "DECK_HUNGRY_PITCH") cls += "hungry ";

        // thread right-border class
        const tc = forceThreadClass || item.threadClass;
        if (tc) cls += tc + " ";

        el.className = cls.trim();
        el.dataset.key = item.key;

        if (EDIT_KEY === item.key && dn) {
          buildEditMode(el, item, dn);
          return el;
        }

        if (dn) {
          const eh = document.createElement("span");
          eh.className = "edit-hint";
          eh.textContent = "✎";
          el.appendChild(eh);
        }

        const tt = document.createElement("div");
        tt.className = "item-text";
        if (item.italic) tt.style.fontStyle = "italic";
        tt.textContent = item.text;
        el.appendChild(tt);

        const meta = document.createElement("div");
        meta.className = "item-meta";
        if (item.badge) {
          const b = document.createElement("span");
          b.className = `badge b-${item.badge}`;
          b.textContent = item.badge;
          meta.appendChild(b);
        }
        // always show tags (including on join-consent pairs)
        tagsOf(item).forEach((t) => {
          const s = document.createElement("span");
          s.className = "tag";
          s.textContent = t;
          meta.appendChild(s);
        });
        if (item.follows) {
          const s = document.createElement("span");
          s.className = "tag f";
          s.textContent = "→" + item.follows;
          meta.appendChild(s);
        }
        if (meta.children.length) el.appendChild(meta);

        if (item.score != null && item.score > 0) {
          const sb = document.createElement("span");
          sb.className = `score-badge score-${item.score}`;
          sb.textContent = "tag match ✓";
          const sr = document.createElement("div");
          sr.style.marginTop = "4px";
          sr.appendChild(sb);
          el.appendChild(sr);
        }

        let ct = null;
        el.addEventListener("click", (e) => {
          if (e.target.closest(".ebtn,.tag-x,.tag-in,.edit-ta,.follows-in")) return;
          clearTimeout(ct);
          ct = setTimeout(() => {
            markV(item.key);
            onSelect(dn, item.idx);
          }, 220);
        });
        el.addEventListener("dblclick", (e) => {
          e.stopPropagation();
          clearTimeout(ct);
          if (!dn) return;
          EDIT_KEY = item.key;
          render();
        });
        return el;
      }

      function buildEditMode(el, item, deckName) {
        const arr = D[deckName];
        if (!arr) return;
        const raw = arr[item.idx];
        const isStr = typeof raw === "string";
        const obj = isStr ? { t: raw } : raw;
        const ta = document.createElement("textarea");
        ta.className = "edit-ta";
        const tv = obj.t || "";
        ta.value = tv;
        ta.rows = Math.max(2, Math.ceil(tv.length / 38));
        el.appendChild(ta);
        const saveText = () => {
          const v = ta.value.trim();
          if (!v) return;
          if (isStr) arr[item.idx] = v;
          else if (obj.t !== undefined) obj.t = v;
          saveData();
        };
        ta.addEventListener("blur", () =>
          setTimeout(() => {
            if (EDIT_KEY !== item.key || el.contains(document.activeElement)) return;
            saveText();
            EDIT_KEY = null;
            render();
          }, 150),
        );

        if (!isStr && obj.tags !== undefined) {
          const tr = document.createElement("div");
          tr.className = "tag-row";
          const refreshTags = () => {
            tr.innerHTML = "";
            (obj.tags || []).forEach((t, ti) => {
              const sp = document.createElement("span");
              sp.className = "tag-e";
              sp.innerHTML = `${esc(t)} <span class="tag-x">×</span>`;
              sp.onclick = (e) => e.stopPropagation();
              sp.querySelector(".tag-x").onclick = (e) => {
                e.stopPropagation();
                e.preventDefault();
                obj.tags.splice(ti, 1);
                saveData();
                refreshTags();
              };
              tr.appendChild(sp);
            });
            const inp = document.createElement("input");
            inp.className = "tag-in";
            inp.placeholder = "+tag";
            tr.appendChild(inp);
            let ac = null;
            inp.addEventListener("input", () => {
              if (ac) {
                ac.remove();
                ac = null;
              }
              const v = inp.value.trim().toLowerCase();
              if (!v) return;
              const m = allTags().filter((t) => t.includes(v) && !(obj.tags || []).includes(t));
              if (!m.length) return;
              ac = document.createElement("div");
              ac.className = "ac";
              el.style.position = "relative";
              m.slice(0, 8).forEach((t) => {
                const d = document.createElement("div");
                d.className = "ac-item";
                d.textContent = t;
                d.onmousedown = (e) => {
                  e.preventDefault();
                  obj.t = ta.value.trim();
                  if (!obj.tags) obj.tags = [];
                  obj.tags.push(t);
                  inp.value = "";
                  saveData();
                  if (ac) {
                    ac.remove();
                    ac = null;
                  }
                  refreshTags();
                };
                ac.appendChild(d);
              });
              el.appendChild(ac);
            });
            inp.addEventListener("keydown", (e) => {
              if (e.key === "Enter" || e.key === ",") {
                e.preventDefault();
                const v = inp.value.replace(/,$/, "").trim();
                if (v) {
                  obj.t = ta.value.trim();
                  if (!obj.tags) obj.tags = [];
                  obj.tags.push(v);
                  inp.value = "";
                  saveData();
                  refreshTags();
                }
              }
              if (e.key === "Escape") {
                EDIT_KEY = null;
                render();
              }
            });
            inp.addEventListener("blur", () =>
              setTimeout(() => {
                if (ac) {
                  ac.remove();
                  ac = null;
                }
              }, 150),
            );
          };
          el.appendChild(tr);
          refreshTags();

          const noF = new Set(["P_GREET", "D_NO_BYE", "D_NOT_NOW", "D_NARC_REVEAL", "D_RETURN", "D_BACK_OFF_EARLY", "D_BACK_OFF_LATE", "D_F_INVITE"]);
          if (!noF.has(deckName)) {
            const fr = document.createElement("div");
            fr.className = "follows-row";
            fr.innerHTML = "<span>follows:</span>";
            const fi = document.createElement("input");
            fi.className = "follows-in";
            fi.value = obj.follows || "";
            fi.placeholder = "tag…";
            const saveF = () => {
              obj.follows = fi.value.trim() || undefined;
              saveData();
            };
            fi.addEventListener("change", saveF);
            fi.addEventListener("blur", saveF);
            let fac = null;
            fi.addEventListener("input", () => {
              if (fac) {
                fac.remove();
                fac = null;
              }
              const v = fi.value.trim().toLowerCase();
              if (!v) return;
              const m = allTags().filter((t) => t.includes(v));
              if (!m.length) return;
              fac = document.createElement("div");
              fac.className = "ac";
              el.style.position = "relative";
              m.slice(0, 8).forEach((t) => {
                const d = document.createElement("div");
                d.className = "ac-item";
                d.textContent = t;
                d.onmousedown = (e2) => {
                  e2.preventDefault();
                  fi.value = t;
                  obj.follows = t;
                  saveData();
                  if (fac) {
                    fac.remove();
                    fac = null;
                  }
                };
                fac.appendChild(d);
              });
              fr.style.position = "relative";
              fr.appendChild(fac);
            });
            fi.addEventListener("blur", () =>
              setTimeout(() => {
                if (fac) {
                  fac.remove();
                  fac = null;
                }
              }, 150),
            );
            fi.addEventListener("keydown", (e) => {
              if (e.key === "Escape") {
                if (fac) {
                  fac.remove();
                  fac = null;
                }
              }
            });
            fr.appendChild(fi);
            el.appendChild(fr);
          }
        }

        if (deckName === "D_JOIN_CONSENT_PAIRS") {
          el.innerHTML = "";
          if (!obj.tags) obj.tags = [];
          const f1 = document.createElement("textarea");
          f1.className = "edit-ta";
          f1.value = obj.join || "";
          f1.rows = 2;
          f1.placeholder = "join phrase…";
          const f2 = document.createElement("textarea");
          f2.className = "edit-ta";
          f2.value = obj.consent || "";
          f2.rows = 1;
          f2.placeholder = "consent phrase…";
          f2.style.marginTop = "4px";
          el.appendChild(f1);
          el.appendChild(f2);
          // tag editing for join consent
          const tr = document.createElement("div");
          tr.className = "tag-row";
          const refreshJCTags = () => {
            tr.innerHTML = "";
            (obj.tags || []).forEach((t, ti) => {
              const sp = document.createElement("span");
              sp.className = "tag-e";
              sp.innerHTML = `${esc(t)} <span class="tag-x">×</span>`;
              sp.onclick = (e) => e.stopPropagation();
              sp.querySelector(".tag-x").onclick = (e) => {
                e.stopPropagation();
                e.preventDefault();
                obj.tags.splice(ti, 1);
                saveData();
                refreshJCTags();
              };
              tr.appendChild(sp);
            });
            const inp = document.createElement("input");
            inp.className = "tag-in";
            inp.placeholder = "+tag";
            tr.appendChild(inp);
            let ac = null;
            inp.addEventListener("input", () => {
              if (ac) {
                ac.remove();
                ac = null;
              }
              const v = inp.value.trim().toLowerCase();
              if (!v) return;
              const m = allTags().filter((t) => t.includes(v) && !(obj.tags || []).includes(t));
              if (!m.length) return;
              ac = document.createElement("div");
              ac.className = "ac";
              el.style.position = "relative";
              m.slice(0, 8).forEach((t) => {
                const d = document.createElement("div");
                d.className = "ac-item";
                d.textContent = t;
                d.onmousedown = (e) => {
                  e.preventDefault();
                  if (!obj.tags) obj.tags = [];
                  obj.tags.push(t);
                  inp.value = "";
                  saveData();
                  if (ac) {
                    ac.remove();
                    ac = null;
                  }
                  refreshJCTags();
                };
                ac.appendChild(d);
              });
              el.appendChild(ac);
            });
            inp.addEventListener("keydown", (e) => {
              if (e.key === "Enter" || e.key === ",") {
                e.preventDefault();
                const v = inp.value.replace(/,$/, "").trim();
                if (v) {
                  if (!obj.tags) obj.tags = [];
                  obj.tags.push(v);
                  inp.value = "";
                  saveData();
                  refreshJCTags();
                }
              }
              if (e.key === "Escape") {
                EDIT_KEY = null;
                render();
              }
            });
            inp.addEventListener("blur", () =>
              setTimeout(() => {
                if (ac) {
                  ac.remove();
                  ac = null;
                }
              }, 150),
            );
          };
          el.appendChild(tr);
          refreshJCTags();
          const saveJC = () =>
            setTimeout(() => {
              if (el.contains(document.activeElement)) return;
              obj.join = f1.value.trim();
              obj.consent = f2.value.trim();
              saveData();
              EDIT_KEY = null;
              render();
            }, 150);
          f1.addEventListener("blur", saveJC);
          f2.addEventListener("blur", saveJC);
          const acts = document.createElement("div");
          acts.className = "edit-acts";
          const sv = document.createElement("button");
          sv.className = "ebtn save";
          sv.textContent = "save";
          sv.onclick = () => {
            obj.join = f1.value.trim();
            obj.consent = f2.value.trim();
            saveData();
            EDIT_KEY = null;
            render();
          };
          const cn = document.createElement("button");
          cn.className = "ebtn cancel";
          cn.textContent = "cancel";
          cn.onclick = () => {
            EDIT_KEY = null;
            render();
          };
          const dl = document.createElement("button");
          dl.className = "ebtn del";
          dl.textContent = "delete";
          dl.onclick = () => {
            if (!confirm("delete?")) return;
            arr.splice(item.idx, 1);
            saveData();
            EDIT_KEY = null;
            render();
          };
          acts.appendChild(sv);
          acts.appendChild(cn);
          acts.appendChild(dl);
          el.appendChild(acts);
          return;
        }

        const acts = document.createElement("div");
        acts.className = "edit-acts";
        const sv = document.createElement("button");
        sv.className = "ebtn save";
        sv.textContent = "save";
        sv.onclick = () => {
          saveText();
          EDIT_KEY = null;
          render();
        };
        const cn = document.createElement("button");
        cn.className = "ebtn cancel";
        cn.textContent = "cancel";
        cn.onclick = () => {
          EDIT_KEY = null;
          render();
        };
        const dl = document.createElement("button");
        dl.className = "ebtn del";
        dl.textContent = "delete";
        dl.onclick = () => {
          if (!confirm("delete?")) return;
          arr.splice(item.idx, 1);
          saveData();
          EDIT_KEY = null;
          render();
        };
        acts.appendChild(sv);
        acts.appendChild(cn);
        acts.appendChild(dl);
        el.appendChild(acts);
      }

      function makeAddBtn(dn) {
        const btn = document.createElement("button");
        btn.className = "add-btn";
        btn.textContent = "+ add line";
        btn.onclick = (e) => {
          e.stopPropagation();
          e.preventDefault();
          const arr = D[dn];
          if (!arr) return;
          const isPlainDeck = arr.length > 0 && typeof arr[0] === "string";
          const ni =
            dn === "D_JOIN_CONSENT_PAIRS"
              ? { join: "new join phrase", consent: "new consent", tags: [] }
              : isPlainDeck
                ? "new line"
                : { t: "new line", tags: [] };
          arr.unshift(ni);
          saveData();
          EDIT_KEY = `${dn}:0`;
          render();
          setTimeout(() => {
            const el = document.querySelector(`[data-key="${dn}:0"]`);
            if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
          }, 50);
        };
        return btn;
      }

      function updateBC() {
        const parts = [];
        if (P.greetIdx != null) parts.push(D.P_GREET[P.greetIdx].t);
        if (P.npcType) parts.push(P.npcType);
        if (P.helloIdx != null) {
          const dn = P.helloDN || (P.npcType === "narc" ? "D_NARC_HELLO" : P.npcType === "angry" ? "DECK_ANGRY_HELLO" : "DECK_HUNGRY_HELLO");
          const h = D[dn][P.helloIdx];
          const t = h.t || h;
          parts.push('"' + t.slice(0, 28) + (t.length > 28 ? "…" : "") + '"');
        }
        if (P.pitchDeck) parts.push(P.pitchDeck === "D_BACK_OFF_EARLY" ? "[bail]" : P.pitchDeck === "DECK_BAD_READ" ? "[bad read]" : "[pitch]");
        document.getElementById("breadcrumb").textContent = parts.join(" › ") || "select a greeting to begin";
      }

      function esc(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function doExport() {
        const ts = (tags) => (tags && tags.length ? `, tags: [${tags.map((t) => `"${t}"`).join(", ")}]` : `, tags: []`);
        const fs = (f) => (f ? `, follows: "${f}"` : "");
        let out = "";
        const wPlain = (name, arr) => {
          out += `const ${name} = [\n`;
          arr.forEach((x) => {
            out += `  ${JSON.stringify(typeof x === "string" ? x : x.t || x)},\n`;
          });
          out += `];\n\n`;
        };
        wPlain("D_AMB_HUNGRY", D.D_AMB_HUNGRY);
        wPlain("D_AMB_ANGRY", D.D_AMB_ANGRY);
        wPlain("D_AMB_NARC", D.D_AMB_NARC);
        wPlain("D_ACK_HUNGRY_ANGRY", D.D_ACK_HUNGRY_ANGRY);
        wPlain("D_ACK_NARC", D.D_ACK_NARC);
        out += `const P_GREET = [\n`;
        D.P_GREET.forEach((x) => {
          out += `  { t: ${JSON.stringify(x.t)}${ts(x.tags)} },\n`;
        });
        out += `];\n\n`;
        out += `const HELLO_PREFIX = {\n`;
        ["casual", "concerned", "direct"].forEach((tone) => {
          out += `  ${tone}: {\n`;
          ["angry", "hungry", "narc"].forEach((k) => {
            const arr = D[`PREFIX_${tone}_${k}`];
            out += `    ${k}: [${arr.map((x) => JSON.stringify(x.t || x)).join(", ")}],\n`;
          });
          out += `  },\n`;
        });
        out += `};\n\n`;
        out += `const D_NARC_HELLO = [\n`;
        D.D_NARC_HELLO.forEach((x) => {
          out += `  { t: ${JSON.stringify(x.t || x)}${ts(x.tags || [])} },\n`;
        });
        out += `];\n\n`;
        const wArr = (name, arr, deck) => {
          out += `const ${name} = ${deck ? "new DM.Deck(" : ""}[\n`;
          arr.forEach((x) => {
            if (x && x.join !== undefined) {
              const tp = x.tags && x.tags.length ? `, tags: [${x.tags.map((t) => `"${t}"`).join(", ")}]` : "";
              out += `  { join: ${JSON.stringify(x.join)}, consent: ${JSON.stringify(x.consent)}${tp} },\n`;
              return;
            }
            const t = x.t || (typeof x === "string" ? x : "");
            out += `  { t: ${JSON.stringify(t)}${ts(x.tags || [])}${fs(x.follows)} },\n`;
          });
          out += `]${deck ? ")" : ""};\n\n`;
        };
        wArr("DECK_ANGRY_HELLO", D.DECK_ANGRY_HELLO, true);
        wArr("DECK_HUNGRY_HELLO", D.DECK_HUNGRY_HELLO, true);
        wArr("DECK_ANGRY_PITCH", D.DECK_ANGRY_PITCH, true);
        wArr("DECK_HUNGRY_PITCH", D.DECK_HUNGRY_PITCH, true);
        wArr("DECK_BAD_READ", D.DECK_BAD_READ, true);
        wArr("D_F_INVITE", D.D_F_INVITE, false);
        wArr("D_NO_BYE", D.D_NO_BYE, false);
        wArr("D_SAY_MORE_WARM", D.D_SAY_MORE_WARM, true);
        wArr("D_SAY_MORE_SKEPTICAL", D.D_SAY_MORE_SKEPTICAL, true);
        wArr("D_JOIN_CONSENT_PAIRS", D.D_JOIN_CONSENT_PAIRS, false);
        wArr("DECK_MISMATCH_TOO_LITERAL", D.DECK_MISMATCH_TOO_LITERAL, true);
        wArr("DECK_MISMATCH_TOO_STRUCTURAL", D.DECK_MISMATCH_TOO_STRUCTURAL, true);
        wArr("D_BACK_OFF_EARLY", D.D_BACK_OFF_EARLY, true);
        wArr("DECK_BAIL_RESPONSE", D.DECK_BAIL_RESPONSE, true);
        wArr("DECK_STRONGER_PITCH", D.DECK_STRONGER_PITCH, true);
        wArr("D_BACK_OFF_LATE", D.D_BACK_OFF_LATE, true);
        wArr("D_FILLER", D.D_FILLER, true);
        wArr("D_NARC_REVEAL", D.D_NARC_REVEAL, false);
        wArr("D_NOT_NOW", D.D_NOT_NOW, false);
        wArr("D_RETURN", D.D_RETURN, false);
        const blob = new Blob([out], { type: "text/javascript" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "game-data-words.js";
        a.click();
        URL.revokeObjectURL(url);
      }
      function exportJS() {
        doExport();
      }

      (function () {
        const sc = document.getElementById("cols-scroll");
        let down = false,
          sx = 0,
          sl = 0;
        sc.addEventListener("mousedown", (e) => {
          if (e.target.closest(".item,.add-btn,.hbtn,.ebtn,.section-sep")) return;
          down = true;
          sx = e.pageX - sc.offsetLeft;
          sl = sc.scrollLeft;
          sc.classList.add("dragging");
        });
        sc.addEventListener("mouseleave", () => {
          down = false;
          sc.classList.remove("dragging");
        });
        sc.addEventListener("mouseup", () => {
          down = false;
          sc.classList.remove("dragging");
        });
        sc.addEventListener("mousemove", (e) => {
          if (!down) return;
          e.preventDefault();
          sc.scrollLeft = sl - (e.pageX - sc.offsetLeft - sx);
        });
      })();

      window.addEventListener("error", (e) => {
        const b = document.getElementById("error-box");
        b.style.display = "block";
        b.textContent = "error: " + e.message + " — " + e.filename + ":" + e.lineno;
      });

      loadV();
      loadData();
      loadSec();
      render();
    </script>
  </body>
