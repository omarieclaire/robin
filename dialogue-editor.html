<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>dialogue editor</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Robin Hood colour system ──
         Deep forest greens + bread-gold accents + parchment backgrounds.
         High contrast, editorial weight. Inspired by protest-poster legibility.
      ── */
      :root {
        --bg:      #f2efe8;
        --bg2:     #e8e4da;
        --bg3:     #dedad0;
        --bg4:     #cec9be;
        --border:  #b8b3a6;
        --border2: #9e9990;
        --text:    #1c1a14;
        --muted:   #5a5648;
        --dim:     #9e9888;
        --accent:  #7a5c10;       /* bread-gold */
        --accent2: #1e5c30;       /* forest green */
        --danger:  #7a1c1c;
        --hdr-bg:  #1c2818;       /* very dark green header */
        --hdr-text:#e8dfc0;       /* warm parchment on dark */
        --col:     300px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Georgia", "Times New Roman", serif;
        font-size: 13px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── header ── */
      #hdr {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 18px;
        background: var(--hdr-bg);
        border-bottom: 2px solid #3a4a30;
        flex-shrink: 0;
        height: 44px;
      }
      #hdr-title {
        color: #c8b870;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-size: 10px;
        font-family: "Courier New", monospace;
        font-weight: bold;
        white-space: nowrap;
      }
      #breadcrumb {
        flex: 1;
        font-size: 11px;
        font-family: "Courier New", monospace;
        color: #8a9e7a;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        padding: 0 12px;
      }
      .hbtn {
        background: transparent;
        border: 1px solid #4a6040;
        color: #a0b888;
        padding: 5px 13px;
        cursor: pointer;
        font-family: "Courier New", monospace;
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .hbtn:hover { border-color: #c8b870; color: #c8b870; }
      .hbtn.primary { border-color: #c8b870; color: #c8b870; }
      .hbtn.danger  { border-color: #c07070; color: #c07070; }

      /* ── scroll container ── */
      #cols-scroll {
        flex: 1;
        overflow-x: scroll;
        overflow-y: hidden;
        cursor: grab;
        user-select: none;
      }
      #cols-scroll.dragging { cursor: grabbing; }
      #cols-scroll::-webkit-scrollbar { height: 5px; }
      #cols-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

      #cols { display: flex; height: 100%; width: max-content; min-width: 100%; }

      /* ── column ── */
      .col {
        flex-shrink: 0;
        width: var(--col);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }
      .col.locked .col-body   { opacity: 0.28; pointer-events: none; }
      .col.locked .col-hdr-label { color: var(--dim); }

      /* browse columns */
      .col.browse .col-hdr    { background: #2a3420; border-bottom-color: #3a4830; }
      .col.browse .col-hdr-label { color: #7a9860; letter-spacing: 2px; }

      /* divider between flow and browse */
      .col-divider { flex-shrink: 0; width: 3px; background: #3a4830; position: relative; }
      .col-divider-label {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%,-50%) rotate(90deg);
        white-space: nowrap;
        font-size: 8px; font-family: "Courier New", monospace;
        letter-spacing: 2px; text-transform: uppercase;
        color: #7a9860; background: #1c2818; padding: 0 8px;
      }

      .col-hdr {
        display: flex; align-items: center;
        padding: 7px 10px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0; min-height: 34px; gap: 6px;
      }
      .col-hdr-label {
        font-size: 9px; font-family: "Courier New", monospace;
        text-transform: uppercase; letter-spacing: 1.5px;
        color: var(--muted); flex: 1;
        font-weight: bold;
      }

      .col-prog { height: 2px; background: var(--border); flex-shrink: 0; }
      .col-prog-bar { height: 100%; background: var(--accent2); transition: width 0.3s; }

      .col-body { flex: 1; overflow-y: auto; padding: 6px; }
      .col-body::-webkit-scrollbar { width: 3px; }
      .col-body::-webkit-scrollbar-thumb { background: var(--border2); }

      .col-locked-note {
        font-size: 9px; font-family: "Courier New", monospace;
        color: var(--dim); font-style: italic; padding: 8px 6px 4px;
      }

      /* ── append note (D_F_INVITE / D_INVITE shown passively) ── */
      .append-note {
        margin-bottom: 6px; padding: 6px 8px;
        background: #eaf2e2; border: 1px dashed #7aaa58; border-radius: 2px;
        font-size: 10px; font-family: "Courier New", monospace; color: #2a5a18;
      }
      .append-note strong {
        display: block; font-size: 8px; letter-spacing: 1px;
        text-transform: uppercase; color: #4a8030; margin-bottom: 3px;
      }

      /* ── section separators ── */
      .section-sep {
        font-size: 9px; font-family: "Courier New", monospace;
        text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted);
        padding: 7px 4px 4px;
        border-top: 1px solid var(--border); margin-top: 4px;
        display: flex; align-items: center; justify-content: space-between;
        cursor: pointer; user-select: none; font-weight: bold;
      }
      .section-sep:first-child { border-top: none; margin-top: 0; padding-top: 4px; }
      .section-sep:hover { color: var(--accent); }
      .section-sep .sec-tog { font-size: 11px; color: var(--muted); margin-left: 6px; flex-shrink: 0; }
      .section-items.collapsed-sec { display: none; }

      /* ── items ── */
      .item {
        padding: 9px 11px; margin-bottom: 4px;
        border: 1px solid var(--border);
        background: #faf8f2;
        cursor: pointer; border-radius: 2px; position: relative;
      }
      .item:hover:not(.editing) { border-color: var(--border2); background: #f5f2e8; }
      .item.selected { border-color: var(--accent); background: #fdf5d8; }
      .item.dimmed   { opacity: 0.3; }
      .item.angry    { border-left: 3px solid #b05050; }
      .item.hungry   { border-left: 3px solid #b08820; }
      .item.unvisited .item-text { font-weight: bold; color: var(--text); }
      .item.visited .item-text   { color: var(--dim); }

      .item-text  { line-height: 1.6; font-size: 13px; color: var(--text); }
      .item-meta  { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 3px; align-items: center; }

      .tag {
        font-size: 9px; padding: 1px 5px; font-family: "Courier New", monospace;
        background: var(--bg4); color: var(--muted);
        border: 1px solid var(--border2); border-radius: 2px; letter-spacing: 0.5px;
      }
      .tag.f { background: #d0eccc; color: #1a5218; border-color: #8acc88; }

      .badge {
        font-size: 9px; padding: 1px 6px; font-family: "Courier New", monospace;
        border-radius: 2px; letter-spacing: 1px; text-transform: uppercase; border: 1px solid;
      }
      .b-angry  { background: #fdf0e0; color: #804010; border-color: #d0a070; }
      .b-hungry { background: #e0eef8; color: #104080; border-color: #80a8d0; }
      .b-narc   { background: #f0e0f8; color: #500888; border-color: #b878d8; }

      .score-badge {
        font-size: 9px; padding: 1px 5px; font-family: "Courier New", monospace;
        border-radius: 2px; border: 1px solid; letter-spacing: 0.5px;
      }
      .score-4  { background: #d0eccc; color: #1a5218; border-color: #8acc88; }
      .score-2  { background: #f0e8c0; color: #504010; border-color: #c8b860; }
      .score-0  { background: var(--bg4); color: var(--muted); border-color: var(--border2); }
      .score-n2 { background: #f0e0c8; color: #805028; border-color: #c8a878; }

      .score-divider {
        font-size: 8px; font-family: "Courier New", monospace;
        text-transform: uppercase; letter-spacing: 1px;
        padding: 5px 4px 2px; color: var(--muted);
        border-top: 1px dashed var(--border); margin-top: 2px;
      }

      .end-note {
        padding: 9px; font-size: 11px; font-family: "Courier New", monospace;
        color: var(--muted); font-style: italic;
        border: 1px dashed var(--border2); margin-bottom: 4px; border-radius: 2px;
      }

      /* ── edit mode ── */
      .item.editing { border-color: var(--accent2); background: #eaf4e8; }
      .edit-ta {
        width: 100%; background: #faf8f2; border: 1px solid var(--border2);
        color: var(--text); font-family: "Georgia", serif; font-size: 13px;
        resize: vertical; min-height: 52px; padding: 5px; outline: none;
        line-height: 1.6; border-radius: 2px;
      }
      .edit-ta:focus { border-color: var(--accent2); }
      .tag-row { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; align-items: center; }
      .tag-e {
        font-size: 9px; padding: 1px 5px; font-family: "Courier New", monospace;
        background: #fdf5d8; color: var(--accent); border: 1px solid var(--accent);
        border-radius: 2px; cursor: pointer; display: flex; align-items: center; gap: 3px;
      }
      .tag-e:hover { background: #f8e8a0; }
      .tag-x { color: var(--danger); font-size: 11px; line-height: 1; cursor: pointer; }
      .tag-in {
        font-size: 10px; padding: 2px 6px; font-family: "Courier New", monospace;
        background: #faf8f2; color: var(--text); border: 1px solid var(--border2);
        border-radius: 2px; width: 90px; outline: none;
      }
      .tag-in:focus { border-color: var(--accent2); }
      .follows-row {
        display: flex; align-items: center; gap: 5px; margin-top: 5px;
        font-size: 10px; color: var(--muted); font-family: "Courier New", monospace;
      }
      .follows-in {
        font-size: 10px; padding: 2px 6px; font-family: "Courier New", monospace;
        background: #faf8f2; color: #1e5c30; border: 1px solid #8acc88;
        border-radius: 2px; width: 110px; outline: none;
      }
      .follows-in:focus { border-color: var(--accent2); }
      .edit-acts { display: flex; gap: 4px; margin-top: 6px; }
      .ebtn {
        font-size: 9px; padding: 3px 10px; font-family: "Courier New", monospace;
        background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
        cursor: pointer; letter-spacing: 1px; text-transform: uppercase; border-radius: 2px;
      }
      .ebtn.save   { border-color: var(--accent2); color: var(--accent2); background: #eaf4e8; }
      .ebtn.cancel { color: var(--muted); }
      .ebtn.del    { border-color: var(--danger); color: var(--danger); margin-left: auto; background: #f8eeee; }

      .add-btn {
        width: 100%; padding: 6px; margin-bottom: 4px;
        background: none; border: 1px dashed var(--border2); color: var(--muted);
        cursor: pointer; font-family: "Courier New", monospace; font-size: 10px;
        text-align: center; letter-spacing: 1px; border-radius: 2px;
      }
      .add-btn:hover { border-color: var(--accent2); color: var(--accent2); }

      .ac {
        position: absolute; z-index: 200; background: #faf8f2;
        border: 1px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,.15);
        max-height: 110px; overflow-y: auto;
        font-size: 10px; font-family: "Courier New", monospace; min-width: 130px;
      }
      .ac-item { padding: 3px 10px; cursor: pointer; color: var(--text); }
      .ac-item:hover { background: #fdf5d8; color: var(--accent); }

      #error-box {
        background: #f8eeee; border: 1px solid #d09090; color: #7a1c1c;
        padding: 10px 16px; font-size: 11px;
        font-family: "Courier New", monospace; display: none; flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="hdr">
      <span id="hdr-title">dialogue editor</span>
      <span id="breadcrumb">select a greeting to begin</span>
      <button class="hbtn" onclick="resetVisited()">reset visited</button>
      <button class="hbtn danger" onclick="hardRefresh()">reload file</button>
      <button class="hbtn primary" onclick="exportJS()">export js</button>
    </div>
    <div id="error-box"></div>
    <div id="cols-scroll"><div id="cols"></div></div>

    <script src="game-data.js"></script>
    <script src="game-data-words-engine.js"></script>
    <script src="game-data-words.js"></script>

    <script>
      // ── stubs ─────────────────────────────────────────────────────────────────────
      window.GAME_DATA = window.GAME_DATA || { buildings:[], playerArt:[[" @ "],[" @ "]], npcArts:[["&"]], npcColors:["#aaa"], narcArt:["%"], robinArt:["R"], narrativeQuotes:[] };
      const _noop = () => {};
      window.audio={play:_noop}; window.grid={set:_noop,text:_noop,textCenter:_noop,art:_noop};
      window.Util=window.Util||{pick:a=>a[Math.floor(Math.random()*a.length)],clamp:(v,a,b)=>Math.max(a,Math.min(b,v)),randInt:(a,b)=>Math.floor(Math.random()*(b-a+1))+a,lerp:(a,b,t)=>a+(b-a)*t};
      window.phase="editor"; window.W=80; window.H=30; window.dialogStack=[];
      window.C_PLAYER="#7aba7a"; window.C_DIM="#555"; window.C_DANGER="#c44";
      window.C_SUCCESS="#7aba7a"; window.C_TEAL="#7ababa"; window.C_ORANGE="#ba8a4a"; window.C_WARN="#ba8a4a";
      window.bannerTimer=0; window.hasPlayed=false;
      window.showBanner=_noop; window.updateBanner=_noop; window.renderBanner=_noop;
      window.dialogUpdate=_noop; window.dialogRender=_noop; window.addFloat=_noop;
      window.spark=_noop; window.triggerChromatic=_noop; window.endGame=_noop; window.initAct2b=_noop;
      window.hudLabel={textContent:""}; window.hudScore={textContent:"",style:{}}; window.hudStatus={textContent:"",style:{}};
      if (!document.getElementById("gamescreen")){const gs=document.createElement("canvas");gs.id="gamescreen";gs.style.display="none";document.body.appendChild(gs);}
      window.gs=document.getElementById("gamescreen");
      window.input={isDown:_noop,justPressed:_noop}; window.clickPending=false;
      window.CONV_BOX={tl:"+",tr:"+",bl:"+",br:"+",h:"-",v:"|"};
      window.DIALOG_BOX={tl:"+",tr:"+",bl:"+",br:"+",h:"-",v:"|"};
      window.A1_LOOP_MSGS=[]; window.HA=[[""]]; window.HC=["#fff"];
    </script>

    <script>
      // ── D: master editable data object ───────────────────────────────────────────
      const D = {
        P_GREET:                      P_GREET,
        D_NARC_HELLO:                 D_NARC_HELLO,
        DECK_ANGRY_HELLO:             DECK_ANGRY_HELLO.src,
        DECK_HUNGRY_HELLO:            DECK_HUNGRY_HELLO.src,
        DECK_ANGRY_PITCH:             DECK_ANGRY_PITCH.src,
        DECK_HUNGRY_PITCH:            DECK_HUNGRY_PITCH.src,
        D_F_INVITE:                   D_F_INVITE,
        D_NO_BYE:                     D_NO_BYE,
        D_SAY_MORE_WARM:              D_SAY_MORE_WARM.src,
        D_SAY_MORE_SKEPTICAL:         D_SAY_MORE_SKEPTICAL.src,
        D_JOIN_CONSENT_PAIRS:         D_JOIN_CONSENT_PAIRS,
        DECK_MISMATCH_TOO_LITERAL:    DECK_MISMATCH_TOO_LITERAL.src,
        DECK_MISMATCH_TOO_STRUCTURAL: DECK_MISMATCH_TOO_STRUCTURAL.src,
        D_BACK_OFF_EARLY:             DECK_BACK_OFF_EARLY.src,
        DECK_STRONGER_PITCH:          DECK_STRONGER_PITCH.src,
        D_INVITE:                     D_INVITE,
        D_BACK_OFF_LATE:              DECK_BACK_OFF_LATE.src,
        D_NARC_REVEAL:                D_NARC_REVEAL,
        D_NOT_NOW:                    D_NOT_NOW,
        D_RETURN:                     D_RETURN,
        // ambient / browse
        D_AMB_HUNGRY:                 D_AMB_HUNGRY,
        D_AMB_ANGRY:                  D_AMB_ANGRY,
        D_AMB_NARC:                   D_AMB_NARC,
        D_ACK_HUNGRY_ANGRY:           D_ACK_HUNGRY_ANGRY,
        D_ACK_NARC:                   D_ACK_NARC,
      };

      // flatten HELLO_PREFIX into per-tone/kind arrays
      ["casual","concerned","direct"].forEach(tone =>
        ["angry","hungry","narc"].forEach(kind =>
          D[`PREFIX_${tone}_${kind}`] = HELLO_PREFIX[tone][kind]
        )
      );

      // ── persistence ───────────────────────────────────────────────────────────────
      const SK      = "dlg_ed_v5";
      const SK_DATA = "dlg_ed_data_v5";
      const SK_SEC  = "dlg_ed_sec_v5";

      const SAVEABLE = [
        "P_GREET","D_NARC_HELLO","DECK_ANGRY_HELLO","DECK_HUNGRY_HELLO",
        "DECK_ANGRY_PITCH","DECK_HUNGRY_PITCH","D_F_INVITE","D_NO_BYE",
        "D_SAY_MORE_WARM","D_SAY_MORE_SKEPTICAL","D_JOIN_CONSENT_PAIRS",
        "DECK_MISMATCH_TOO_LITERAL","DECK_MISMATCH_TOO_STRUCTURAL",
        "D_BACK_OFF_EARLY","DECK_STRONGER_PITCH","D_INVITE",
        "D_BACK_OFF_LATE","D_NARC_REVEAL","D_NOT_NOW","D_RETURN",
        "D_AMB_HUNGRY","D_AMB_ANGRY","D_AMB_NARC",
        "D_ACK_HUNGRY_ANGRY","D_ACK_NARC",
        "PREFIX_casual_angry","PREFIX_casual_hungry","PREFIX_casual_narc",
        "PREFIX_concerned_angry","PREFIX_concerned_hungry","PREFIX_concerned_narc",
        "PREFIX_direct_angry","PREFIX_direct_hungry","PREFIX_direct_narc",
      ];

      function saveData() {
        try {
          const snap = {};
          SAVEABLE.forEach(k => { if (D[k]) snap[k] = JSON.parse(JSON.stringify(D[k])); });
          localStorage.setItem(SK_DATA, JSON.stringify(snap));
        } catch(e) { console.warn("saveData failed", e); }
      }

      function loadData() {
        try {
          const s = localStorage.getItem(SK_DATA); if (!s) return;
          const snap = JSON.parse(s);
          Object.entries(snap).forEach(([k,v]) => {
            if (D[k] && Array.isArray(v)) { D[k].length=0; v.forEach(x=>D[k].push(x)); }
          });
        } catch(e) { console.warn("loadData failed", e); }
      }

      function hardRefresh() {
        const ov=document.createElement("div");
        ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;font-family:Courier New,monospace";
        const bx=document.createElement("div");
        bx.style.cssText="background:#1c2818;border:1px solid #c07070;padding:28px 32px;max-width:400px;display:flex;flex-direction:column;gap:14px";
        bx.innerHTML=`
          <div style="font-size:11px;color:#c07070;letter-spacing:2px;text-transform:uppercase;font-family:Courier New,monospace">reload file</div>
          <div style="font-size:12px;line-height:1.7;color:#c8d8b0;font-family:Georgia,serif">
            Step 1: download your current edits.<br>
            Step 2: wipe localStorage and reload from source.<br><br>
            <strong style="color:#e8dfc0">Do step 1 first &mdash; step 2 is permanent.</strong>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button id="dlbtn"  style="font-family:Courier New,monospace;font-size:10px;padding:5px 14px;background:transparent;border:1px solid #6aaa48;color:#8acc68;cursor:pointer;letter-spacing:1px;text-transform:uppercase">1. download edits</button>
            <button id="rlbtn"  style="font-family:Courier New,monospace;font-size:10px;padding:5px 14px;background:transparent;border:1px solid #c07070;color:#e08080;cursor:pointer;letter-spacing:1px;text-transform:uppercase">2. reload file</button>
            <button id="cancelbtn" style="font-family:Courier New,monospace;font-size:10px;padding:5px 14px;background:transparent;border:1px solid #4a6040;color:#8a9e7a;cursor:pointer;letter-spacing:1px;text-transform:uppercase">cancel</button>
          </div>`;
        ov.appendChild(bx); document.body.appendChild(ov);
        bx.querySelector("#dlbtn").onclick=()=>{ doExport(); bx.querySelector("#dlbtn").textContent="1. downloaded \u2713"; bx.querySelector("#dlbtn").style.opacity="0.5"; };
        bx.querySelector("#rlbtn").onclick=()=>{ document.body.removeChild(ov); localStorage.removeItem(SK_DATA); location.reload(true); };
        bx.querySelector("#cancelbtn").onclick=()=>document.body.removeChild(ov);
      }

      // visited
      let VIS={};
      function loadV()  { try{const s=localStorage.getItem(SK);if(s)VIS=JSON.parse(s);}catch(e){} }
      function saveV()  { try{localStorage.setItem(SK,JSON.stringify(VIS));}catch(e){} }
      function vis(k)   { return !!VIS[k]; }
      function markV(k) { VIS[k]=true; saveV(); }
      function resetVisited() { if(!confirm("Reset all visited markers?"))return; VIS={}; saveV(); render(); }

      // section collapse
      let SEC={};
      function loadSec()         { try{const s=localStorage.getItem(SK_SEC);if(s)SEC=JSON.parse(s);}catch(e){} }
      function saveSec()         { try{localStorage.setItem(SK_SEC,JSON.stringify(SEC));}catch(e){} }
      function isSec(id,lbl)     { return !!SEC[`${id}::${lbl}`]; }
      function toggleSec(id,lbl) { SEC[`${id}::${lbl}`]=!SEC[`${id}::${lbl}`]; saveSec(); render(); }

      // ── scoring — exact match to DM.score() ──────────────────────────────────────
      const TOPIC_TAGS = new Set([
        "bread","weston","price-fixing","dumpsters","wasted-food","food-bank","three-co",
        "cartel","dynamic-pricing","shrinkflation","robin-hood","boycott","points","wages",
        "ceo-pay","audit","bailout","stat-36b","stat-47","stat-18b","stat-61b","stat-100b",
      ]);
      const ROUTING_TAGS = new Set(["casual","concerned","direct"]);
      function tagsOf(item) { return (item.tags||[]).filter(t=>!ROUTING_TAGS.has(t)); }
      function dmScore(item, followTags, convUsed, boost=false) {
        const tags = tagsOf(item);
        if (item.follows && followTags && followTags.includes(item.follows)) return 4;
        if (tags.some(t=>TOPIC_TAGS.has(t)&&convUsed.has(t))) return -2;
        if (boost && tags.some(t=>followTags&&followTags.includes(t))) return 2;
        return 0;
      }
      function scoreAndSort(items, followTags, convUsed, boost=false) {
        return items
          .map(x=>({...x, score:dmScore(x,followTags,convUsed,boost)}))
          .filter(x=>x.score>-2)
          .sort((a,b)=>b.score-a.score);
      }
      function allTags() {
        const s=new Set();
        Object.values(D).forEach(v=>{
          if (!Array.isArray(v)) return;
          v.forEach(x=>{ if(x&&x.tags) x.tags.forEach(t=>s.add(t)); if(x&&x.follows) s.add(x.follows); });
        });
        return [...s].sort();
      }

      // ── path state ────────────────────────────────────────────────────────────────
      let P={}, EDIT_KEY=null;

      // ── helpers ───────────────────────────────────────────────────────────────────
      function wrapPlain(arr, dn) {
        return arr.map((x,i)=>({
          key:`${dn}:${i}`,
          text: typeof x==="string" ? x : (x.t||x),
          tags: typeof x==="string" ? [] : (x.tags||[]),
          idx:i, selected:false, dimmed:false,
        }));
      }

      // ── buildCols: always renders all columns ─────────────────────────────────────
      function buildCols() {
        const cols=[];
        function col(def,unlocked){ return {...def,locked:!unlocked}; }

        // ── AMBIENT (first column, collapsible sub-sections) ──────────────────────
        cols.push({
          id:"ambient", label:"ambient", deckName:null, locked:false,
          sections:[
            {label:"hungry",   deckName:"D_AMB_HUNGRY",      items:wrapPlain(D.D_AMB_HUNGRY,"D_AMB_HUNGRY")},
            {label:"angry",    deckName:"D_AMB_ANGRY",        items:wrapPlain(D.D_AMB_ANGRY,"D_AMB_ANGRY")},
            {label:"narc",     deckName:"D_AMB_NARC",         items:wrapPlain(D.D_AMB_NARC,"D_AMB_NARC")},
            {label:"ack hungry/angry", deckName:"D_ACK_HUNGRY_ANGRY", items:wrapPlain(D.D_ACK_HUNGRY_ANGRY,"D_ACK_HUNGRY_ANGRY")},
            {label:"ack narc", deckName:"D_ACK_NARC",         items:wrapPlain(D.D_ACK_NARC,"D_ACK_NARC")},
          ],
          onSelect:()=>{},
        });

        // ── 1. GREETING ───────────────────────────────────────────────────────────
        cols.push(col({
          id:"greet", label:"greeting (player)", deckName:"P_GREET",
          items:D.P_GREET.map((x,i)=>({
            key:`P_GREET:${i}`, text:x.t, tags:x.tags, idx:i,
            selected:P.greetIdx===i, dimmed:P.greetIdx!=null&&P.greetIdx!==i,
          })),
          onSelect:(_dn,i)=>{ P={greetIdx:i,tone:D.P_GREET[i].tags[0]||"casual"}; render(); },
        }, true));

        // ── 2. NPC TYPE ───────────────────────────────────────────────────────────
        const NPC=["angry","hungry","narc"];
        cols.push(col({
          id:"npctype", label:"npc type", deckName:null, lockedNote:"select a greeting first",
          items:NPC.map((t,i)=>({
            key:`npctype:${t}`, text:t, tags:[], idx:i, badge:t,
            selected:P.npcType===t, dimmed:P.npcType!=null&&P.npcType!==t,
          })),
          onSelect:(_dn,i)=>{
            P.npcType=NPC[i];
            ["prefixIdx","helloIdx","helloDN","helloTags","pitchDeck","pitchIdx","pitchTags",
             "isBoEarly","smDeck","smIdx","smTags","joinedEarly","strongerDeck","strongerIdx","isBOLate"].forEach(k=>delete P[k]);
            render();
          },
        }, P.tone!=null));

        // ── 3. HELLO PREFIX ───────────────────────────────────────────────────────
        const tone=P.tone||"casual", kind=(!P.npcType||P.npcType==="narc")?"narc":P.npcType;
        const prefixDN=`PREFIX_${tone}_${kind}`;
        const prefixArr=D[prefixDN]||[];
        prefixArr.forEach((p,i)=>{ if(typeof p==="string") prefixArr[i]={t:p,tags:[]}; });
        cols.push(col({
          id:"prefix", label:"hello prefix", deckName:prefixDN, lockedNote:"select npc type first",
          items:prefixArr.map((p,i)=>({
            key:`${prefixDN}:${i}`, text:p.t||p, tags:p.tags||[], idx:i, italic:true,
            selected:P.prefixIdx===i, dimmed:P.prefixIdx!=null&&P.prefixIdx!==i,
          })),
          onSelect:(dn,i)=>{
            P.prefixIdx=i;
            ["helloIdx","helloDN","helloTags","pitchDeck","pitchIdx","pitchTags",
             "isBoEarly","smDeck","smIdx","smTags","joinedEarly","strongerDeck","strongerIdx","isBOLate"].forEach(k=>delete P[k]);
            render();
          },
        }, P.npcType!=null));

        // ── 4. HELLO ──────────────────────────────────────────────────────────────
        const helloUnlocked=P.prefixIdx!=null;
        const mkHI=(dn,x,i)=>({
          key:`${dn}:${i}`, text:x.t||x, tags:x.tags||[], idx:i,
          selected:P.helloIdx===i&&P.helloDN===dn,
          dimmed:P.helloIdx!=null&&!(P.helloIdx===i&&P.helloDN===dn),
        });
        const helloSel=(dn,i)=>{
          P.helloIdx=i; P.helloDN=dn; P.helloTags=tagsOf(D[dn][i])||[];
          ["pitchDeck","pitchIdx","pitchTags","isBoEarly","smDeck","smIdx","smTags",
           "joinedEarly","strongerDeck","strongerIdx","isBOLate"].forEach(k=>delete P[k]);
          render();
        };
        if (!P.npcType||P.npcType!=="narc") {
          cols.push(col({
            id:"hello", label:"hello", deckName:null, lockedNote:"select a prefix first",
            sections:[
              {label:"angry hello",  deckName:"DECK_ANGRY_HELLO",  items:D.DECK_ANGRY_HELLO.map((x,i)=>mkHI("DECK_ANGRY_HELLO",x,i))},
              {label:"hungry hello", deckName:"DECK_HUNGRY_HELLO", items:D.DECK_HUNGRY_HELLO.map((x,i)=>mkHI("DECK_HUNGRY_HELLO",x,i))},
            ],
            onSelect:helloSel,
          }, helloUnlocked));
        } else {
          cols.push(col({
            id:"hello", label:"narc hello", deckName:"D_NARC_HELLO", lockedNote:"select a prefix first",
            items:D.D_NARC_HELLO.map((x,i)=>mkHI("D_NARC_HELLO",x,i)),
            onSelect:helloSel,
          }, helloUnlocked));
        }

        // ── 5. PITCH + D_F_INVITE (appended) + D_NO_BYE ──────────────────────────
        const pitchUnlocked=P.helloIdx!=null;
        const hTags=P.helloTags||[], convH=new Set(hTags);
        const mkPI=(dn,x,i)=>({
          key:`${dn}:${i}`,text:x.t,tags:x.tags||[],follows:x.follows,idx:i,deckName:dn,
          selected:P.pitchDeck===dn&&P.pitchIdx===i,
          dimmed:P.pitchIdx!=null&&!(P.pitchDeck===dn&&P.pitchIdx===i),
        });
        // scoreAndSort handles scoring — pass boost=true so link-tag overlap gives score 2
        const sortPitch=dn=>pitchUnlocked
          ?scoreAndSort(D[dn].map((x,i)=>mkPI(dn,x,i)),hTags,convH,true)
          :D[dn].map((x,i)=>mkPI(dn,x,i));

        cols.push(col({
          id:"pitch", label:"pitch (player)", deckName:null, lockedNote:"select a hello first",
          appendNote:{label:"then automatically: D_F_INVITE", deckName:"D_F_INVITE", items:D.D_F_INVITE},
          sections:[
            {label:"angry pitch",    deckName:"DECK_ANGRY_PITCH",  items:sortPitch("DECK_ANGRY_PITCH")},
            {label:"hungry pitch",   deckName:"DECK_HUNGRY_PITCH", items:sortPitch("DECK_HUNGRY_PITCH")},
            {label:"back off early", deckName:"D_BACK_OFF_EARLY",
              items:D.D_BACK_OFF_EARLY.map((x,i)=>({key:`D_BACK_OFF_EARLY:${i}`,text:x.t,tags:[],idx:i,
                deckName:"D_BACK_OFF_EARLY",score:0,
                selected:P.pitchDeck==="D_BACK_OFF_EARLY"&&P.pitchIdx===i,
                dimmed:P.pitchIdx!=null&&!(P.pitchDeck==="D_BACK_OFF_EARLY"&&P.pitchIdx===i)}))},
            {label:"no / bye",       deckName:"D_NO_BYE",
              items:D.D_NO_BYE.map((x,i)=>({key:`D_NO_BYE:${i}`,text:x.t||x,tags:x.tags||[],idx:i,
                selected:false,dimmed:false}))},
          ],
          onSelect:(dn,i)=>{
            P.pitchDeck=dn; P.pitchIdx=i;
            P.pitchTags=tagsOf(D[dn][i])||[];
            P.isBoEarly=dn==="D_BACK_OFF_EARLY";
            ["fInviteIdx","smDeck","smIdx","smTags","joinedEarly","strongerDeck","strongerIdx","isBOLate"].forEach(k=>delete P[k]);
            render();
          },
        }, pitchUnlocked));

        if (P.isBoEarly) {
          cols.push({id:"end0",label:"\u2014 end \u2014",deckName:null,locked:false,
            items:[{key:"e0",text:"conversation ends (back off early)",tags:[],isEnd:true}],onSelect:()=>{}});
          _tail(cols); return cols;
        }

        // ── 6. D_F_INVITE — own selectable column, right after pitch ─────────────
        const fInviteUnlocked=pitchUnlocked&&P.pitchIdx!=null&&!P.isBoEarly;
        cols.push(col({
          id:"f_invite", label:"first invite (player)", deckName:"D_F_INVITE",
          lockedNote:"select a pitch first",
          items:D.D_F_INVITE.map((x,i)=>({
            key:`D_F_INVITE:${i}`, text:x.t||x, tags:x.tags||[], idx:i,
            selected:P.fInviteIdx===i,
            dimmed:P.fInviteIdx!=null&&P.fInviteIdx!==i,
          })),
          onSelect:(_dn,i)=>{
            P.fInviteIdx=i;
            ["smDeck","smIdx","smTags","joinedEarly","strongerDeck","strongerIdx","isBOLate"].forEach(k=>delete P[k]);
            render();
          },
        }, fInviteUnlocked));

        // ── 7. NPC RESPONSE ───────────────────────────────────────────────────────
        const pTags=P.pitchTags||[], convP=new Set([...convH,...pTags]);
        const isAP=P.pitchDeck==="DECK_ANGRY_PITCH";
        const mismatch=fInviteUnlocked&&P.fInviteIdx!=null&&
          ((isAP&&P.npcType==="hungry")||(P.pitchDeck==="DECK_HUNGRY_PITCH"&&P.npcType==="angry"));
        const npcRespUnlocked=fInviteUnlocked&&P.fInviteIdx!=null;

        if (mismatch) {
          const mdn=isAP?"DECK_MISMATCH_TOO_STRUCTURAL":"DECK_MISMATCH_TOO_LITERAL";
          cols.push({id:"npcresp",label:"npc response (mismatch)",deckName:mdn,locked:false,
            items:D[mdn].map((x,i)=>({key:`${mdn}:${i}`,text:x.t,tags:x.tags||[],idx:i,selected:false,dimmed:false})),
            onSelect:()=>{}});
          cols.push({id:"end1",label:"\u2014 end \u2014",deckName:null,locked:false,
            items:[{key:"e1",text:"conversation ends (mismatch)",tags:[],isEnd:true}],onSelect:()=>{}});
          _tail(cols); return cols;
        }

        const mkSM=(dn,x,i)=>({
          key:`${dn}:${i}`,text:x.t,tags:x.tags||[],follows:x.follows,idx:i,
          selected:P.smDeck===dn&&P.smIdx===i,
          dimmed:P.smIdx!=null&&!(P.smDeck===dn&&P.smIdx===i),
        });
        const smWarm=npcRespUnlocked?scoreAndSort(D.D_SAY_MORE_WARM.map((x,i)=>mkSM("D_SAY_MORE_WARM",x,i)),pTags,convP,true):D.D_SAY_MORE_WARM.map((x,i)=>mkSM("D_SAY_MORE_WARM",x,i));
        const smSkep=npcRespUnlocked?scoreAndSort(D.D_SAY_MORE_SKEPTICAL.map((x,i)=>mkSM("D_SAY_MORE_SKEPTICAL",x,i)),pTags,convP,true):D.D_SAY_MORE_SKEPTICAL.map((x,i)=>mkSM("D_SAY_MORE_SKEPTICAL",x,i));
        const joinItems=D.D_JOIN_CONSENT_PAIRS.map((x,i)=>({
          key:`D_JOIN_CONSENT_PAIRS:${i}`,
          text:`\u201c${x.join}\u201d / \u201c${x.consent}\u201d`,
          tags:x.tags||[],idx:i,
          selected:P.smDeck==="D_JOIN_CONSENT_PAIRS"&&P.smIdx===i,
          dimmed:P.smIdx!=null&&!(P.smDeck==="D_JOIN_CONSENT_PAIRS"&&P.smIdx===i),
        }));

        cols.push(col({
          id:"npcresp", label:"npc response", deckName:null, lockedNote:"select a first invite first",
          sections:[
            {label:"say more \u2014 warm (non-narc)",      deckName:"D_SAY_MORE_WARM",      items:smWarm},
            {label:"say more \u2014 skeptical (narc)",     deckName:"D_SAY_MORE_SKEPTICAL", items:smSkep},
            {label:"join immediately \u2014 end",          deckName:"D_JOIN_CONSENT_PAIRS", items:joinItems},
          ],
          onSelect:(dn,i)=>{
            P.smDeck=dn; P.smIdx=i;
            P.joinedEarly=dn==="D_JOIN_CONSENT_PAIRS";
            if (!P.joinedEarly) P.smTags=tagsOf(D[dn][i])||pTags;
            ["strongerDeck","strongerIdx","isBOLate"].forEach(k=>delete P[k]);
            render();
          },
        }, npcRespUnlocked));

        if (P.joinedEarly) {
          cols.push({id:"end2",label:"\u2014 end \u2014",deckName:null,locked:false,
            items:[{key:"e2",text:"NPC joins immediately \u2014 conversation ends",tags:[],isEnd:true}],onSelect:()=>{}});
          _tail(cols); return cols;
        }

        // ── 8. STRONGER PITCH ─────────────────────────────────────────────────────
        const strongerUnlocked=npcRespUnlocked&&P.smIdx!=null&&!P.joinedEarly;
        const fTags=P.smTags||pTags, convSM=new Set([...convP,...fTags]);
        const mkSPI=(dn,x,i)=>({
          key:`${dn}:${i}`,text:x.t,tags:x.tags||[],follows:x.follows,idx:i,deckName:dn,
          selected:P.strongerDeck===dn&&P.strongerIdx===i,
          dimmed:P.strongerIdx!=null&&!(P.strongerDeck===dn&&P.strongerIdx===i),
        });
        const strongerItems=strongerUnlocked
          ?scoreAndSort(D.DECK_STRONGER_PITCH.map((x,i)=>mkSPI("DECK_STRONGER_PITCH",x,i)),fTags,convSM,true)
          :D.DECK_STRONGER_PITCH.map((x,i)=>mkSPI("DECK_STRONGER_PITCH",x,i));

        cols.push(col({
          id:"stronger", label:"stronger pitch (player)", deckName:null,
          lockedNote:"select a npc response first",
          sections:[
            {label:"stronger pitch", deckName:"DECK_STRONGER_PITCH", items:strongerItems},
            {label:"back off late",  deckName:"D_BACK_OFF_LATE",
              items:D.D_BACK_OFF_LATE.map((x,i)=>({key:`D_BACK_OFF_LATE:${i}`,text:x.t,tags:[],idx:i,
                deckName:"D_BACK_OFF_LATE",score:0,
                selected:P.strongerDeck==="D_BACK_OFF_LATE"&&P.strongerIdx===i,
                dimmed:P.strongerIdx!=null&&!(P.strongerDeck==="D_BACK_OFF_LATE"&&P.strongerIdx===i)}))},
          ],
          onSelect:(dn,i)=>{ P.strongerDeck=dn; P.strongerIdx=i; P.isBOLate=dn==="D_BACK_OFF_LATE"; render(); },
        }, strongerUnlocked));

        if (P.isBOLate) {
          cols.push({id:"end3",label:"\u2014 end \u2014",deckName:null,locked:false,
            items:[{key:"e3",text:"conversation ends (back off late)",tags:[],isEnd:true}],onSelect:()=>{}});
          _tail(cols); return cols;
        }

        // ── 9. D_INVITE (own column, selectable) ─────────────────────────────────
        const inviteUnlocked=strongerUnlocked&&P.strongerIdx!=null&&!P.isBOLate;
        cols.push(col({
          id:"invite", label:"D_INVITE (appended)", deckName:"D_INVITE",
          lockedNote:"select a stronger pitch first",
          items:D.D_INVITE.map((x,i)=>({
            key:`D_INVITE:${i}`, text:x.t||x, tags:x.tags||[], idx:i,
            selected:false, dimmed:false,
          })),
          onSelect:()=>{},
        }, inviteUnlocked));

        // ── 10. OUTCOME ───────────────────────────────────────────────────────────
        const outcomeUnlocked=inviteUnlocked;
        if (!P.npcType||P.npcType==="narc") {
          cols.push(col({
            id:"outcome", label:"narc reveal \u2192 end", deckName:"D_NARC_REVEAL",
            lockedNote:"select a stronger pitch first",
            items:D.D_NARC_REVEAL.map((x,i)=>({key:`D_NARC_REVEAL:${i}`,text:x.t||x,tags:x.tags||[],idx:i,selected:false,dimmed:false})),
            onSelect:()=>{},
          }, outcomeUnlocked));
        } else {
          cols.push(col({
            id:"outcome", label:"outcome", deckName:null,
            lockedNote:"select a stronger pitch first",
            sections:[
              {label:"join (end)",                deckName:"D_JOIN_CONSENT_PAIRS",
                items:D.D_JOIN_CONSENT_PAIRS.map((x,i)=>({key:`D_JOIN_CONSENT_PAIRS:out:${i}`,text:`\u201c${x.join}\u201d / \u201c${x.consent}\u201d`,tags:x.tags||[],idx:i,selected:false,dimmed:false}))},
              {label:"not now",                   deckName:"D_NOT_NOW",
                items:D.D_NOT_NOW.map((x,i)=>({key:`D_NOT_NOW:${i}`,text:x.t||x,tags:x.tags||[],idx:i,selected:false,dimmed:false}))},
              {label:"return (later convo)",       deckName:"D_RETURN",
                items:D.D_RETURN.map((x,i)=>({key:`D_RETURN:${i}`,text:x.t||x,tags:x.tags||[],idx:i,selected:false,dimmed:false}))},
            ],
            onSelect:()=>{},
          }, outcomeUnlocked));
        }

        return cols;
      }

      // locked tail for early-exit branches (keeps layout width stable)
      function _tail(cols) {
        const have=new Set(cols.map(c=>c.id));
        ["f_invite","stronger","invite","outcome"].forEach(id=>{
          if (!have.has(id))
            cols.push({id,label:id,deckName:null,locked:true,lockedNote:"not reached on this path",items:[],onSelect:()=>{}});
        });
      }

      // ── render ────────────────────────────────────────────────────────────────────
      function render() {
        updateBC();
        const wrap=document.getElementById("cols");
        const sc=document.getElementById("cols-scroll");
        const scrolls={};
        wrap.querySelectorAll(".col").forEach(c=>{const b=c.querySelector(".col-body");if(b)scrolls[c.dataset.colId]=b.scrollTop;});
        const hx=sc.scrollLeft;
        wrap.innerHTML="";
        buildCols().forEach(cd=>{
          if (cd.isDivider) return; // no divider needed — ambient is first column now
          const el=buildColEl(cd); el.dataset.colId=cd.id; wrap.appendChild(el);
        });
        sc.scrollLeft=hx;
        wrap.querySelectorAll(".col").forEach(c=>{const b=c.querySelector(".col-body");if(b&&scrolls[c.dataset.colId])b.scrollTop=scrolls[c.dataset.colId];});
        if (EDIT_KEY) setTimeout(()=>{
          const el=document.querySelector(`[data-key="${EDIT_KEY}"]`);
          if(el){el.scrollIntoView({behavior:"smooth",block:"nearest"});const ta=el.querySelector("textarea");if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}}
        },60);
      }

      function buildColEl(cd) {
        const el=document.createElement("div");
        el.className="col"+(cd.locked?" locked":"")+(cd.isBrowse?" browse":"");

        const hdr=document.createElement("div"); hdr.className="col-hdr";
        const lbl=document.createElement("span"); lbl.className="col-hdr-label"; lbl.textContent=cd.label;
        hdr.appendChild(lbl); el.appendChild(hdr);

        const prog=document.createElement("div"); prog.className="col-prog";
        const pb=document.createElement("div"); pb.className="col-prog-bar";
        const all=cd.items?cd.items:(cd.sections||[]).flatMap(s=>s.items);
        pb.style.width=all.length?`${(all.filter(x=>vis(x.key)).length/all.length)*100}%`:"0%";
        prog.appendChild(pb); el.appendChild(prog);

        const body=document.createElement("div"); body.className="col-body";
        if (cd.locked&&cd.lockedNote){const n=document.createElement("div");n.className="col-locked-note";n.textContent="\u27f5 "+cd.lockedNote;body.appendChild(n);}

        // append note
        if (cd.appendNote) {
          const an=document.createElement("div"); an.className="append-note";
          const anl=document.createElement("strong"); anl.textContent=cd.appendNote.label; an.appendChild(anl);
          cd.appendNote.items.forEach(x=>{
            const ln=document.createElement("div");
            ln.style.cssText="padding:1px 0;font-size:11px;font-family:Georgia,serif;color:#2a5a18";
            ln.textContent="\u201c"+(x.t||x)+"\u201d";
            an.appendChild(ln);
          });
          body.appendChild(an);
        }

        const renderItems=(target,items,deckName)=>{
          let last=null;
          items.forEach(item=>{
            if(item.score!=null&&last!==null&&item.score!==last){
              const dv=document.createElement("div"); dv.className="score-divider";
              if(item.score===0)  dv.textContent="\u2014 fair draw \u2014";
              if(item.score===-1) dv.textContent="\u2014 cooled \u2014";
              if(dv.textContent) target.appendChild(dv);
            }
            target.appendChild(makeItemEl(item,deckName,cd.onSelect));
            if(item.score!=null) last=item.score;
          });
        };

        if (cd.sections) {
          cd.sections.forEach(sec=>{
            const collapsed=isSec(cd.id,sec.label);
            const sep=document.createElement("div"); sep.className="section-sep";
            const sl=document.createElement("span"); sl.textContent=sec.label;
            const st=document.createElement("span"); st.className="sec-tog"; st.textContent=collapsed?"\u25b8":"\u25be";
            sep.appendChild(sl); sep.appendChild(st);
            sep.onclick=()=>toggleSec(cd.id,sec.label);
            body.appendChild(sep);
            const sw=document.createElement("div"); sw.className="section-items"+(collapsed?" collapsed-sec":"");
            if(sec.deckName) sw.appendChild(makeAddBtn(sec.deckName));
            renderItems(sw,sec.items,sec.deckName);
            body.appendChild(sw);
          });
        } else if (cd.items) {
          if(cd.deckName) body.appendChild(makeAddBtn(cd.deckName));
          renderItems(body,cd.items,cd.deckName);
        }
        el.appendChild(body);
        return el;
      }

      function makeItemEl(item,deckName,onSelect) {
        const el=document.createElement("div");
        if(item.isEnd){el.className="end-note";el.textContent=item.text;return el;}
        const dn=deckName||item.deckName;
        el.className="item "+(vis(item.key)?"visited":"unvisited")+(item.selected?" selected":"")+(item.dimmed?" dimmed":"");
        if(dn==="DECK_ANGRY_HELLO"||dn==="DECK_ANGRY_PITCH") el.classList.add("angry");
        if(dn==="DECK_HUNGRY_HELLO"||dn==="DECK_HUNGRY_PITCH") el.classList.add("hungry");
        el.dataset.key=item.key;

        if(EDIT_KEY===item.key&&dn){buildEditMode(el,item,dn);return el;}

        const tt=document.createElement("div"); tt.className="item-text";
        if(item.italic) tt.style.fontStyle="italic";
        tt.textContent=item.text; el.appendChild(tt);

        const meta=document.createElement("div"); meta.className="item-meta";
        if(item.badge){const b=document.createElement("span");b.className=`badge b-${item.badge}`;b.textContent=item.badge;meta.appendChild(b);}
        tagsOf(item).forEach(t=>{const s=document.createElement("span");s.className="tag";s.textContent=t;meta.appendChild(s);});
        if(item.follows){const s=document.createElement("span");s.className="tag f";s.textContent="\u2192"+item.follows;meta.appendChild(s);}
        if(meta.children.length) el.appendChild(meta);

        if(item.score!=null){
          const lbl=item.score===4?"follows \u2713":item.score===2?"boost":item.score===0?"fair draw":"suppressed";
          const sb=document.createElement("span");
          sb.className=`score-badge score-${item.score<0?"n"+Math.abs(item.score):item.score}`;
          sb.textContent=lbl;
          const sr=document.createElement("div");sr.style.marginTop="4px";sr.appendChild(sb);el.appendChild(sr);
        }

        let ct=null;
        el.addEventListener("click",e=>{
          if(e.target.closest(".ebtn,.tag-x,.tag-in,.edit-ta,.follows-in"))return;
          clearTimeout(ct); ct=setTimeout(()=>{markV(item.key);onSelect(dn,item.idx);},220);
        });
        el.addEventListener("dblclick",e=>{
          e.stopPropagation(); clearTimeout(ct);
          if(!dn)return; EDIT_KEY=item.key; render();
        });
        return el;
      }

      function buildEditMode(el,item,deckName) {
        const arr=D[deckName]; if(!arr)return;
        const raw=arr[item.idx];
        const isStr=typeof raw==="string";
        const obj=isStr?{t:raw}:raw;
        const ta=document.createElement("textarea"); ta.className="edit-ta";
        const tv=obj.t||""; ta.value=tv; ta.rows=Math.max(2,Math.ceil(tv.length/38));
        el.appendChild(ta);
        const saveText=()=>{ const v=ta.value.trim();if(!v)return;if(isStr)arr[item.idx]=v;else if(obj.t!==undefined)obj.t=v;saveData(); };
        ta.addEventListener("blur",()=>setTimeout(()=>{ if(EDIT_KEY!==item.key||el.contains(document.activeElement))return;saveText();EDIT_KEY=null;render(); },150));

        if(!isStr&&obj.tags!==undefined){
          const tr=document.createElement("div");tr.className="tag-row";
          const refresh=()=>{
            tr.innerHTML="";
            (obj.tags||[]).forEach((t,ti)=>{
              const sp=document.createElement("span");sp.className="tag-e";
              sp.innerHTML=`${esc(t)} <span class="tag-x">\xd7</span>`;
              sp.querySelector(".tag-x").onclick=()=>{obj.tags.splice(ti,1);saveData();render();};
              tr.appendChild(sp);
            });
            const inp=document.createElement("input");inp.className="tag-in";inp.placeholder="+tag";tr.appendChild(inp);
            let ac=null;
            inp.addEventListener("input",()=>{
              if(ac){ac.remove();ac=null;}
              const v=inp.value.trim().toLowerCase();if(!v)return;
              const m=allTags().filter(t=>t.includes(v)&&!(obj.tags||[]).includes(t));if(!m.length)return;
              ac=document.createElement("div");ac.className="ac";el.style.position="relative";
              m.slice(0,8).forEach(t=>{const d=document.createElement("div");d.className="ac-item";d.textContent=t;d.onmousedown=e=>{e.preventDefault();if(!obj.tags)obj.tags=[];obj.tags.push(t);inp.value="";saveData();render();if(ac){ac.remove();ac=null;}};ac.appendChild(d);});
              el.appendChild(ac);
            });
            inp.addEventListener("keydown",e=>{
              if(e.key==="Enter"||e.key===","){e.preventDefault();const v=inp.value.replace(/,$/,"").trim();if(v){if(!obj.tags)obj.tags=[];obj.tags.push(v);inp.value="";saveData();render();}}
              if(e.key==="Escape"){EDIT_KEY=null;render();}
            });
            inp.addEventListener("blur",()=>setTimeout(()=>{if(ac){ac.remove();ac=null;}},150));
          };
          el.appendChild(tr);refresh();

          const noF=new Set(["P_GREET","D_NO_BYE","D_NOT_NOW","D_NARC_REVEAL","D_RETURN","D_BACK_OFF_EARLY","D_BACK_OFF_LATE","D_F_INVITE","D_INVITE"]);
          if(!noF.has(deckName)){
            const fr=document.createElement("div");fr.className="follows-row";fr.innerHTML="<span>follows:</span>";
            const fi=document.createElement("input");fi.className="follows-in";fi.value=obj.follows||"";fi.placeholder="tag\u2026";
            const saveF=()=>{obj.follows=fi.value.trim()||undefined;saveData();};
            fi.addEventListener("change",saveF);fi.addEventListener("blur",saveF);
            fr.appendChild(fi);el.appendChild(fr);
          }
        }

        if(deckName==="D_JOIN_CONSENT_PAIRS"){
          el.innerHTML="";
          const f1=document.createElement("textarea");f1.className="edit-ta";f1.value=obj.join||"";f1.rows=2;f1.placeholder="join phrase\u2026";
          const f2=document.createElement("textarea");f2.className="edit-ta";f2.value=obj.consent||"";f2.rows=1;f2.placeholder="consent phrase\u2026";f2.style.marginTop="4px";
          const saveJC=()=>setTimeout(()=>{if(el.contains(document.activeElement))return;obj.join=f1.value.trim();obj.consent=f2.value.trim();saveData();EDIT_KEY=null;render();},150);
          f1.addEventListener("blur",saveJC);f2.addEventListener("blur",saveJC);
          el.appendChild(f1);el.appendChild(f2);
          const acts=document.createElement("div");acts.className="edit-acts";
          const sv=document.createElement("button");sv.className="ebtn save";sv.textContent="save";sv.onclick=()=>{obj.join=f1.value.trim();obj.consent=f2.value.trim();saveData();EDIT_KEY=null;render();};
          const cn=document.createElement("button");cn.className="ebtn cancel";cn.textContent="cancel";cn.onclick=()=>{EDIT_KEY=null;render();};
          const dl=document.createElement("button");dl.className="ebtn del";dl.textContent="delete";dl.onclick=()=>{if(!confirm("delete?"))return;arr.splice(item.idx,1);saveData();EDIT_KEY=null;render();};
          acts.appendChild(sv);acts.appendChild(cn);acts.appendChild(dl);el.appendChild(acts);return;
        }

        const acts=document.createElement("div");acts.className="edit-acts";
        const sv=document.createElement("button");sv.className="ebtn save";sv.textContent="save";sv.onclick=()=>{saveText();EDIT_KEY=null;render();};
        const cn=document.createElement("button");cn.className="ebtn cancel";cn.textContent="cancel";cn.onclick=()=>{EDIT_KEY=null;render();};
        const dl=document.createElement("button");dl.className="ebtn del";dl.textContent="delete";dl.onclick=()=>{if(!confirm("delete?"))return;arr.splice(item.idx,1);saveData();EDIT_KEY=null;render();};
        acts.appendChild(sv);acts.appendChild(cn);acts.appendChild(dl);el.appendChild(acts);
      }

      function makeAddBtn(dn){
        const btn=document.createElement("button");btn.className="add-btn";btn.textContent="+ add line";
        btn.onclick=e=>{
          e.stopPropagation();e.preventDefault();
          const arr=D[dn];if(!arr)return;
          // detect plain string decks
          const isPlainDeck=arr.length>0&&typeof arr[0]==="string";
          const ni=dn==="D_JOIN_CONSENT_PAIRS"?{join:"new join phrase",consent:"new consent"}
                   :isPlainDeck?"new line"
                   :{t:"new line",tags:[]};
          arr.unshift(ni);saveData();EDIT_KEY=`${dn}:0`;render();
          setTimeout(()=>{const el=document.querySelector(`[data-key="${dn}:0"]`);if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"});},50);
        };
        return btn;
      }

      function updateBC(){
        const parts=[];
        if(P.greetIdx!=null) parts.push(D.P_GREET[P.greetIdx].t);
        if(P.npcType) parts.push(P.npcType);
        if(P.prefixIdx!=null){const k=(!P.npcType||P.npcType==="narc")?"narc":P.npcType;const px=D[`PREFIX_${P.tone}_${k}`][P.prefixIdx];parts.push('"'+((px&&(px.t||px))||"").toString().trim()+'"');}
        if(P.helloIdx!=null){const dn=P.helloDN||(P.npcType==="narc"?"D_NARC_HELLO":P.npcType==="angry"?"DECK_ANGRY_HELLO":"DECK_HUNGRY_HELLO");const h=D[dn][P.helloIdx];const t=h.t||h;parts.push('"'+t.slice(0,28)+(t.length>28?"\u2026":"")+'"');}
        document.getElementById("breadcrumb").textContent=parts.join(" \u2192 ")||"select a greeting to begin";
      }

      function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

      // ── export ────────────────────────────────────────────────────────────────────
      function doExport(){
        const ts=tags=>tags&&tags.length?`, tags: [${tags.map(t=>`"${t}"`).join(", ")}]`:`, tags: []`;
        const fs=f=>f?`, follows: "${f}"`:"";
        let out="";

        // plain string arrays (ambient + ack)
        const wPlain=(name,arr)=>{
          out+=`const ${name} = [\n`;
          arr.forEach(x=>{out+=`  ${JSON.stringify(typeof x==="string"?x:(x.t||x))},\n`;});
          out+=`];\n\n`;
        };
        wPlain("D_AMB_HUNGRY",       D.D_AMB_HUNGRY);
        wPlain("D_AMB_ANGRY",        D.D_AMB_ANGRY);
        wPlain("D_AMB_NARC",         D.D_AMB_NARC);
        wPlain("D_ACK_HUNGRY_ANGRY", D.D_ACK_HUNGRY_ANGRY);
        wPlain("D_ACK_NARC",         D.D_ACK_NARC);

        // P_GREET
        out+=`const P_GREET = [\n`;
        D.P_GREET.forEach(x=>{out+=`  { t: ${JSON.stringify(x.t)}${ts(x.tags)} },\n`;});
        out+=`];\n\n`;

        // HELLO_PREFIX
        out+=`const HELLO_PREFIX = {\n`;
        ["casual","concerned","direct"].forEach(tone=>{
          out+=`  ${tone}: {\n`;
          ["angry","hungry","narc"].forEach(k=>{
            const arr=D[`PREFIX_${tone}_${k}`];
            out+=`    ${k}: [${arr.map(x=>JSON.stringify(x.t||x)).join(", ")}],\n`;
          });
          out+=`  },\n`;
        });
        out+=`};\n\n`;

        // D_NARC_HELLO (plain array, not a Deck)
        out+=`const D_NARC_HELLO = [\n`;
        D.D_NARC_HELLO.forEach(x=>{out+=`  { t: ${JSON.stringify(x.t||x)}${ts(x.tags||[])} },\n`;});
        out+=`];\n\n`;

        // tagged arrays (with/without DM.Deck wrapper)
        const wArr=(name,arr,deck)=>{
          out+=`const ${name} = ${deck?"new DM.Deck(":""}[\n`;
          arr.forEach(x=>{
            if(x&&x.join!==undefined){
              const tp=x.tags&&x.tags.length?`, tags: [${x.tags.map(t=>`"${t}"`).join(", ")}]`:"";
              out+=`  { join: ${JSON.stringify(x.join)}, consent: ${JSON.stringify(x.consent)}${tp} },\n`;
              return;
            }
            const t=x.t||(typeof x==="string"?x:"");
            out+=`  { t: ${JSON.stringify(t)}${ts(x.tags||[])}${fs(x.follows)} },\n`;
          });
          out+=`]${deck?")":""};\n\n`;
        };

        wArr("DECK_ANGRY_HELLO",          D.DECK_ANGRY_HELLO,          true);
        wArr("DECK_HUNGRY_HELLO",         D.DECK_HUNGRY_HELLO,         true);
        wArr("DECK_ANGRY_PITCH",          D.DECK_ANGRY_PITCH,          true);
        wArr("DECK_HUNGRY_PITCH",         D.DECK_HUNGRY_PITCH,         true);
        wArr("D_F_INVITE",                D.D_F_INVITE,                false);
        wArr("D_NO_BYE",                  D.D_NO_BYE,                  false);
        wArr("D_SAY_MORE_WARM",           D.D_SAY_MORE_WARM,           true);
        wArr("D_SAY_MORE_SKEPTICAL",      D.D_SAY_MORE_SKEPTICAL,      true);
        wArr("D_JOIN_CONSENT_PAIRS",      D.D_JOIN_CONSENT_PAIRS,      false);
        wArr("DECK_MISMATCH_TOO_LITERAL",     D.DECK_MISMATCH_TOO_LITERAL,    true);
        wArr("DECK_MISMATCH_TOO_STRUCTURAL",  D.DECK_MISMATCH_TOO_STRUCTURAL, true);
        wArr("D_BACK_OFF_EARLY",          D.D_BACK_OFF_EARLY,          true);
        wArr("DECK_STRONGER_PITCH",       D.DECK_STRONGER_PITCH,       true);
        wArr("D_INVITE",                  D.D_INVITE,                  false);
        wArr("D_BACK_OFF_LATE",           D.D_BACK_OFF_LATE,           true);
        wArr("D_NARC_REVEAL",             D.D_NARC_REVEAL,             false);
        wArr("D_NOT_NOW",                 D.D_NOT_NOW,                 false);
        wArr("D_RETURN",                  D.D_RETURN,                  false);

        const blob=new Blob([out],{type:"text/javascript"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;a.download="game-data-words.js";a.click();
        URL.revokeObjectURL(url);
      }
      function exportJS(){doExport();}

      // ── drag-to-scroll ────────────────────────────────────────────────────────────
      (function(){
        const sc=document.getElementById("cols-scroll");
        let down=false,sx=0,sl=0;
        sc.addEventListener("mousedown",e=>{ if(e.target.closest(".item,.add-btn,.hbtn,.ebtn,.section-sep"))return; down=true;sx=e.pageX-sc.offsetLeft;sl=sc.scrollLeft;sc.classList.add("dragging"); });
        sc.addEventListener("mouseleave",()=>{down=false;sc.classList.remove("dragging");});
        sc.addEventListener("mouseup",()=>{down=false;sc.classList.remove("dragging");});
        sc.addEventListener("mousemove",e=>{ if(!down)return;e.preventDefault();sc.scrollLeft=sl-(e.pageX-sc.offsetLeft-sx); });
      })();

      window.addEventListener("error",e=>{const b=document.getElementById("error-box");b.style.display="block";b.textContent="error: "+e.message+" \u2014 "+e.filename+":"+e.lineno;});

      loadV(); loadData(); loadSec(); render();
    </script>
  </body>
