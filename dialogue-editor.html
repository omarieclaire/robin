<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>dialogue editor</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f2efe8;
        --bg2: #e8e4da;
        --bg3: #dedad0;
        --bg4: #cec9be;
        --border: #b8b3a6;
        --border2: #9e9990;
        --text: #1c1a14;
        --muted: #5a5648;
        --dim: #9e9888;
        --accent: #7a5c10;
        --accent2: #1e5c30;
        --danger: #7a1c1c;
        --hdr-bg: #1c2818;
        --hdr-text: #e8dfc0;
        --col: 300px;

        --sel-bg: #fffbe8;
        --sel-border: #c8a020;
        --sel-bar: #c8a020;
        --unsel-bg: #faf8f2;
        --unsel-border: #b8b3a6;
        --other-bg: #f5f2ea;
        --other-border: #ccc8bc;
        --other-bar: #ccc8bc;

        /* ── thread colours ── */
        --tc-greet: #2a9d8f; /* teal   — greet → hello */
        --tc-hello: #e9a820; /* amber  — hello → pitch */
        --tc-pitch: #3a86c8; /* blue   — pitch → filler */
        --tc-filler: #8b5cf6; /* purple — filler → recruit */
        --tc-recruit: #2e9e58; /* green  — recruit → npc response */
        --tc-saymore: #e07b30; /* orange — say-more → stronger */
        --tc-stronger: #6a3fc0; /* indigo — recruit → npc response */
        --tc-outcome: #c0458a; /* pink   — stronger → outcome */
        --tc-terminal: #a32020; /* red    — terminal items */

        /* header tint backgrounds (very light) */
        --th-greet: #e0f5f3;
        --th-hello: #fdf3d8;
        --th-pitch: #deeaf8;
        --th-filler: #ede8ff;
        --th-recruit: #daf2e4;
        --th-saymore: #fdebd8;
        --th-stronger: #ede8ff;
        --th-outcome: #fce8f3;
      }

      body {
        overscroll-behavior: none;
        touch-action: none;
        background: var(--bg);
        color: var(--text);
        font-family: "Georgia", "Times New Roman", serif;
        font-size: 2rem;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      #hdr {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 18px;
        background: var(--hdr-bg);
        border-bottom: 2px solid #3a4a30;
        flex-shrink: 0;
        height: 44px;
      }
      #hdr-title {
        color: #c8b870;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-size: 2rem;
        font-family: "Courier New", monospace;
        font-weight: bold;
        white-space: nowrap;
      }
      #breadcrumb {
        flex: 1;
        font-size: 2rem;
        font-family: "Courier New", monospace;
        color: #8a9e7a;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        padding: 0 12px;
      }
      .hbtn {
        background: transparent;
        border: 1px solid #4a6040;
        color: #a0b888;
        padding: 5px 13px;
        cursor: pointer;
        font-family: "Courier New", monospace;
        font-size: 1rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .hbtn:hover {
        border-color: #c8b870;
        color: #c8b870;
      }
      .hbtn.primary {
        border-color: #c8b870;
        color: #c8b870;
      }
      .hbtn.danger {
        border-color: #c07070;
        color: #c07070;
      }

      /* ── flow legend bar ── */
      #flow-bar {
        display: flex;
        align-items: stretch;
        flex-shrink: 0;
        height: 28px;
        background: #141e10;
        border-bottom: 1px solid #3a4a30;
        overflow-x: auto;
        overflow-y: hidden;
        gap: 0;
        font-family: "Courier New", monospace;
        font-size: 1rem;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      #flow-bar::-webkit-scrollbar {
        height: 3px;
      }
      #flow-bar::-webkit-scrollbar-thumb {
        background: #3a4a30;
      }
      .fb-step {
        display: flex;
        align-items: center;
        padding: 0 12px;
        white-space: nowrap;
        border-right: 1px solid #2a3820;
        color: #8aaa70;
        gap: 5px;
      }
      .fb-step.active {
        color: #e8d060;
        background: #1e2c18;
      }
      .fb-step.done {
        color: #9acc78;
      }
      .fb-step.end-good {
        color: #6acc88;
        background: #0e1e10;
      }
      .fb-step.end-bad {
        color: #cc8888;
        background: #1e1010;
      }
      .fb-step .fb-n {
        font-size: 1rem;
        opacity: 0.6;
        margin-right: 2px;
      }
      .fb-arr {
        color: #5a7850;
        padding: 0 2px;
      }

      #cols-scroll {
        flex: 1;
        overflow-x: scroll;
        overflow-y: hidden;
        cursor: grab;
        user-select: none;
      }
      #cols-scroll.dragging {
        cursor: grabbing;
      }
      #cols-scroll::-webkit-scrollbar {
        height: 5px;
      }
      #cols-scroll::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 3px;
      }

      #cols {
        display: flex;
        height: 100%;
        width: max-content;
        min-width: 100%;
      }

      .col {
        flex-shrink: 0;
        width: var(--col);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }

      /* ── column header thread-colour tints ── */
      .col.player .col-hdr {
        background: #f0ead8;
        border-bottom-color: #d0c8a8;
      }
      .col.player .col-hdr-label {
        color: #6a4e10;
      }
      .col.npc .col-hdr {
        background: #dce8d8;
        border-bottom-color: #b8ccb0;
      }
      .col.npc .col-hdr-label {
        color: #2a4a20;
      }
      .col.end-col .col-hdr {
        background: #1e1a14;
        border-bottom-color: #3a3020;
      }
      .col.end-col .col-hdr-label {
        color: #7a6840;
      }
      .col.browse .col-hdr {
        background: #2a3420;
        border-bottom-color: #3a4830;
      }
      .col.browse .col-hdr-label {
        color: #7a9860;
        letter-spacing: 2px;
      }

      /* thread-colour column header overrides */
      .col.tc-greet .col-hdr {
        background: var(--th-greet);
        border-bottom: 3px solid var(--tc-greet);
      }
      .col.tc-hello .col-hdr {
        background: var(--th-hello);
        border-bottom: 3px solid var(--tc-hello);
      }
      .col.tc-pitch .col-hdr {
        background: var(--th-pitch);
        border-bottom: 3px solid var(--tc-pitch);
      }
      .col.tc-filler .col-hdr {
        background: var(--th-filler);
        border-bottom: 3px solid var(--tc-filler);
      }
      .col.tc-recruit .col-hdr {
        background: var(--th-recruit);
        border-bottom: 3px solid var(--tc-recruit);
      }
      .col.tc-saymore .col-hdr {
        background: var(--th-saymore);
        border-bottom: 3px solid var(--tc-saymore);
      }
      .col.tc-stronger .col-hdr {
        background: var(--th-stronger);
        border-bottom: 3px solid var(--tc-stronger);
      }
      .col.tc-outcome .col-hdr {
        background: var(--th-outcome);
        border-bottom: 3px solid var(--tc-outcome);
      }

      .col-hdr {
        display: flex;
        align-items: center;
        padding: 7px 1rem;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        min-height: 38px;
        gap: 6px;
      }
      .col-hdr-label {
        font-size: 1rem;
        font-family: "Courier New", monospace;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--muted);
        flex: 1;
        font-weight: bold;
      }

      .col-path-note {
        font-size: 1rem;
        font-family: "Courier New", monospace;
        color: var(--dim);
        font-style: italic;
        padding: 4px 1rem 4px;
        background: #f8f5ee;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .col-path-note.good {
        background: #eef6e8;
        color: #2a6020;
        border-bottom-color: #c0d8b0;
      }
      .col-path-note.bad {
        background: #f8eeee;
        color: #7a2020;
        border-bottom-color: #d0b0b0;
      }
      .col-path-note.narc {
        background: #f0e8f8;
        color: #5a1888;
        border-bottom-color: #c0a0d8;
      }

      .col-prog {
        height: 2px;
        background: var(--border);
        flex-shrink: 0;
      }
      .col-prog-bar {
        height: 100%;
        background: var(--accent2);
        transition: width 0.3s;
      }

      .col-body {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
      }
      .col-body::-webkit-scrollbar {
        width: 3px;
      }
      .col-body::-webkit-scrollbar-thumb {
        background: var(--border2);
      }

      /* ── section separators ── */
      .section-sep {
        font-size: 1rem;
        font-family: "Courier New", monospace;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--muted);
        padding: 8px 8px 6px;
        border-top: 1px solid var(--border);
        margin-top: 4px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
        font-weight: bold;
        background: #f5f0e4;
      }
      .section-sep:first-child {
        border-top: none;
        margin-top: 0;
        padding-top: 6px;
      }
      .section-sep:hover {
        color: var(--accent);
      }
      .section-sep .sec-tog {
        font-size: 1rem;
        color: var(--muted);
        margin-left: 6px;
        flex-shrink: 0;
      }
      .section-items.collapsed-sec {
        display: none;
      }

      /* section header colour by thread */
      .section-sep.tc-greet {
        background: var(--th-greet);
        border-left: 3px solid var(--tc-greet);
        color: #1a6060;
      }
      .section-sep.tc-hello {
        background: var(--th-hello);
        border-left: 3px solid var(--tc-hello);
        color: #7a5010;
      }
      .section-sep.tc-pitch {
        background: var(--th-pitch);
        border-left: 3px solid var(--tc-pitch);
        color: #1a4878;
      }
      .section-sep.tc-filler {
        background: var(--th-filler);
        border-left: 3px solid var(--tc-filler);
        color: #4a2a98;
      }
      .section-sep.tc-recruit {
        background: var(--th-recruit);
        border-left: 3px solid var(--tc-recruit);
        color: #1a6038;
      }
      .section-sep.tc-saymore {
        background: var(--th-saymore);
        border-left: 3px solid var(--tc-saymore);
        color: #8a4018;
      }
      .section-sep.tc-stronger {
        background: var(--th-stronger);
        border-left: 3px solid var(--tc-stronger);
        color: #3a1888;
      }
      .section-sep.tc-outcome {
        background: var(--th-outcome);
        border-left: 3px solid var(--tc-outcome);
        color: #782060;
      }
      .section-sep.tc-terminal {
        background: #fdf0f0;
        border-left: 3px solid var(--tc-terminal);
        color: #7a1c1c;
      }

      /* ── items ── */
      .item {
        padding: 9px 11px 9px 13px;
        margin-bottom: 4px;
        border: 1px solid var(--unsel-border);
        border-left: 3px solid transparent;
        background: var(--unsel-bg);
        cursor: pointer;
        border-radius: 2px;
        position: relative;
        transition:
          border-color 0.1s,
          background 0.1s;
      }
      .item:hover:not(.editing):not(.selected):not(.inferred) {
        border-color: var(--border2);
        border-left-color: var(--border2);
        background: #f0ede4;
      }
      .item.selected {
        border-color: var(--sel-border);
        border-left: 6px solid var(--sel-bar);
        background: #fff8d6;
      }
      .item.selected.thread-greet {
        border-right: 2px dashed var(--tc-greet);
      }
      .item.selected.thread-hello {
        border-right: 2px dashed var(--tc-hello);
      }
      .item.selected.thread-pitch {
        border-right: 2px dashed var(--tc-pitch);
      }
      .item.selected.thread-filler {
        border-right: 2px dashed var(--tc-filler);
      }
      .item.selected.thread-recruit {
        border-right: 2px dashed var(--tc-recruit);
      }
      .item.selected.thread-saymore {
        border-right: 2px dashed var(--tc-saymore);
      }
      .item.selected.thread-stronger {
        border-right: 2px dashed var(--tc-stronger);
      }
      .item.selected.thread-outcome {
        border-right: 2px dashed var(--tc-outcome);
      }
      .item.selected.thread-terminal {
        border-right: 3px solid var(--tc-terminal);
      }
      .item.inferred {
        border: 1px dotted #7aaa58;
        border-left: 6px solid #7aaa58;
        background: #eef6e8;
      }
      .item.other {
        border-color: var(--other-border);
        border-left-color: var(--other-bar);
        background: var(--other-bg);
      }
      .item.angry {
        border-left-color: #b05050;
      }
      .item.hungry {
        border-left-color: #b08820;
      }
      .item.selected.angry {
        border-left-color: var(--sel-bar);
      }
      .item.selected.hungry {
        border-left-color: var(--sel-bar);
      }
      .item.inferred.angry {
        border-left-color: #7aaa58;
      }
      .item.inferred.hungry {
        border-left-color: #7aaa58;
      }

      /* ── thread right-border on items ── */
      /* continuing items get a dashed right border in the thread colour of the NEXT column */
      .item.thread-greet {
        border-right: 2px dashed var(--tc-greet);
      }
      .item.thread-hello {
        border-right: 2px dashed var(--tc-hello);
      }
      .item.thread-pitch {
        border-right: 2px dashed var(--tc-pitch);
      }
      .item.thread-filler {
        border-right: 2px dashed var(--tc-filler);
      }
      .item.thread-recruit {
        border-right: 2px dashed var(--tc-recruit);
      }
      .item.thread-saymore {
        border-right: 2px dashed var(--tc-saymore);
      }
      .item.thread-stronger {
        border-right: 2px dashed var(--tc-stronger);
      }
      .item.thread-outcome {
        border-right: 2px dashed var(--tc-outcome);
      }
      /* terminal items get solid red right border */
      .item.thread-terminal {
        border-right: 3px solid var(--tc-terminal);
      }

      .item-text {
        line-height: 1.6;
        font-size: 1.2rem;
        color: var(--text);
      }
      .item.unvisited .item-text {
        font-weight: bold;
      }
      .item.visited .item-text {
        font-weight: normal;
      }
      .item-meta {
        margin-top: 5px;
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        align-items: center;
      }

      .tag {
        font-size: 1rem;
        padding: 1px 5px;
        font-family: "Courier New", monospace;
        background: var(--bg4);
        color: var(--muted);
        border: 1px solid var(--border2);
        border-radius: 2px;
        letter-spacing: 0.5px;
      }
      .tag.f {
        background: #d0eccc;
        color: #1a5218;
        border-color: #8acc88;
      }

      .badge {
        font-size: 1rem;
        padding: 1px 6px;
        font-family: "Courier New", monospace;
        border-radius: 2px;
        letter-spacing: 1px;
        text-transform: uppercase;
        border: 1px solid;
      }
      .b-angry {
        background: #fdf0e0;
        color: #804010;
        border-color: #d0a070;
      }
      .b-hungry {
        background: #e0eef8;
        color: #104080;
        border-color: #80a8d0;
      }
      .b-narc {
        background: #f0e0f8;
        color: #500888;
        border-color: #b878d8;
      }

      .score-badge {
        font-size: 1rem;
        padding: 1px 5px;
        font-family: "Courier New", monospace;
        border-radius: 2px;
        border: 1px solid;
        letter-spacing: 0.5px;
      }
      .score-4 {
        background: #d0eccc;
        color: #1a5218;
        border-color: #8acc88;
      }
      .score-2 {
        background: #f0e8c0;
        color: #504010;
        border-color: #c8b860;
      }
      .score-0 {
        background: var(--bg4);
        color: var(--muted);
        border-color: var(--border2);
      }

      .score-divider {
        font-size: 1rem;
        font-family: "Courier New", monospace;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        padding: 6px 6px 3px;
        color: var(--accent2);
        border-top: 2px solid #c8dcc0;
        margin-top: 4px;
        margin-bottom: 2px;
        background: #eef6e8;
      }

      /* ── unmatched toggle ── */
      .unmatched-toggle {
        font-size: 1rem;
        font-family: "Courier New", monospace;
        color: var(--dim);
        padding: 5px 8px;
        cursor: pointer;
        border: 1px dashed var(--border);
        margin: 4px 0;
        background: var(--bg3);
        border-radius: 2px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .unmatched-toggle:hover {
        color: var(--accent);
        border-color: var(--accent);
      }
      .unmatched-items.hidden {
        display: none;
      }

      .item:not(.editing) .edit-hint {
        display: none;
        position: absolute;
        top: 7px;
        right: 8px;
        font-size: 1rem;
        color: var(--dim);
        opacity: 0.6;
      }
      .item:not(.editing):hover .edit-hint {
        display: block;
      }

      .end-note {
        padding: 9px;
        font-size: 1rem;
        font-family: "Courier New", monospace;
        color: var(--muted);
        font-style: italic;
        border: 1px dashed var(--border2);
        border-right: 2px solid var(--tc-terminal);
        margin-bottom: 4px;
        border-radius: 2px;
      }
      .end-note.good {
        background: #eef6e8;
        border-color: #7aaa58;
        border-right-color: var(--tc-recruit);
        color: #2a6020;
      }
      .end-note.bad {
        background: #f8eeee;
        border-color: #d09090;
        border-right-color: var(--tc-terminal);
        color: #7a2020;
      }

      .item.editing {
        border-color: var(--accent2);
        background: #eaf4e8;
      }
      .edit-ta {
        width: 100%;
        background: #faf8f2;
        border: 1px solid var(--border2);
        color: var(--text);
        font-family: "Georgia", serif;
        font-size: 1rem;
        resize: vertical;
        min-height: 52px;
        padding: 5px;
        outline: none;
        line-height: 1.6;
        border-radius: 2px;
      }
      .edit-ta:focus {
        border-color: var(--accent2);
      }
      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-top: 5px;
        align-items: center;
      }
      .tag-e {
        font-size: 1rem;
        padding: 1px 5px;
        font-family: "Courier New", monospace;
        background: #fdf5d8;
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 2px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .tag-e:hover {
        background: #f8e8a0;
      }
      .tag-x {
        color: var(--danger);
        font-size: 1rem;
        line-height: 1;
        cursor: pointer;
      }
      .tag-in {
        font-size: 1rem;
        padding: 2px 6px;
        font-family: "Courier New", monospace;
        background: #faf8f2;
        color: var(--text);
        border: 1px solid var(--border2);
        border-radius: 2px;
        width: 90px;
        outline: none;
      }
      .tag-in:focus {
        border-color: var(--accent2);
      }
      .follows-row {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 5px;
        font-size: 1rem;
        color: var(--muted);
        font-family: "Courier New", monospace;
      }
      .follows-in {
        font-size: 1rem;
        padding: 2px 6px;
        font-family: "Courier New", monospace;
        background: #faf8f2;
        color: #1e5c30;
        border: 1px solid #8acc88;
        border-radius: 2px;
        width: 11rem;
        outline: none;
      }
      .follows-in:focus {
        border-color: var(--accent2);
      }
      .edit-acts {
        display: flex;
        gap: 4px;
        margin-top: 6px;
      }
      .ebtn {
        font-size: 1rem;
        padding: 3px 1rem;
        font-family: "Courier New", monospace;
        background: var(--bg3);
        border: 1px solid var(--border2);
        color: var(--text);
        cursor: pointer;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-radius: 2px;
      }
      .ebtn.save {
        border-color: var(--accent2);
        color: var(--accent2);
        background: #eaf4e8;
      }
      .ebtn.cancel {
        color: var(--muted);
      }
      .ebtn.del {
        border-color: var(--danger);
        color: var(--danger);
        margin-left: auto;
        background: #f8eeee;
      }

      .add-btn {
        width: 100%;
        padding: 6px;
        margin-bottom: 4px;
        background: none;
        border: 1px dashed var(--border2);

    <script>

      window.DIALOG_BOX = { tl: "+", tr: "+", bl: "+", br: "+", h: "-", v: "|" };

    <script>
      const D = {
        P_GREET: P_GREET,
        D_NARC_HELLO: D_NARC_HELLO,
        DECK_ANGRY_HELLO: DECK_ANGRY_HELLO.src,
        DECK_HUNGRY_HELLO: DECK_HUNGRY_HELLO.src,
        DECK_ANGRY_PITCH: DECK_ANGRY_PITCH.src,
        DECK_HUNGRY_PITCH: DECK_HUNGRY_PITCH.src,
        DECK_NARC_AGREE: DECK_NARC_AGREE.src,
        DECK_BAD_READ: DECK_BAD_READ.src,
        D_F_INVITE: D_F_INVITE,
        D_NO_BYE: D_NO_BYE,
        D_SAY_MORE_WARM: D_SAY_MORE_WARM.src,
        D_SAY_MORE_SKEPTICAL: D_SAY_MORE_SKEPTICAL.src,
        D_JOIN_CONSENT_PAIRS: D_JOIN_CONSENT_PAIRS,
        DECK_MISMATCH_TOO_LITERAL: DECK_MISMATCH_TOO_LITERAL.src,
        DECK_MISMATCH_TOO_STRUCTURAL: DECK_MISMATCH_TOO_STRUCTURAL.src,
        D_BACK_OFF_EARLY: DECK_BACK_OFF_EARLY.src,
        DECK_BAIL_RESPONSE: DECK_BAIL_RESPONSE.src,
        DECK_STRONGER_PITCH: DECK_STRONGER_PITCH.src,
        D_BACK_OFF_LATE: DECK_BACK_OFF_LATE.src,
        D_NARC_REVEAL: D_NARC_REVEAL,
        D_NOT_NOW: D_NOT_NOW,
        D_RETURN: D_RETURN,
        D_AMB_HUNGRY: D_AMB_HUNGRY,
        D_AMB_ANGRY: D_AMB_ANGRY,
        D_AMB_NARC: D_AMB_NARC,
        D_ACK_HUNGRY_ANGRY: D_ACK_HUNGRY_ANGRY,
        D_ACK_NARC: D_ACK_NARC,
        D_FILLER: DECK_FILLER.src,
      };
      ["casual", "concerned", "direct"].forEach((tone) =>
        ["angry", "hungry", "narc"].forEach((kind) => (D[`PREFIX_${tone}_${kind}`] = HELLO_PREFIX[tone][kind])),
      );

      const SK = "dlg_ed_v5",
        SK_DATA = "dlg_ed_data_v5",
        SK_SEC = "dlg_ed_sec_v5";
      const SAVEABLE = [
        "P_GREET",
        "D_NARC_HELLO",
        "DECK_ANGRY_HELLO",
        "DECK_HUNGRY_HELLO",
        "DECK_ANGRY_PITCH",
        "DECK_HUNGRY_PITCH",
        "DECK_BAD_READ",
        "D_F_INVITE",
        "D_NO_BYE",
        "D_SAY_MORE_WARM",
        "D_SAY_MORE_SKEPTICAL",
        "D_JOIN_CONSENT_PAIRS",
        "DECK_MISMATCH_TOO_LITERAL",
        "DECK_MISMATCH_TOO_STRUCTURAL",
        "D_BACK_OFF_EARLY",
        "DECK_BAIL_RESPONSE",
        "DECK_STRONGER_PITCH",
        "D_BACK_OFF_LATE",
        "D_NARC_REVEAL",
        "D_NOT_NOW",
        "D_RETURN",
        "D_AMB_HUNGRY",
        "D_AMB_ANGRY",
        "D_AMB_NARC",
        "D_ACK_HUNGRY_ANGRY",
        "D_ACK_NARC",
        "D_FILLER",
        "PREFIX_casual_angry",
        "PREFIX_casual_hungry",
        "PREFIX_casual_narc",
        "PREFIX_concerned_angry",
        "PREFIX_concerned_hungry",
        "PREFIX_concerned_narc",
        "PREFIX_direct_angry",
        "PREFIX_direct_hungry",
        "PREFIX_direct_narc",
      ];

      function saveData() {
        try {
          const snap = {};
          SAVEABLE.forEach((k) => {
            if (D[k]) snap[k] = JSON.parse(JSON.stringify(D[k]));
          });
          localStorage.setItem(SK_DATA, JSON.stringify(snap));
        } catch (e) {
          console.warn("saveData failed", e);
        }
      }
      function loadData() {
        try {
          const s = localStorage.getItem(SK_DATA);
          if (!s) return;
          const snap = JSON.parse(s);
          Object.entries(snap).forEach(([k, v]) => {
            if (D[k] && Array.isArray(v)) {
              D[k].length = 0;
              v.forEach((x) => D[k].push(x));
            }
          });
        } catch (e) {
          console.warn("loadData failed", e);
        }
      }

      function hardRefresh() {
        const ov = document.createElement("div");
        ov.style.cssText =
          "position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;font-family:Courier New,monospace";
        const bx = document.createElement("div");
        bx.style.cssText =
          "background:#1c2818;border:1px solid #c07070;padding:28px 32px;max-width:400px;display:flex;flex-direction:column;gap:14px";
        bx.innerHTML = `<div style="font-size:11px;color:#c07070;letter-spacing:2px;text-transform:uppercase;font-family:Courier New,monospace">reload file</div><div style="font-size:12px;line-height:1.7;color:#c8d8b0;font-family:Georgia,serif">Step 1: download your current edits.<br>Step 2: wipe localStorage and reload from source.<br><br><strong style="color:#e8dfc0">Do step 1 first &mdash; step 2 is permanent.</strong></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button id="dlbtn" style="font-family:Courier New,monospace;font-size:1rem;padding:5px 14px;background:transparent;border:1px solid #6aaa48;color:#8acc68;cursor:pointer;letter-spacing:1px;text-transform:uppercase">1. download edits</button><button id="rlbtn" style="font-family:Courier New,monospace;font-size:1rem;padding:5px 14px;background:transparent;border:1px solid #c07070;color:#e08080;cursor:pointer;letter-spacing:1px;text-transform:uppercase">2. reload file</button><button id="cancelbtn" style="font-family:Courier New,monospace;font-size:1rem;padding:5px 14px;background:transparent;border:1px solid #4a6040;color:#8a9e7a;cursor:pointer;letter-spacing:1px;text-transform:uppercase">cancel</button></div>`;
        ov.appendChild(bx);
        document.body.appendChild(ov);
        bx.querySelector("#dlbtn").onclick = () => {
          doExport();
          bx.querySelector("#dlbtn").textContent = "1. downloaded ✓";
          bx.querySelector("#dlbtn").style.opacity = "0.5";
        };
        bx.querySelector("#rlbtn").onclick = () => {
          document.body.removeChild(ov);
          localStorage.removeItem(SK_DATA);
          location.reload(true);
        };
        bx.querySelector("#cancelbtn").onclick = () => document.body.removeChild(ov);
      }

      let VIS = {};
      function loadV() {
        try {
          const s = localStorage.getItem(SK);
          if (s) VIS = JSON.parse(s);
        } catch (e) {}
      }
      function saveV() {
        try {
          localStorage.setItem(SK, JSON.stringify(VIS));
        } catch (e) {}
      }
      function vis(k) {
        return !!VIS[k];
      }
      function markV(k) {
        VIS[k] = true;
        saveV();
      }
      function resetVisited() {
        if (!confirm("Reset all visited markers?")) return;
        VIS = {};
        saveV();
        render();
      }

      let SEC = {};
      function loadSec() {
        try {
          const s = localStorage.getItem(SK_SEC);
          if (s) SEC = JSON.parse(s);
        } catch (e) {}
      }
      function saveSec() {
        try {
          localStorage.setItem(SK_SEC, JSON.stringify(SEC));
        } catch (e) {}
      }
      function isSec(id, lbl) {
        return !!SEC[`${id}::${lbl}`];
      }
      function toggleSec(id, lbl) {
        SEC[`${id}::${lbl}`] = !SEC[`${id}::${lbl}`];
        saveSec();
        render();
      }

      // unmatched-open state — resets on hello pick
      let UNMATCHED_OPEN = {};
      function resetUnmatched() {
        UNMATCHED_OPEN = {};
      }
      function isUnmatchedOpen(key) {
        return !!UNMATCHED_OPEN[key];
      }
      function toggleUnmatched(key) {
        UNMATCHED_OPEN[key] = !UNMATCHED_OPEN[key];
        render();
      }

      const ROUTING_TAGS = new Set(["casual", "concerned", "direct"]);
      function tagsOf(item) {
        return (item.tags || []).filter((t) => !ROUTING_TAGS.has(t));
      }

      function dmScore(item, followTags) {
        const tags = tagsOf(item);
        if (tags.some((t) => followTags && followTags.includes(t))) return 2;
        return 0;
      }
      function scoreAndSort(items, followTags) {
        return items.map((x) => ({ ...x, score: dmScore(x, followTags) })).sort((a, b) => b.score - a.score);
      }

      function allTags() {
        const s = new Set();
        Object.values(D).forEach((v) => {
          if (!Array.isArray(v)) return;
          v.forEach((x) => {
            if (x && x.tags) x.tags.forEach((t) => s.add(t));
            if (x && x.follows) s.add(x.follows);
          });
        });
        return [...s].sort();
      }

      // ── state ──
      let P = {},
        EDIT_KEY = null,
        colFilters = {},
        lastFocusColId = null;

      function wrapPlain(arr, dn) {
        return arr.map((x, i) => ({
          key: `${dn}:${i}`,
          text: typeof x === "string" ? x : x.t || x,
          tags: typeof x === "string" ? [] : x.tags || [],
          idx: i,
          selected: false,
        }));
      }

      // ── flow bar ──
      function getFlowSteps() {
        const steps = [
          { label: "greet", colId: "greet" },
          { label: "prefix", colId: "prefix" },
          { label: "hello", colId: "hello" },
          { label: "pitch", colId: "pitch" },
        ];
        if (P.isBoEarly) {
          steps.push({ label: "bail response", colId: "bail_resp", endBad: true });
          steps.push({ label: "END", colId: null, endBad: true });
          return steps;
        }
        if (P.pitchDeck === "DECK_BAD_READ") {
          steps.push({ label: "mismatch", colId: "mismatch", endBad: true });
          steps.push({ label: "END", colId: null, endBad: true });
          return steps;
        }
        steps.push({ label: "filler", colId: "filler" });
        steps.push({ label: "recruit / walk?", colId: "f_invite" });
        if (P.walkedAway) {
          steps.push({ label: "END", colId: null, endBad: true });
          return steps;
        }
        steps.push({ label: "npc response", colId: "npcresp" });
        if (P.joinedEarly) {
          steps.push({ label: "✓ recruited", colId: null, endGood: true });
          return steps;
        }
        steps.push({ label: "stronger pitch / walk?", colId: "stronger" });
        if (P.isBOLate) {
          steps.push({ label: "END", colId: null, endBad: true });
          return steps;
        }
        if (P.strongerDeck) {
          if (P.npcType === "narc") steps.push({ label: "narc reveal → heat+1", colId: "outcome", endBad: true });
          else steps.push({ label: "outcome", colId: "outcome" });
        }
        return steps;
      }

      function renderFlowBar() {
        const bar = document.getElementById("flow-bar");
        bar.innerHTML = "";
        const steps = getFlowSteps();
        const doneIds = new Set();
        if (P.greetIdx != null) doneIds.add("greet");
        if (P.prefixIdx != null) doneIds.add("prefix");
        if (P.helloIdx != null) doneIds.add("hello");
        if (P.pitchDeck != null) doneIds.add("pitch");
        if (P.isBoEarly) doneIds.add("bail_resp");
        if (P.pitchDeck === "DECK_BAD_READ" && P.pitchIdx != null) doneIds.add("mismatch");
        if (P.fillerSeen) doneIds.add("filler");
        if (P.fInviteIdx != null) doneIds.add("f_invite");
        if (P.smDeck != null) doneIds.add("npcresp");
        if (P.strongerDeck != null) doneIds.add("stronger");
        if (P.outcomeSeen) doneIds.add("outcome");
        steps.forEach((step, i) => {
          if (i > 0) {
            const arr = document.createElement("span");
            arr.className = "fb-arr";
            arr.textContent = "›";
            bar.appendChild(arr);
          }
          const el = document.createElement("span");
          el.className = "fb-step";
          if (step.endGood) el.classList.add("end-good");
          else if (step.endBad) el.classList.add("end-bad");
          else if (step.colId && doneIds.has(step.colId)) el.classList.add("done");
          el.innerHTML = `<span class="fb-n">${i + 1}</span>${step.label}`;
          bar.appendChild(el);
        });
      }

      // ── column builder ──
      function buildCols() {
        const cols = [];

        // AMBIENT
        cols.push({
          id: "ambient",
          label: "ambient / ack lines",
          deckName: null,
          locked: false,
          isBrowse: true,
          sections: [
            { label: "hungry ambient", deckName: "D_AMB_HUNGRY", items: wrapPlain(D.D_AMB_HUNGRY, "D_AMB_HUNGRY") },
            { label: "angry ambient", deckName: "D_AMB_ANGRY", items: wrapPlain(D.D_AMB_ANGRY, "D_AMB_ANGRY") },
            { label: "narc ambient", deckName: "D_AMB_NARC", items: wrapPlain(D.D_AMB_NARC, "D_AMB_NARC") },
            { label: "ack hungry/angry", deckName: "D_ACK_HUNGRY_ANGRY", items: wrapPlain(D.D_ACK_HUNGRY_ANGRY, "D_ACK_HUNGRY_ANGRY") },
            { label: "ack narc", deckName: "D_ACK_NARC", items: wrapPlain(D.D_ACK_NARC, "D_ACK_NARC") },
          ],
          onSelect: () => {},
        });

        // STEP 1: PLAYER GREETS
        cols.push({
          id: "greet",
          label: "1 · player greets",
          deckName: "P_GREET",
          role: "player",
          tc: "greet",
          stepNote: "DECK_GREET · draws freely · tone tag → prefix only",
          clearKey: [
            "greetIdx",
            "tone",
            "prefixIdx",
            "helloIdx",
            "helloDN",
            "helloTags",
            "npcType",
            "pitchDeck",
            "pitchIdx",
            "pitchTags",
            "isBoEarly",
            "walkedAway",
            "fillerSeen",
            "fInviteIdx",
            "smDeck",
            "smIdx",
            "smTags",
            "joinedEarly",
            "strongerDeck",
            "strongerIdx",
            "isBOLate",
            "outcomeSeen",
          ],
          items: D.P_GREET.map((x, i) => ({
            key: `P_GREET:${i}`,
            text: x.t,
            tags: x.tags,
            idx: i,
            selected: P.greetIdx === i,
            threadClass: "thread-hello",
          })),
          onSelect: (_dn, i) => {
            const same = P.greetIdx === i;
            if (same) {
              _clearFrom("greetIdx");
              render();
              return;
            }
            P.greetIdx = i;
            P.tone = D.P_GREET[i].tags[0] || "casual";
            _clearFrom("prefixIdx");
            scrollColTop("prefix");
            render();
          },
        });
