<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>phrase tester</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #161616;
        color: #bbb;
        font-family: "Courier New", monospace;
        font-size: 13px;
        padding: 24px;
        max-width: 860px;
        font-size: 1rem;
      }
      h1 {
        color: #eee;
        font-size: 15px;
        font-weight: normal;
        margin-bottom: 20px;
        letter-spacing: 2px;
      }

      .controls {
        display: flex;
        gap: 16px;
        align-items: flex-end;
        margin-bottom: 28px;
        flex-wrap: wrap;
        padding-bottom: 20px;
        border-bottom: 1px solid #2a2a2a;
      }
      .ctrl {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .ctrl label {
        color: #555;
        font-size: 1rem;
        letter-spacing: 1px;
      }
      select,
      input[type="number"] {
        background: #222;
        border: 1px solid #383838;
        color: #ccc;
        padding: 7px 1rem;
        font-family: inherit;
        font-size: 12px;
        border-radius: 3px;
        outline: none;
      }
      input[type="number"] {
        width: 64px;
      }
      button {
        background: #2a3a2a;
        border: 1px solid #3a5a3a;
        color: #7aba7a;
        padding: 8px 22px;
        font-family: inherit;
        font-size: 12px;
        border-radius: 3px;
        cursor: pointer;
        letter-spacing: 1px;
      }
      button:hover {
        background: #344a34;
      }

      .conversations {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .conv-block {
        background: #1e1e1e;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        padding: 18px;
      }
      .conv-header {
        font-size: 1rem;
        color: #c9c9c984;
        letter-spacing: 1px;
        margin-bottom: 14px;
        padding-bottom: 1rem;
        border-bottom: 1px solid #252525;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .badge {
        font-size: 0.8rem;
        padding: 2px 8px;
        border-radius: 2px;
        letter-spacing: 1px;
      }
      .badge.narc {
        background: #3a1a1a;
        color: #c77;
      }
      .badge.angry {
        background: #2a2a1a;
        color: #ba8;
      }
      .badge.hungry {
        background: #1a2a2a;
        color: #7ab;
      }

      .ambient {
        color: #8a9aba;
        font-style: italic;
        font-size: 1rem;
        margin-bottom: 14px;
        padding: 6px 1rem;
        border-left: 2px solid #2a2a2a;
        justify-content: flex-end;
        display: flex;
      }
      .ambient::before {
        content: '"';
      }
      .ambient::after {
        content: '"';
      }

      .line {
        margin: 5px 0;
        display: flex;
      }
      .line.player {
        justify-content: flex-start;
      }
      .line.npc {
        justify-content: flex-end;
      }

      .line.choice .bubble {
        background: #1a1a1a;
        color: #555;
        border: 1px dashed #349134;
        font-size: 1rem;
        max-width: 90%;
      }

      .bubble {
        max-width: 72%;
        padding: 7px 12px;
        border-radius: 3px;
        line-height: 1.5;
      }
      .line.player .bubble {
        background: #1e2e1e;
        color: #8aba8a;
        border: 1px solid #2a3a2a;
      }
      .line.npc .bubble {
        background: #1e1e2e;
        color: #8a9aba;
        border: 1px solid #2a2a3a;
      }
      .line.npc.narc-reveal .bubble {
        background: #2a1616;
        color: #c07070;
        border: 1px solid #4a2020;
      }

      .outcome {
        margin-top: 12px;
        padding-top: 1rem;
        border-top: 1px solid #252525;
        font-size: 1rem;
        letter-spacing: 1px;
      }
      .outcome.joined {
        color: #5a9a5a;
      }
      .outcome.declined {
        color: #8a8a50;
      }
      .outcome.narc {
        color: #9a4a4a;
      }
      .outcome.backed {
        color: #555;
      }
      .outcome.deferred {
        color: #4a7a8a;
      }

      #error-box {
        background: #2a1616;
        border: 1px solid #5a2020;
        color: #c07070;
        padding: 12px;
        border-radius: 3px;
        margin-bottom: 20px;
        font-size: 11px;
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>// phrase tester</h1>
    <div id="error-box"></div>

    <div class="controls">
      <div class="ctrl">
        <label>NPC TYPE</label>
        <select id="npcType">
          <option value="mixed">mixed</option>
          <option value="narc">narc only</option>
          <option value="angry">angry only</option>
          <option value="hungry">hungry only</option>
        </select>
      </div>
      <div class="ctrl">
        <label>COUNT</label>
        <input type="number" id="count" value="3" min="1" max="20" />
      </div>
      <div class="ctrl">
        <label>&nbsp;</label>
        <button onclick="runSim()">run simulation</button>
      </div>
    </div>

    <div class="conversations" id="output"></div>

    <script src="game-data.js"></script>
    <script src="game-data-words-engine.js"></script>
    <script src="game-data-words.js"></script>

    <script>
      // Stubs so game.js doesn't crash on missing DOM / audio / game infrastructure
      window.GAME_DATA = window.GAME_DATA || {
        buildings: [],
        playerArt: [[" @ "], [" @ "]],
        npcArts: [["&"]],
        npcColors: ["#aaa"],
        narcArt: ["%"],
        robinArt: ["R"],
        narrativeQuotes: [],
      };
      const _noop = () => {};
      const _noopO = () => ({});
      window.audio = { play: _noop };
      window.grid = { set: _noop, text: _noop, textCenter: _noop, art: _noop };
      window.Util = window.Util || {
        pick: (arr) => arr[Math.floor(Math.random() * arr.length)],
        clamp: (v, a, b) => Math.max(a, Math.min(b, v)),
        randInt: (a, b) => Math.floor(Math.random() * (b - a + 1)) + a,
        lerp: (a, b, t) => a + (b - a) * t,
      };
      window.phase = "tester";
      window.W = 80;
      window.H = 30;
      window.dialogStack = [];
      window.C_PLAYER = "#7aba7a";
      window.C_DIM = "#555";
      window.C_DANGER = "#c44";
      window.C_SUCCESS = "#7aba7a";
      window.C_TEAL = "#7ababa";
      window.C_ORANGE = "#ba8a4a";
      window.C_WARN = "#ba8a4a";
      window.bannerTimer = 0;
      window.hasPlayed = false;
      window.showBanner = _noop;
      window.updateBanner = _noop;
      window.renderBanner = _noop;
      window.dialogUpdate = _noop;
      window.dialogRender = _noop;
      window.addFloat = _noop;
      window.spark = _noop;
      window.triggerChromatic = _noop;
      window.endGame = _noop;
      window.initAct2b = _noop;
      window.hudLabel = { textContent: "" };
      window.hudScore = { textContent: "", style: {} };
      window.hudStatus = { textContent: "", style: {} };
      if (!document.getElementById("gamescreen")) {
        const gs = document.createElement("canvas");
        gs.id = "gamescreen";
        gs.style.display = "none";
        document.body.appendChild(gs);
      }
      window.gs = document.getElementById("gamescreen");
      window.input = { isDown: _noop, justPressed: _noop };
      window.clickPending = false;
      window.CONV_BOX = { tl: "+", tr: "+", bl: "+", br: "+", h: "-", v: "|" };
      window.DIALOG_BOX = { tl: "+", tr: "+", bl: "+", br: "+", h: "-", v: "|" };
      window.A1_LOOP_MSGS = [];
      window.HA = [[""]];
      window.HC = ["#fff"];
    </script>
    <script>
      function simulateConversation(npcType, npcKind) {
        const lines = [];
        const add = (speaker, text, meta = "", tags = []) =>
          lines.push({ speaker, text, meta, tags });

        // ── TP 0: startConv ──
        DM.startConv();

        // ambient
        const ambLine =
          npcType === "narc"
            ? DM.draw(DECK_AMB_NARC)
            : npcKind === "hungry"
            ? DM.draw(DECK_AMB_HUNGRY)
            : DM.draw(DECK_AMB_ANGRY);
        add("ambient", ambLine);

        // ── TP 0: player greet — capture tone via rawTagsOf ──
        // greet deck uses routing tags (casual/concerned/direct) for HELLO_PREFIX.
        // drawWithTags returns { text, tags (non-routing), tone (routing) }.
        const greetResult = DM.drawWithTags(DECK_GREET);
        const greetTone = greetResult.tone ?? greetResult.tags[0] ?? "casual";
        add("player", greetResult.text);

        // ── TP 12: NPC hello ──
        const helloDeck =
          npcType === "narc"
            ? DECK_NARC_HELLO
            : npcKind === "angry"
            ? DECK_ANGRY_HELLO
            : DECK_HUNGRY_HELLO;

        const { text: helloText, tags: helloTags } = DM.drawWithTags(helloDeck);

        const npcKindKey = npcType === "narc" ? "narc" : npcKind;
        const prefixPool = HELLO_PREFIX[greetTone]?.[npcKindKey] ?? [];
        const helloPrefix =
          prefixPool.length > 0
            ? prefixPool[Math.floor(Math.random() * prefixPool.length)] + " "
            : "";
        add("npc", helloPrefix + helloText, "", helloTags);

        // ── TP 13: seed hello tags, build first pitch choices ──
        // FIX: seed AFTER hello draw, BEFORE pitch draw — matching game TP 13.
        for (const t of helloTags) DM._seedConvTag(t);

        const npcPrefix =
          npcType === "narc" ? DM.draw(DECK_ACK_NARC) + " " : "";

        let angryResult, hungryResult;

        if (helloTags.length > 0) {
          // FIX: hello had a topic — use drawNoRecord with follows (matches game).
          angryResult = DM.drawNoRecord(DECK_ANGRY_PITCH, {
            boost: true,
            follows: helloTags,
          });
          hungryResult = DM.drawNoRecord(DECK_HUNGRY_PITCH, {
            boost: true,
            follows: helloTags,
          });
        } else {
          // FIX: hello was untagged — use drawForEmpty so pitch doesn't invent a topic.
          angryResult = DM.drawForEmpty(DECK_ANGRY_PITCH);
          hungryResult = DM.drawForEmpty(DECK_HUNGRY_PITCH);
        }

        const choiceTags = [angryResult.tags, hungryResult.tags, []];

        const bail = Math.random() < 0.1;
        let choiceIdx = bail
          ? 2
          : npcKind === "angry"
          ? Math.random() < 0.75
            ? 0
            : 1
          : Math.random() < 0.75
          ? 1
          : 0;
        if (npcType === "narc") choiceIdx = Math.random() < 0.5 ? 0 : 1;

        const backOffEarly = DM.draw(DECK_BACK_OFF_EARLY);
        add("choice", (choiceIdx === 0 ? "▶ " : "  ") + "a→ " + npcPrefix + angryResult.text, "", angryResult.tags);
        add("choice", (choiceIdx === 1 ? "▶ " : "  ") + "h→ " + npcPrefix + hungryResult.text, "", hungryResult.tags);
        add("choice", (choiceIdx === 2 ? "▶ " : "  ") + "n→ " + backOffEarly);

        // TP 25: bailed early
        if (choiceIdx === 2) {
          add("player", backOffEarly);
          DM.endConv();
          return { lines, outcome: "backed", npcType, npcKind };
        }

        // ── TP 1: player picks first pitch ──
        const pitchTags = choiceTags[choiceIdx];
        add(
          "player",
          choiceIdx === 0
            ? npcPrefix + angryResult.text
            : npcPrefix + hungryResult.text,
          "",
          pitchTags
        );

        // FIX: seed chosen pitch tags AFTER choice is made (matches game TP 1).
        for (const t of pitchTags ?? []) DM._seedConvTag(t);

        // Append invite line (DECK_F_INVITE in game — use same deck name if it exists,
        // fall back to DECK_INVITE so the tester stays runnable standalone).
        const inviteDeckEarly =
          typeof DECK_F_INVITE !== "undefined" ? DECK_F_INVITE : DECK_INVITE;
        add("player", DM.draw(inviteDeckEarly));

        // ── TP 14: check match, NPC reacts ──
        const matched =
          (choiceIdx === 0 && npcKind === "angry") ||
          (choiceIdx === 1 && npcKind === "hungry");

        let sayMoreTags = pitchTags;

        if (npcType === "narc") {
          // Narc: always go through skeptical say-more
          const skeptResult = DM.drawWithTags(DECK_SAY_MORE_SKEPTICAL, {
            follows: pitchTags,
            boost: false,
          });
          sayMoreTags =
            skeptResult.tags.length > 0 ? skeptResult.tags : pitchTags;
          add("npc", skeptResult.text, "", sayMoreTags);

        } else if (!matched) {
          // Mismatch: decline and exit
          const mismatchDeck =
            choiceIdx === 0 && npcKind === "hungry"
              ? DECK_MISMATCH_TOO_STRUCTURAL
              : DECK_MISMATCH_TOO_LITERAL;
          add("npc", DM.draw(mismatchDeck) + " " + DM.draw(DECK_NO_BYE));
          DM.endConv();
          return { lines, outcome: "declined", npcType, npcKind };

        } else {
          // FIX: 80% chance to skip say-more and go straight to join (matches game).
          if (Math.random() < 0.8) {
            const pair = DM.draw(DECK_JOIN_CONSENT);
            add("npc", pair.join);
            add("npc", pair.consent);
            DM.endConv();
            return { lines, outcome: "joined", npcType, npcKind };
          }

          // FIX: boost: true on warm (matches game TP 14).
          const warmResult = DM.drawWithTags(DECK_SAY_MORE_WARM, {
            follows: pitchTags,
            boost: true,
          });
          sayMoreTags =
            warmResult.tags.length > 0 ? warmResult.tags : pitchTags;
          add("npc", warmResult.text, "", sayMoreTags);
        }

        // ── TP 15: second pitch choices ──
        const pitchFollows =
          sayMoreTags ?? pitchTags ?? helloTags ?? [];

        // Game uses plain draw() here, not drawWithTags — matches TP 15.
        const strongerLine = DM.draw(DECK_STRONGER_PITCH, {
          boost: true,
          follows: pitchFollows,
        });
        const backOffLate = DM.draw(DECK_BACK_OFF_LATE);
        const goStronger = Math.random() < 0.8;

        add("choice", (goStronger ? "▶ " : "  ") + "s→ " + strongerLine);
        add("choice", (!goStronger ? "▶ " : "  ") + "n→ " + backOffLate);

        // ── TP 23/24: second choice resolve ──
        if (!goStronger) {
          add("player", backOffLate);
          DM.endConv();
          return { lines, outcome: "backed", npcType, npcKind };
        }

        add("player", strongerLine);
        add("player", DM.draw(DECK_INVITE));

        if (npcType === "narc") {
          add("npc", DM.draw(DECK_NARC_REV), "narc-reveal");
          DM.endConv();
          return { lines, outcome: "narc", npcType, npcKind };
        } else if (Math.random() < 0.6) {
          const pair = DM.draw(DECK_JOIN_CONSENT);
          add("npc", pair.join);
          add("npc", pair.consent);
          DM.endConv();
          return { lines, outcome: "joined", npcType, npcKind };
        } else {
          add("npc", DM.draw(DECK_NOT_NOW));
          DM.endConv();
          return { lines, outcome: "deferred", npcType, npcKind };
        }
      }

      function renderConv(conv, idx) {
        const outcomeText = {
          joined: "✓ joined",
          declined: "✗ declined",
          narc: "⚠ narc revealed",
          backed: "→ backed off",
          deferred: "~ deferred, maybe later",
        };
        const typeLabel =
          conv.npcType === "narc"
            ? "narc"
            : conv.npcKind === "angry"
            ? "angry"
            : "hungry";
        let h = `<div class="conv-block">`;
        h += `<div class="conv-header"><span>conversation ${idx + 1}</span>`;
        h += `<span class="badge ${typeLabel}">${typeLabel}</span></div>`;
        let prevSpeaker = null;
        for (const line of conv.lines) {
          if (line.speaker === "ambient") {
            h += `<div class="ambient">${esc(line.text)}</div>`;
            prevSpeaker = null;
            continue;
          }
          const cls = `line ${
            line.speaker === "choice" ? "choice player" : line.speaker
          }${line.meta ? " " + line.meta : ""}`;
          if (line.speaker === "npc" && prevSpeaker === "npc") {
            const tagNote2 =
              line.tags && line.tags.length > 0
                ? `<span style="opacity:0.35; font-size:0.75rem; margin-left:6px">(${line.tags.join(", ")})</span>`
                : `<span style="opacity:0.2; font-size:0.75rem; margin-left:6px">(0)</span>`;
            h = h.slice(0, h.lastIndexOf("</div></div>"));
            h += `<br><br>${esc(line.text)}${tagNote2}</div></div>`;
          } else {
            const tagNote =
              line.tags && line.tags.length > 0
                ? `<span style="opacity:0.35; font-size:0.75rem; margin-left:6px">(${line.tags.join(", ")})</span>`
                : `<span style="opacity:0.2; font-size:0.75rem; margin-left:6px">(0)</span>`;
            h += `<div class="${cls}"><div class="bubble">${esc(line.text)}${tagNote}</div></div>`;
          }
          prevSpeaker = line.speaker;
        }
        h += `<div class="outcome ${conv.outcome}">${
          outcomeText[conv.outcome] || conv.outcome
        }</div>`;
        h += `</div>`;
        return h;
      }

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function runSim() {
        [
          DECK_ANGRY_HELLO,
          DECK_HUNGRY_HELLO,
          DECK_NARC_HELLO,
          DECK_ANGRY_PITCH,
          DECK_HUNGRY_PITCH,
          DECK_STRONGER_PITCH,
          DECK_SAY_MORE_WARM,
          DECK_SAY_MORE_SKEPTICAL,
          DECK_GREET,
          DECK_INVITE,
          DECK_BACK_OFF_EARLY,
          DECK_BACK_OFF_LATE,
          DECK_JOIN_CONSENT,
          DECK_NO_BYE,
          DECK_NOT_NOW,
          DECK_RETURN,
          DECK_NARC_REV,
          DECK_ACK_NARC,
          DECK_MISMATCH_TOO_LITERAL,
          DECK_MISMATCH_TOO_STRUCTURAL,
          DECK_AMB_NARC,
          DECK_AMB_HUNGRY,
          DECK_AMB_ANGRY,
        ].forEach((d) => {
          if (d) d.pile = [];
        });
        DM.startConv();

        const sel = document.getElementById("npcType").value;
        const count = Math.min(
          20,
          Math.max(1, parseInt(document.getElementById("count").value) || 3)
        );
        let html = "";
        for (let i = 0; i < count; i++) {
          let npcType, npcKind;
          if (sel === "narc") {
            npcType = "narc";
            npcKind = "angry";
          } else if (sel === "angry") {
            npcType = "norm";
            npcKind = "angry";
          } else if (sel === "hungry") {
            npcType = "norm";
            npcKind = "hungry";
          } else {
            npcType = Math.random() < 0.13 ? "narc" : "norm";
            npcKind = Math.random() < 0.5 ? "angry" : "hungry";
          }
          html += renderConv(simulateConversation(npcType, npcKind), i);
        }
        document.getElementById("output").innerHTML = html;
      }

      window.addEventListener("error", (e) => {
        const box = document.getElementById("error-box");
        box.style.display = "block";
        box.textContent =
          "game.js error (add a stub): " +
          e.message +
          " — " +
          e.filename +
          ":" +
          e.lineno;
      });

      runSim();
    </script>
  </body>
</html>
