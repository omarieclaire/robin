        /* Washed-out building colours for 2b */
        const A2B_BCOL = ["#b9a89a", "#9ab89a", "#9a9ab8", "#b8a09a", "#9aa8b0", "#a89ab0", "#b0a898", "#98a8b0"];
        /* Vivid NPC colours for 2b */
        const A2B_NPC_COL = ["#0ff", "#f0f", "#ff0", "#0f8", "#f80", "#8f0", "#80f", "#f08", "#08f"];

        let a2bWX, a2bT, a2bSpd, a2bPX, a2bPY, a2bNPCs, a2bMob, a2bHt;
        let a2bTopParts, a2bBotParts;
        let a2bStoreX, a2bDone, a2bFloats;
        const A2B_MH = 3;

        /* Layout constants — computed from H */
        let A2B_TOP_H, A2B_BOT_H, A2B_ROAD_Y1, A2B_ROAD_Y2;

        function a2bCalcLayout() {
          /* Top buildings: rows 1 to ~25% of H
             Road: ~25% to ~75% of H
             Bottom buildings: ~75% to ~95% of H
             Last row: ground/heat display */
          A2B_TOP_H = Math.max(5, Math.floor(H * 0.22));
          A2B_BOT_H = Math.max(5, Math.floor(H * 0.22));
          A2B_ROAD_Y1 = A2B_TOP_H + 1; /* top sidewalk line */
          A2B_ROAD_Y2 = H - A2B_BOT_H - 2; /* bottom sidewalk line */
        }

        function a2bGenRow(totalWX) {
          /* Generate a row of buildings to fill totalWX pixels */
          const parts = [];
          let sx = 0;
          while (sx < totalWX) {
            const bldg = Util.pick(A2B_BUILDINGS);
            parts.push({
              wx: sx,
              art: bldg.art,
              w: bldg.size,
              col: Util.pick(A2B_BCOL),
            });
            sx += bldg.size + Util.randInt(1, 3);
          }
          return parts;
        }

        function a2bGenNPCs() {
          a2bNPCs = [];
          /* NPCs only in the road zone */
          const midY = Math.floor((A2B_ROAD_Y1 + A2B_ROAD_Y2) / 2);
          const roadH = A2B_ROAD_Y2 - A2B_ROAD_Y1;
          const spacing = Math.max(12, Math.floor((a2bStoreX - 50) / 25));
          for (let nx = 30; nx < a2bStoreX - 20; nx += Util.randInt(spacing, spacing + 10)) {
            const isNarc = Math.random() < 0.15;
            const ny = Util.randInt(A2B_ROAD_Y1 + 2, A2B_ROAD_Y2 - 2);
            const npcArt = isNarc ? ["%", "\u03C6"] : Util.pick(A2_NPC_ARTS);
            a2bNPCs.push({
              wx: nx + Util.randInt(-3, 3),
              wy: ny,
              narc: isNarc,
              st: "idle",
              ch: npcArt[0],
              art: npcArt,
              col: isNarc ? "#b99" : Util.pick(A2B_NPC_COL),
              shoutT: 0,
              shoutMsg: "",
              amb: isNarc
                ? Util.pick(["fine.", "whatever", "hmm", "nah"])
                : Util.pick(["hungry", "ugh", "broke", "tired", "help", "sigh", "rent...", "bills", "empty"]),
            });
          }
        }

        function initAct2b() {
          phase = "act2b";
          a2bCalcLayout();
          a2bT = 0;
          a2bSpd = 0.007;
          a2bWX = 0;
          /* Player starts in the middle of the road */
          a2bPX = 10;
          a2bPY = Math.floor((A2B_ROAD_Y1 + A2B_ROAD_Y2) / 2);
          /* Carry over existing crew from Act 2 */
          a2bMob = [];
          for (let i = 0; i < a2Crew.length; i++) {
            const c = a2Crew[i];
            a2bMob.push({
              ox: -Util.randInt(2, 4 + Math.floor(i / 3)),
              oy: Util.randInt(-2, 2),
              ch: (c.art && c.art[0]) || "@",
              art: c.art || A2_NPC,
              col: A2B_NPC_COL[i % A2B_NPC_COL.length],
              b: c.b || Math.random() * 6,
            });
          }
          a2bHt = 0;
          a2bFloats = [];
          a2bDone = false;
          a2bStoreX = Math.floor(30000 * 0.007) + W;
          /* Generate building rows — enough for the whole level */
          a2bTopParts = a2bGenRow(a2bStoreX + W);
          a2bBotParts = a2bGenRow(a2bStoreX + W);
          a2bGenNPCs();
          dialogStack = [];
          bannerTimer = 0;
          showBanner("RALLY THE NEIGHBOURHOOD!", "#e8944a", 2500);
          hudLabel.textContent = "CREW";
          hudScore.textContent = String(a2CrewCount);
          hudStatus.textContent = "";
          hudStatus.style.color = "#2a7a2a";
        }

        function updateAct2b(dt) {
          a2bT += dt;
          updateBanner(dt);
          /* Scroll */
          a2bWX += a2bSpd * dt;
          a2bSpd = 0.007 + a2bT * 0.0000003;
          /* Player movement — constrained to road */
          const ms = 0.025;
          if (input.isDown("up")) a2bPY -= ms * dt;
          if (input.isDown("down")) a2bPY += ms * dt;
          if (input.isDown("left")) a2bPX -= ms * dt;
          if (input.isDown("right")) a2bPX += ms * dt;
          if (clickPending && phase === "act2b") {
            clickPending = false;
            if (clickSY < a2bPY - 2) a2bPY -= 3;
            else if (clickSY > a2bPY + 2) a2bPY += 3;
            if (clickSX < a2bPX - 3) a2bPX -= 3;
            else if (clickSX > a2bPX + 3) a2bPX += 3;
          }
          a2bPY = Util.clamp(a2bPY, A2B_ROAD_Y1 + 1, A2B_ROAD_Y2 - 1);
          a2bPX = Util.clamp(a2bPX, 3, W - 4);
          /* Floats */
          for (let i = a2bFloats.length - 1; i >= 0; i--) {
            a2bFloats[i].life -= dt;
            a2bFloats[i].y -= 0.002 * dt;
            if (a2bFloats[i].life <= 0) a2bFloats.splice(i, 1);
          }
          /* Shout timers */
          for (const n of a2bNPCs) {
            if (n.shoutT > 0) n.shoutT -= dt;
          }
          /* Collision — 3s grace period */
          const pwx = a2bWX + a2bPX;
          if (a2bT > 3000) {
            for (const n of a2bNPCs) {
              if (n.st !== "idle") continue;
              if (Math.abs(n.wx - pwx) < 2.5 && Math.abs(n.wy - a2bPY) < 2) {
                if (n.narc) {
                  n.st = "narc";
                  n.col = "#c33";
                  n.shoutMsg = Util.pick(["SECURITY!", "NO WAY!", "COPS!", "NOT ON MY WATCH!"]);
                  n.shoutT = 2000;
                  a2bHt++;
                  a2bFloats.push({ text: "NARC!", x: Math.round(a2bPX), y: a2bPY - 2, col: "#c33", life: 1500 });
                  if (a2bHt >= A2B_MH) {
                    setTimeout(() => endGame("busted"), 1500);
                    return;
                  }
                } else {
                  n.st = "joined";
                  n.shoutMsg = Util.pick(["I'M IN!", "LET'S GO!", "ALLONS-Y!", "COUNT ME IN!", "YEAH!", "FOR REAL!"]);
                  n.shoutT = 1500;
                  a2CrewCount++;
                  a2bMob.push({
                    ox: -Util.randInt(2, 4 + Math.floor(a2bMob.length / 3)),
                    oy: Util.randInt(-2, 2),
                    ch: n.ch,
                    art: n.art,
                    col: n.col,
                    b: Math.random() * 6,
                  });
                  a2bFloats.push({ text: "+1", x: Math.round(a2bPX), y: a2bPY - 2, col: "#2a2", life: 1000 });
                  showBanner(Util.pick(["New Robin!", "They're in!", "Crew grows!", "One more!"]), "#2a2", 1200);
                }
              }
            }
          }
          /* Store reached — stop when store is about 1/3 from right edge */
          if (a2bWX >= a2bStoreX - W * 0.7 && !a2bDone) {
            a2bDone = true;
            a2bSpd = 0;
            showBanner(a2CrewCount + " Robins. One store. LET'S EAT.", "#5cbdbd", 999999);
            setTimeout(() => initAct3(), 2000);
          }
          /* HUD */
          hudScore.textContent = String(a2CrewCount);
          if (a2bHt > 0) {
            hudStatus.textContent = "HEAT: " + a2bHt + "/" + A2B_MH;
            hudStatus.style.color = a2bHt >= 2 ? "#c33" : "#a80";
          } else {
            hudStatus.textContent = "";
          }
        }

        function renderAct2b() {
          /* ── Top building row (slight parallax 0.85×) ── */
          const topScrollX = a2bWX * 0.85;
          for (const sp of a2bTopParts) {
            const sx = Math.round(sp.wx - topScrollX);
            if (sx + sp.w < -2 || sx > W + 2) continue;
            /* Bottom-align art within the top band */
            const artH = sp.art.length;
            const by = A2B_TOP_H - artH;
            grid.art(sp.art, sx, Math.max(0, by), sp.col);
          }
          /* Top sidewalk */
          for (let x = 0; x < W; x++) {
            grid.set(x, A2B_ROAD_Y1, "\u2550", "#b0a898");
          }

          /* ── Road zone — clean, no dots ── */
          /* Centre dashes — lane markings */
          const roadMidY = Math.floor((A2B_ROAD_Y1 + A2B_ROAD_Y2) / 2);
          for (let x = 0; x < W; x++) {
            const wx = x + Math.floor(a2bWX);
            if (wx % 8 < 4) grid.set(x, roadMidY, "\u2500", "#ddd");
          }

          /* ── Bottom sidewalk ── */
          for (let x = 0; x < W; x++) {
            grid.set(x, A2B_ROAD_Y2, "\u2550", "#b0a898");
          }

          /* ── Bottom building row (1× scroll) ── */
          for (const sp of a2bBotParts) {
            const sx = Math.round(sp.wx - a2bWX);
            if (sx + sp.w < -2 || sx > W + 2) continue;
            /* Top-align art just below bottom sidewalk */
            grid.art(sp.art, sx, A2B_ROAD_Y2 + 1, sp.col);
          }

          /* ── NPCs ── */
          for (const n of a2bNPCs) {
            const sx = Math.round(n.wx - a2bWX);
            if (sx < -2 || sx > W + 2) continue;
            if (n.st === "joined" && n.shoutT <= 0) continue;
            /* Draw 2-row art instead of single char */
            const art = n.art || [n.ch, "\u03C6"];
            grid.art(art, sx, n.wy, n.col);
            /* Ambient speech — bordered box with word wrap */
            if (n.st === "idle" && n.shoutT <= 0 && a2bT > 3000) {
              const dist = Math.abs(n.wx - (a2bWX + a2bPX));
              if (dist < 15 && dist > 4) {
                const maxInner = 16;
                const words = n.amb.split(" "),
                  lines = [];
                let cur = "";
                for (const w of words) {
                  if (cur.length + w.length + 1 > maxInner) {
                    lines.push(cur);
                    cur = w;
                  } else cur = cur ? cur + " " + w : w;
                }
                if (cur) lines.push(cur);
                const bw = Math.min(maxInner + 2, Math.max(...lines.map((l) => l.length)) + 2);
                const bh = lines.length + 2;
                const tx = Util.clamp(sx - Math.floor(bw / 2), 0, W - bw);
                const ty = n.wy - bh - 1;
                if (ty >= A2B_ROAD_Y1 && ty + bh < A2B_ROAD_Y2) {
                  for (let by = ty; by < ty + bh && by < H; by++)
                    for (let bx2 = tx; bx2 < tx + bw && bx2 < W; bx2++) if (bx2 >= 0) grid.set(bx2, by, " ", null);
                  grid.text("\u250C" + "\u2500".repeat(bw - 2) + "\u2510", tx, ty, n.col);
                  for (let li = 0; li < lines.length; li++) {
                    grid.text("\u2502" + " ".repeat(bw - 2) + "\u2502", tx, ty + 1 + li, n.col);
                    grid.text(lines[li], tx + 1, ty + 1 + li, n.col);
                  }
                  grid.text("\u2514" + "\u2500".repeat(bw - 2) + "\u2518", tx, ty + 1 + lines.length, n.col);
                }
              }
            }
            /* Shout — replaces ambient text, uses same box style */
            if (n.shoutT > 0) {
              const txt = n.shoutMsg;
              const bw = txt.length + 2;
              const tx = Util.clamp(sx - Math.floor(bw / 2), 0, W - bw);
              const sc = n.narc ? "#c44" : n.col;
              const ty = n.wy - 3;
              if (ty >= A2B_ROAD_Y1 && ty + 2 < A2B_ROAD_Y2) {
                for (let by = ty; by <= ty + 2 && by < H; by++)
                  for (let bx2 = tx; bx2 < tx + bw && bx2 < W; bx2++) if (bx2 >= 0) grid.set(bx2, by, " ", null);
                grid.text("\u250C" + "\u2500".repeat(bw - 2) + "\u2510", tx, ty, sc);
                grid.text("\u2502" + txt + "\u2502", tx, ty + 1, sc);
                grid.text("\u2514" + "\u2500".repeat(bw - 2) + "\u2518", tx, ty + 2, sc);
              }
            }
          }

          /* ── Mob trailing player ── */
          const ppx = Math.round(a2bPX),
            ppy = Math.round(a2bPY);
          for (let i = 0; i < a2bMob.length; i++) {
            const m = a2bMob[i];
            const mx = ppx + m.ox + Math.round(Math.sin(a2bT / 300 + m.b) * 0.8);
            const my = ppy + m.oy + Math.round(Math.sin(a2bT / 400 + m.b + 1) * 0.5);
            if (mx >= 0 && mx < W && my > A2B_ROAD_Y1 && my < A2B_ROAD_Y2) {
              /* Use their original art and colour */
              const art = m.art || [m.ch, "\u03C6"];
              const col = m.col || "#3a9a3a";
              grid.art(art, mx, my, col);
            }
          }

          /* ── Player — same 2-row art as Act 2 ── */
          grid.art(A2_PA[Math.floor(a2bT / 250) % 2], ppx, ppy, C_PLAYER);

          /* ── Floats ── */
          for (const f of a2bFloats) {
            if (f.life < 100) continue;
            for (let i = 0; i < f.text.length; i++) {
              const fx = Math.round(f.x) + i,
                fy = Math.round(f.y);
              if (fx >= 0 && fx < W && fy >= 0 && fy < H) grid.set(fx, fy, f.text[i], f.col);
            }
          }

          /* ── Heat indicator ── */
          if (a2bHt > 0) {
            grid.text("HEAT", W - 6, A2B_ROAD_Y1 + 1, "#c33");
            for (let i = 0; i < a2bHt; i++) grid.set(W - 1 - i, A2B_ROAD_Y1 + 1, "!", "#c33");
          }

          /* ── Store at far right — in the middle of the road ── */
          if (a2bWX > a2bStoreX - W - 20) {
            const stsx = Math.round(a2bStoreX - a2bWX);
            if (stsx < W + 10) {
              const stY = Math.floor((A2B_ROAD_Y1 + A2B_ROAD_Y2) / 2) - Math.floor(STO_H / 2);
              const fl = Math.sin(Date.now() / 400) > 0 ? C_PLAYER : "#a22";
              grid.art(STORE, stsx, stY, fl);
            }
          }

          renderBanner();
        }

        /* ══════════════════════════════════════════════════════════
   ACT 3: STOREFRONT — static scene, click to enter
   ══════════════════════════════════════════════════════════ */
        const RA2 = ["@", "\u0126"];
        let a3T;
        function initAct3() {
          phase = "act3";
          a3T = 0;
          bannerTimer = 0;
          dialogStack = [];
          showBanner(a2CrewCount + " Robins. One store. Let's eat.", "#c33", 999999);
          hudLabel.textContent = "CREW";
          hudScore.textContent = a2CrewCount;
          hudStatus.textContent = "";
        }
        function updateAct3(dt) {
          a3T += dt;
          updateBanner(dt);
          if (clickPending) {
            clickPending = false;
            if (a3T > 1200) initAct4();
          }
        }
        function renderAct3() {
          const sY = Math.floor(H * 0.62);
          for (let x = 0; x < W; x++) {
            grid.set(x, sY, "\u2550", "#444");
            grid.set(x, sY + 1, "\u2550", "#444");
          }
          /* No dots on ground */
          const sb = [
            "\u250C\u2500\u2500\u2500\u2500\u2510",
            "\u2502 [] \u2502",
            "\u2502    \u2502",
            "\u2502 [] \u2502",
            "\u2514\u2500\u2500\u2500\u2500\u2518",
          ];
          const scx = Math.floor((W - STO_W) / 2),
            stY = sY - STO_H;
          if (scx > 8) grid.art(sb, scx - 7, sY - sb.length, "#555");
          if (scx + STO_W + 8 < W) grid.art(sb, scx + STO_W + 1, sY - sb.length, "#555");
          grid.art(STORE, scx, stY, Math.sin(Date.now() / 500) > 0 ? C_PLAYER : "#a44");
          const dc = scx + Math.floor(STO_W / 2),
            ly = sY + 3,
            rc = Math.min(a2CrewCount, 12);
          const A2B_STABLE_COL = ["#0ff", "#f0f", "#ff0", "#0f8", "#f80", "#8f0", "#80f", "#f08", "#08f"];
          /* Player in middle — draw FIRST so robins don't overlap */
          const plGlow = a3T < 3000 ? (Math.floor(a3T / 150) % 2 === 0 ? "#fff" : C_PLAYER) : C_PLAYER;
          grid.art(A2_PA[Math.floor(a3T / 250) % 2], dc, ly, plGlow);
          /* Robins on either side of player */
          for (let i = 0; i < rc; i++) {
            const side = i % 2 === 0 ? -1 : 1;
            const slot = Math.floor((i + 2) / 2);
            const rx = dc + side * slot * 3;
            const crewArt = a2Crew[i] && a2Crew[i].art ? a2Crew[i].art : RA2;
            const crewCol = A2B_STABLE_COL[i % A2B_STABLE_COL.length];
            if (rx >= 0 && rx + 3 < W && ly + 3 < H) grid.art(crewArt, rx, ly + Math.round(Math.sin(Date.now() / 400 + i * 0.7) * 0.3), crewCol);
          }
          if (a3T > 1500) grid.textCenter("[ TAP TO ENTER ]", Math.min(H - 2, ly + 5), Math.sin(Date.now() / 300) > 0 ? C_PLAYER : "#888");
          renderBanner();
        }

        /* ══════════════════════════════════════════════════════════
   ACT 4: THE HEIST — side-scrolling grocery grab
   ══════════════════════════════════════════════════════════ */
        const FOODS = [
          { n: "Bread", p: 10, a: [" .----.", "/~~~~\\", "|~~~~|", "\\___ /"] },
          { n: "Cereal", p: 12, a: ["| OATZ |", "|  OO  |", "|_____|"] },
          { n: "Oats", p: 15, a: ["  _||_ ", "| OATZ|", "| 3.5%|", "|_____|"] },
          { n: "Soup", p: 8, a: ["| SOUPE|", "| MAISO|", "'-----'"] },
          { n: "Pasta", p: 10, a: ["| PENNE|", "| //// |", "|_____|"] },
          { n: "Eggs", p: 20, a: ["| oO Oo|", "| Oo oO|", "'-----'"] },
          { n: "Marg", p: 14, a: ["|MARG|", "| ==== |", "'-----'"] },
          { n: "Tofu", p: 25, a: ["|TOFU|", "| /\\_ |", "'-----'"] },
          { n: "Nuts", p: 22, a: [" /\\ /\\", "|NUTS|", " \\___/"] },
          { n: "Juice", p: 12, a: ["| JUS  |", "|D'ORAN|", "'-----'"] },
          { n: "Tofu2", p: 10, a: ["| TOFU |", "| [==] |", "'-----'"] },
        ];
        const FC = ["#b90", "#a86", "#8a6", "#ca8", "#a97", "#c66", "#c44", "#c70", "#48a"];
        const S4_BC_W = 20,
          S4_SLOT_W = 9,
          S4_BC_GAP = 6;
        const AH = 6;
        const SLH = 3;

        let s4WX, s4Sp, s4Ug, s4UR, s4GT, s4LM, s4IT;
        let s4As, s4Gs, s4Ex, s4PX2, s4PY2, s4St2;
        let s4Alys, s4GE, s4CM;
        let s4ExitPinned, s4ExitAisle, s4PlayerAisle;

        /* ── LAYOUT CONSTANTS (computed in init from H) ── */
        let S4_SHELF_ROWS /* how many shelf rows in the unit */,
          S4_SHELF_ROW_H /* height per shelf row (food art height + divider) */,
          S4_SHELF_TOP /* Y of top of shelving unit */,
          S4_SHELF_BOT /* Y of bottom of shelving unit */,
          S4_AISLE_TOP /* Y of top of aisle */,
          S4_AISLE_BOT /* Y of bottom of aisle */,
          S4_FLOOR_Y /* Y of the floor line */,
          S4_BAY_W; /* width of each shelf bay (visual column) */

        /* Store length and exit position */
        /* No fixed store length — endless scrolling */
        // let s4ExitWX; /* world-X of the exit */

        let s4ExitScreenX; /* exit is pinned to a screen position, not world */

        /* Items on shelves */
        let s4Items, s4Bookcases, s4RobinFloats;

        function s4GenBookcases(from, to) {
          const ns = Math.floor((S4_BC_W - 2) / S4_SLOT_W);
          let bx = s4Bookcases.length > 0 ? Math.max(from, s4Bookcases[s4Bookcases.length - 1].wx + S4_BC_W + S4_BC_GAP) : from;
          while (bx < to) {
            const items = [];
            for (let row = 0; row < S4_SHELF_ROWS; row++)
              for (let col = 0; col < ns; col++) items.push({ row, col, food: Util.pick(FOODS), color: Util.pick(FC), grabbed: false });
            s4Bookcases.push({ wx: bx, items });
            bx += S4_BC_W + S4_BC_GAP;
          }
          s4GE = to;
        }

        function initAct4() {
          phase = "act4";
          bannerTimer = 0;
          tmr.clear();
          dialogStack = [];
          s4WX = 0;
          s4Sp = 0.006;
          s4Ug = 0;
          s4UR = Math.max(0.005, 0.015 - a2CrewCount * 0.0004);
          s4GT = 0;
          s4LM = -1;
          s4IT = 0;
          s4St2 = 0;
          s4CM = [];
          s4RobinFloats = [];
          state.reset({ score: 0 });
          s4AlyScore = 0;
          s4ExitPinned = false;
          s4ExitScreenX = W - 8; /* pinned to right side of screen */

          /* ── Compute layout from screen height ──
             Top of screen: shelving unit (~60% of H)
             Below that: aisle (~25% of H, min 5 rows)
             Bottom: floor line + exit row */
          const aisleH = Math.max(5, Math.floor(H * 0.22));
          S4_FLOOR_Y = H - 2;
          S4_AISLE_BOT = S4_FLOOR_Y - 1;
          S4_AISLE_TOP = S4_AISLE_BOT - aisleH + 1;
          S4_SHELF_BOT = S4_AISLE_TOP - 1; /* bottom border of shelving unit */
          S4_SHELF_TOP = 1;

          /* Shelf rows: each row is 4 chars tall (3 food + 1 divider) */
          S4_SHELF_ROW_H = 5;
          const shelfInner = S4_SHELF_BOT - S4_SHELF_TOP - 1;
          S4_SHELF_ROWS = Math.max(2, Math.floor(shelfInner / S4_SHELF_ROW_H));

          /* ── Generate initial bookcases ── */
          s4Items = [];
          s4Bookcases = [];
          s4GE = 0;
          s4GenBookcases(0, W + 80);

          /* ── Player starts left-center of aisle ── */
          s4PX2 = Math.floor(W * 0.35);
          s4PY2 = Math.floor((S4_AISLE_TOP + S4_AISLE_BOT) / 2);
          s4PlayerAisle = 0;

          /* ── Security guards — spawn ahead off-screen ── */
          s4Gs = [];
          const numG = Math.max(1, 3 - Math.floor(a2CrewCount * 0.3));
          for (let i = 0; i < numG; i++) {
            s4Gs.push({
              wx: s4WX + W + Util.randInt(20, 60),
              wy: Util.randInt(S4_AISLE_TOP + 1, S4_AISLE_BOT - 1),
              vx: -0.004 - Math.random() * 0.004,
            });
          }

          /* ── Ally robins — trail behind player in the aisle ── */
          s4Alys = [];
          const ac = Math.min(a2CrewCount - 1, 6);
          for (let i = 0; i < ac; i++) {
            s4Alys.push({
              behindDist: 4 + i * 3,
              oy: Util.randInt(-1, 1),
              bobPhase: Math.random() * 6,
              grabCD: 0,
            });
          }

          /* Robin grab timer */
          tmr.every(1800 + Math.random() * 1500, () => {
            if (s4Alys.length === 0) return;
            /* Find an ungrabbed item near the robins (behind the player) */
            const robinWX = s4WX + s4PX2 - 8;
            let best = null,
              bestD = 999,
              bestWX = 0;
            for (const bc of s4Bookcases) {
              for (const it of bc.items) {
                if (it.grabbed) continue;
                const itWX = bc.wx + 1 + it.col * S4_SLOT_W;
                const d = Math.abs(itWX - robinWX);
                if (d < 15 && d < bestD) {
                  bestD = d;
                  best = it;
                  bestWX = itWX;
                }
              }
            }
            if (best) {
              best.grabbed = true;
              s4AlyScore += best.food.p;
              s4RobinFloats.push({
                text: "+$" + best.food.p,
                x: Math.round(bestWX - s4WX),
                y: S4_AISLE_TOP - 1,
                life: 1200,
                max: 1200,
                col: "#5cbdbd",
              });
            }
          });

          /* ── Remaining state ── */
          s4Ex = [];
          s4ExitPinned = false;
          s4ExitScreenX = W - 8; /* pinned to right side of screen */
          s4ExitAisle = -1;
          s4As = [{ y: S4_AISLE_TOP, items: [], isExit: false, aisleH: S4_AISLE_BOT - S4_AISLE_TOP }];
          s4GE = 0;

          hudLabel.textContent = "HAUL";
          hudScore.textContent = "$0";
          hudScore.style.color = C_PLAYER;
          hudStatus.textContent = "TAP FOOD TO GRAB!";
          hudStatus.style.color = "#5cbdbd";
          showBanner("Grab everything you can!", C_PLAYER, 2500);
        }

        const SU = [
          { a: 0, h: "GRAB!", c: "#5cbdbd" },
          { a: 0.15, h: "COPS CALLED", c: "#a80" },
          { a: 0.35, h: "HURRY", c: "#da0" },
          { a: 0.55, h: "CLOSE!", c: "#c60" },
          { a: 0.75, h: "GET OUT!", c: "#c44" },
          { a: 0.9, h: "LAST CHANCE", c: "#a00" },
          { a: 1, h: "TOO LATE", c: "#800" },
        ];

        function updateAct4(dt) {
          tmr.update(dt);
          s4GT += dt / 1000;
          s4Ug = Math.min(1, s4Ug + (s4UR * dt) / 1000);
          s4Sp = 0.006 + s4Ug * 0.008;
          updateBanner(dt);

          /* Urgency stages */
          for (let i = SU.length - 1; i >= 0; i--)
            if (s4Ug >= SU[i].a && i > s4LM) {
              if (SU[i].a >= 0.35) showBanner(SU[i].h, SU[i].c, 2000);
              s4LM = i;
            }
          if (s4Ug >= 1) {
            endGame("caught");
            return;
          }

          /* Exit appears after 8 seconds */
          if (!s4ExitPinned && s4GT > 8) {
            s4ExitPinned = true;
            showBanner("EXIT OPEN \u2014 BOTTOM RIGHT!", "#5cbdbd", 3000);
          }

          /* Intercom */
          s4IT += dt;
          if (s4IT > 20000 && s4Ug > 0.1) {
            s4IT = 0;
            showBanner(Util.pick(D_INTERCOM), "#c44", 2000);
          }

          /* Robin floats */
          for (let i = s4RobinFloats.length - 1; i >= 0; i--) {
            s4RobinFloats[i].life -= dt;
            s4RobinFloats[i].y -= 0.002 * dt;
            if (s4RobinFloats[i].life <= 0) s4RobinFloats.splice(i, 1);
          }

          /* ── Auto-scroll — endless ── */
          s4WX += s4Sp * dt;
          while (s4GE < s4WX + W + 80) s4GenBookcases(s4GE, s4GE + 80);
          s4Bookcases = s4Bookcases.filter((bc) => bc.wx + S4_BC_W > s4WX - 20);

          /* ── Player movement — up/down only + click to move ── */
          if (s4St2 > 0) s4St2 -= dt;
          if (s4St2 <= 0) {
            if (input.isDown("up")) s4PY2 -= 0.02 * dt;
            if (input.isDown("down")) s4PY2 += 0.02 * dt;
          }

          /* ── Click handling ── */
          if (clickPending && phase === "act4") {
            clickPending = false;

            /* Check if clicking on a food item in a bookcase */
            let grabbedItem = false;
            outer4: for (const bc of s4Bookcases) {
              const bsx = Math.round(bc.wx - s4WX);
              if (bsx + S4_BC_W < 0 || bsx > W) continue;
              for (const it of bc.items) {
                if (it.grabbed) continue;
                const ix = bsx + 1 + it.col * S4_SLOT_W + 1;
                const rY = S4_SHELF_TOP + 1 + it.row * S4_SHELF_ROW_H;
                const sY = rY + S4_SHELF_ROW_H - 1;
                const aY = sY - it.food.a.length;
                if (clickSX >= ix - 1 && clickSX < ix + S4_SLOT_W && clickSY >= aY && clickSY < sY) {
                  it.grabbed = true;
                  state.set("score", state.get("score") + it.food.p);
                  addFloat(it.food.n + " +$" + it.food.p, ix, aY - 1, it.color);
                  grabbedItem = true;
                  break outer4;
                }
              }
            }
            if (!grabbedItem && clickSY >= S4_AISLE_TOP && clickSY <= S4_FLOOR_Y) {
              /* Click in aisle area — move player vertically toward click */
              if (clickSY < s4PY2 - 1) s4PY2 -= 2;
              else if (clickSY > s4PY2 + 1) s4PY2 += 2;
              /* Check if clicking the EXIT */
              if (s4ExitPinned) {
                if (Math.abs(clickSX - s4ExitScreenX) < 8 && clickSY >= S4_FLOOR_Y - 2) {
                  endGame("escaped");
                  return;
                }
              }
            }
          }

          /* Clamp player to aisle */
          s4PY2 = Util.clamp(s4PY2, S4_AISLE_TOP, S4_AISLE_BOT - 1);

          /* ── Guard movement + collision ── */
          const worldPX = s4WX + s4PX2;
          for (let i = s4Gs.length - 1; i >= 0; i--) {
            const g = s4Gs[i];
            g.wx += g.vx * dt;
            /* Guards scroll with the world but also move on their own */
            const gsx = Math.round(g.wx - s4WX);
            if (gsx < -10) {
              s4Gs.splice(i, 1);
              continue;
            }
            if (s4St2 <= 0 && Math.abs(g.wx - worldPX) < 2 && Math.abs(g.wy - s4PY2) < 2) {
              state.set("score", Math.max(0, state.get("score") - 20));
              s4St2 = 800;
              showBanner("SECURITY GRABBED SOME FOOD! -$20", "#c44", 1000);
            }
          }
          /* Spawn new guards periodically */
          if (Math.random() < 0.0003 * dt && s4Ug > 0.15) {
            s4Gs.push({
              wx: s4WX + W + 5,
              wy: Util.randInt(S4_AISLE_TOP + 1, S4_AISLE_BOT - 1),
              vx: -0.006 - Math.random() * 0.004,
            });
          }

          /* ── HUD ── */
          const my = state.get("score");
          hudLabel.textContent = "HAUL";
          hudScore.textContent = "$" + (my + s4AlyScore);
          hudStatus.textContent = "You $" + my + " + Crew $" + s4AlyScore;
          hudStatus.style.color = s4Ug < 0.35 ? "#5cbdbd" : s4Ug < 0.7 ? "#da0" : "#c44";
        }
        function renderAct4() {
          const ox = Math.floor(s4WX);
          /* ── BOOKCASES — discrete units scrolling with world ── */
          for (const bc of s4Bookcases) {
            const sx = Math.round(bc.wx - s4WX);
            if (sx + S4_BC_W < -1 || sx > W + 1) continue;
            const iW = S4_BC_W - 2;
            grid.text("\u2554" + "\u2550".repeat(iW) + "\u2557", sx, S4_SHELF_TOP, "#888");
            for (let row = 0; row < S4_SHELF_ROWS; row++) {
              const rY = S4_SHELF_TOP + 1 + row * S4_SHELF_ROW_H;
              const sY = rY + S4_SHELF_ROW_H - 1;
              const ns = Math.floor(iW / S4_SLOT_W);
              for (let y = rY; y < sY; y++) {
                if (sx >= 0 && sx < W) grid.set(sx, y, "\u2551", "#666");
                if (sx + S4_BC_W - 1 >= 0 && sx + S4_BC_W - 1 < W) grid.set(sx + S4_BC_W - 1, y, "\u2551", "#666");
                for (let c = 1; c < ns; c++) {
                  const dvx = sx + 1 + c * S4_SLOT_W;
                  if (dvx >= 0 && dvx < W) grid.set(dvx, y, "\u2502", "#333");
                }
              }
              for (const it of bc.items) {
                if (it.row !== row || it.grabbed) continue;
                const ix = sx + 1 + it.col * S4_SLOT_W + 1;
                const aH = it.food.a.length;
                grid.art(it.food.a, ix, sY - aH, it.color);
              }
              const sym = row < S4_SHELF_ROWS - 1 ? "\u2560" + "\u2550".repeat(iW) + "\u2563" : "\u255a" + "\u2550".repeat(iW) + "\u255d";
              grid.text(sym, sx, sY, "#666");
            }
          }

          /* ── AISLE — floor tiles scroll with world ── */
          for (let y = S4_AISLE_TOP; y <= S4_AISLE_BOT; y++) {
            for (let x = 0; x < W; x++) {
              const wx = x + ox;
              if (wx % 4 === 0) grid.set(x, y, "\u2502", "#1a1a1a");
            }
          }

          /* ── Security guards ── */
          for (const g of s4Gs) {
            const sx = Math.round(g.wx - s4WX),
              sy = Math.round(g.wy);
            if (sx < -3 || sx > W + 3) continue;
            grid.art(["[S]", "/!\\"], sx, sy, "#c44");
          }

          /* ── Robins trailing behind player ── */
          for (let i = 0; i < s4Alys.length; i++) {
            const al = s4Alys[i];
            const rx = Math.round(s4PX2 - al.behindDist);
            const ry = Math.round(s4PY2 + al.oy + Math.sin(s4GT * 3 + al.bobPhase) * 0.5);
            if (rx >= 0 && rx < W && ry >= S4_AISLE_TOP && ry <= S4_AISLE_BOT) {
              grid.art(A2_ROB, rx, ry, "#5cbdbd");
            }
          }

          /* ── Robin grab floats ── */
          for (const f of s4RobinFloats) {
            if (f.life < 100) continue;
            for (let i = 0; i < f.text.length; i++) {
              const fx = Math.round(f.x) + i,
                fy = Math.round(f.y);
              if (fx >= 0 && fx < W && fy >= 0 && fy < H) grid.set(fx, fy, f.text[i], f.col);
            }
          }

          /* ── Player ── */
          if (s4St2 <= 0 || Math.floor(s4St2 / 80) % 2 === 0) {
            let pc = C_PLAYER;
            if (s4Ug > 0.7) pc = Math.floor(Date.now() / 200) % 2 ? "#da0" : C_PLAYER;
            grid.art(A2_PA[Math.floor(s4GT * 4) % 2], Math.round(s4PX2), Math.round(s4PY2), pc);
          }

          /* ── Floor line ── */
          for (let x = 0; x < W; x++) {
            grid.set(x, S4_FLOOR_Y, "\u2550", "#444");
          }

          /* ── EXIT — pinned to bottom-right of screen ── */
          if (s4ExitPinned) {
            const exSX = s4ExitScreenX;
            const fl = Math.sin(Date.now() / 300) > 0 ? "#5cbdbd" : "#3a9a8a";
            /* Door gap in floor line */
            for (let x = exSX - 5; x <= exSX + 5; x++) {
              if (x >= 0 && x < W) grid.set(x, S4_FLOOR_Y, " ", null);
            }
            if (exSX - 6 >= 0) grid.set(exSX - 6, S4_FLOOR_Y, "\u2551", fl);
            if (exSX + 6 < W) grid.set(exSX + 6, S4_FLOOR_Y, "\u2551", fl);
            grid.text("[ EXIT ]", Util.clamp(exSX - 4, 0, W - 8), S4_FLOOR_Y, fl);
            /* Arrow above exit in the aisle */
            grid.text("\u25BC EXIT \u25BC", Util.clamp(exSX - 5, 0, W - 10), S4_AISLE_BOT, fl);
          }

          /* ── Urgency border flash ── */
          if (s4Ug > 0.5) {
            const bc = Math.floor(Date.now() / 300) % 2 ? "#c44" : "#a00";
            for (let x = 0; x < W; x++) grid.set(x, 0, "\u2550", bc);
            for (let y = 0; y < H; y++) {
              grid.set(0, y, "\u2551", bc);
              grid.set(W - 1, y, "\u2551", bc);
            }
            grid.textCenter([">> COPS EN ROUTE <<", "!! FIND AN EXIT !!"][Math.floor(Date.now() / 800) % 2], 0, "#c44");
          }

          renderBanner();
        }
        /* ══════════════════════════════════════════════════════════
   ACT 5: THE DROP-OFF — community fridge
   ══════════════════════════════════════════════════════════ */
        const FRIDGE = [
          " .====================.",
          " |                    |",
          " |    C O M M U N I T Y",
          " |      F R I D G E   |",
          " |                    |",
          " |  .------. .------. |",
          " |  |      | |      | |",
          " |  |      | |      | |",
          " |  |  *   | |  *   | |",
          " |  |      | |      | |",
          " |  '------' '------' |",
          " |                    |",
          " |  .------. .------. |",
          " |  |      | |      | |",
          " |  |  *   | |  *   | |",
          " |  |      | |      | |",
          " |  '------' '------' |",
          " |                    |",
          " '===================='",
        ];
        let a5T, a5P, a5Crew, a5Neighbours, a5NI;
        function initAct5() {
          phase = "act5";
          a5T = 0;
          a5P = 0;
          a5NI = 0;
          bannerTimer = 0;
          dialogStack = [];
          hudLabel.textContent = "";
          hudScore.textContent = "";
          hudStatus.textContent = "";
          a5Crew = [];
          const rc = Math.min(a2CrewCount, 8);
          const fx = Math.floor((W - 14) / 2);
          const fy = Math.floor(H / 2) - 7;
          const lineY = fy + FRIDGE.length + 1;
          const totalSlots = rc + 1; // crew + player
          const playerSlot = Math.floor(totalSlots / 2);
          const lineStartX = Math.floor(W / 2) - Math.floor((totalSlots * 3) / 2);
          let crewIdx = 0;
          for (let slot = 0; slot < totalSlots; slot++) {
            if (slot === playerSlot) continue; // player slot, handled in render
            const targetX = lineStartX + slot * 3;
            a5Crew.push({
              x: crewIdx % 2 === 0 ? -3 - crewIdx * 5 : W + 3 + crewIdx * 5,
              y: lineY,
              tx: Util.clamp(targetX, 2, W - 5),
              ty: lineY,
              arrived: false,
              item: Util.pick(["OATS", "NUTS", "PAIN", "OIL", "JUS", "POTATOES", "SOUPE"]),
            });
            crewIdx++;
          }
          // Store player X for render
          a5Crew._playerX = Util.clamp(lineStartX + playerSlot * 3, 2, W - 5);
          a5Crew._playerY = lineY;
          // Neighbours arrive after food is placed
          const shuffled = Util.shuffle(END_NAMES.slice());
          a5Neighbours = [];
          for (let i = 0; i < Math.min(4, shuffled.length); i++) {
            const nm = shuffled[i];
            const fromRight = i % 2 === 0;
            const nx = fromRight ? W + 3 + i * 6 : -3 - i * 6;
            const ty = lineY + 4 + i;
            const tx = fromRight ? fx + 16 + i * 2 : fx - 10 - i * 2;
            a5Neighbours.push({
              x: nx,
              y: ty,
              tx: Util.clamp(tx, 2, W - 6),
              ty,
              name: nm.n,
              msg: Util.pick(["merci", "my kids eat tonight", "finally", "love!", "merci beaucoup", "thank you"]),
              arrived: false,
              msgShow: false,
            });
          }
        }
        function updateAct5(dt) {
          a5T += dt;
          updateBanner(dt);
          dialogUpdate(dt);
          if (a5P === 0) {
            let allArrived = true;
            for (const c of a5Crew) {
              if (typeof c === "object" && !c.arrived) {
                c.x = Util.lerp(c.x, c.tx, 0.04);
                if (Math.abs(c.x - c.tx) < 0.5) {
                  c.x = c.tx;
                  c.arrived = true;
                } else allArrived = false;
              }
            }
            if (allArrived && a5T > 1500) {
              showBanner("Let's drop this in a community fridge.", "#5cbdbd", 3000);
              a5P = 1;
              a5T = 0;
            }
          }
          if (a5P === 1 && a5T > 3500) a5P = 2;
          if (clickPending && a5P === 2) {
            clickPending = false;
            a5P = 3;
            a5T = 0;
            showBanner("Food placed.", "#2a2", 2000);
          }
          if (a5P === 3 && a5T > 2500) {
            a5P = 4;
            a5T = 0;
          }
          if (a5P === 4) {
            let allArrived = true;
            for (const nb of a5Neighbours) {
              if (!nb.arrived) {
                nb.x = Util.lerp(nb.x, nb.tx, 0.03);
                if (Math.abs(nb.x - nb.tx) < 0.5) {
                  nb.x = nb.tx;
                  nb.arrived = true;
                  nb.msgShow = true;
                  dialogPush(nb.msg, "#5cbdbd", "center", Math.round(nb.tx), nb.ty - 2, 3000);
                } else allArrived = false;
              }
            }
            if (allArrived && a5T > 4000) {
              a5P = 5;
              a5T = 0;
            }
          }
          if (a5P === 5 && a5T > 2000) initEnd();
        }
        function renderAct5() {
          const fx = Math.floor((W - 14) / 2),
            fy = Math.floor(H / 2) - 7;
          grid.art(FRIDGE, fx, fy, "#5cbdbd");
          let crewDrawIdx = 0;
          for (const c of a5Crew) {
            if (typeof c !== "object" || c._playerX !== undefined) continue;
            const cx = Math.round(c.x);
            if (cx >= -2 && cx < W + 2) {
              const crewArt = a2Crew && crewDrawIdx < a2Crew.length && a2Crew[crewDrawIdx] && a2Crew[crewDrawIdx].art ? a2Crew[crewDrawIdx].art : RA2;
              const A2_NPC_COLORS_STABLE = ["#0ff", "#f0f", "#ff0", "#0f8", "#f80", "#8f0", "#80f", "#f08", "#08f"];
              const crewCol = A2_NPC_COLORS_STABLE[crewDrawIdx % A2_NPC_COLORS_STABLE.length];
              grid.art(crewArt, cx, c.ty + (a5P >= 3 ? -1 : 0), crewCol);
              if (a5P < 3 && c.arrived) {
                grid.text(c.item, Util.clamp(cx - 1, 0, W - c.item.length), c.ty - 2, "#ca8");
              }
            }
            crewDrawIdx++;
          }
          const plX = a5Crew._playerX || Math.floor(W / 2);
          const plY = a5Crew._playerY || fy + FRIDGE.length + 1;
          grid.art([" @ ", "/|\\", "/ \\"], plX, plY + (a5P >= 3 ? -1 : 0), "#c33");
          // Tap prompt
          if (a5P === 2) grid.textCenter("[ TAP TO PLACE FOOD ]", plY + 4, Math.sin(Date.now() / 300) > 0 ? "#5cbdbd" : "#888");
          // Food appearing in fridge
          if (a5P >= 3) {
            const items = [];
            for (const c of a5Crew) {
              if (typeof c === "object" && c.item) items.push(c.item);
            }
            const showCount = a5P === 3 ? Math.min(items.length, Math.floor(a5T / 400)) : items.length;
            const fridgeInnerW = 20; /* width inside fridge walls */
            const cols = Math.min(showCount, 2);
            const colW = Math.floor(fridgeInnerW / Math.max(cols, 1));
            for (let i = 0; i < showCount; i++) {
              const col = i % 2;
              const row = Math.floor(i / 2);
              const ix = fx + 2 + col * colW;
              const iy = fy + 5 + row * 2; /* start below "FRIDGE" text, 2 rows apart */
              if (iy < fy + FRIDGE.length - 1) grid.text(items[i].substring(0, colW - 1), ix, iy, "#ca8");
            }
          }
          // Neighbours
          if (a5P >= 4) {
            for (const nb of a5Neighbours) {
              const nx = Math.round(nb.x);
              if (nx >= -2 && nx < W + 2) {
                grid.art([" o ", "/|\\", "/ \\"], nx, nb.ty, "#888");
                if (nb.arrived) {
                  grid.text(nb.name, Util.clamp(nx - 1, 0, W - nb.name.length), nb.ty - 1, "#5cbdbd");
                }
              }
            }
          }
          dialogRender();
          renderBanner();
        }

        /* ══════════════════════════════════════════════════════════
   END SCREEN — collective-focused
   ══════════════════════════════════════════════════════════ */
        let endT,
          endD = {};
        const END_NAMES = [
          { n: "Marie", p: "their" },
          { n: "Manu", p: "his" },
          { n: "Fatima", p: "her" },
          { n: "Olivier", p: "his" },
          { n: "Mei", p: "her" },
          { n: "Amadou", p: "his" },
          { n: "Sophie", p: "her" },
          { n: "Youssef", p: "his" },
        ];
        function initEnd() {
          phase = "end";
          endT = 0;
          bannerTimer = 0;
          dialogStack = [];
          const my = state.get("score") || 0,
            tot = my + s4AlyScore;
          const items = ["oatmilk", "oil", "bread", "apples", "potatoes", "pasta", "juice", "soup"];
          const vig = [];
          const shuffled = Util.shuffle(END_NAMES);
          for (let i = 0; i < Math.min(4, a2CrewCount); i++) {
            const nm = shuffled[i % shuffled.length];
            vig.push(nm.n + " has " + Util.pick(items) + " for " + nm.p + " family.");
          }
          endD = { tot, my, as: s4AlyScore, crew: a2CrewCount, vig };
        }
        function updateEnd(dt) {
          endT += dt;
          updateBanner(dt);
          if (clickPending && endT > 3000) {
            clickPending = false;
            phase = "done";
            loop.stop();
            overlay.classList.remove("hidden");
            ovTitle.textContent = "ROB AGAIN?";
            ovTitle.style.color = "#c33";
            ovSub.textContent = "The neighbourhood remembers.";
            ovHint.textContent = "";
            startBtn.textContent = "KEEP TRYING";
            overlay.querySelectorAll(".final").forEach((e) => e.remove());
            overlay.querySelectorAll(".give-up-btn").forEach((e) => e.remove());
            const gu = document.createElement("button");
            gu.className = "give-up-btn";
            gu.textContent = "START OVER";
            gu.style.background = "#888";
            gu.style.marginTop = "4px";
            gu.addEventListener("click", () => {
              hasPlayed = false;
              startGame();
            });
            startBtn.after(gu);
          }
        }
        function renderEnd() {
          grid.textCenter("Your crew brought home $" + endD.tot + " of groceries", 3, "#c33");
          for (let i = 0; i < endD.vig.length; i++) if (endT > 1000 + i * 800) grid.textCenter(endD.vig[i], 6 + i * 2, "#888");
          if (endT > 1000 + endD.vig.length * 800) grid.textCenter(endD.crew + " families eat tonight.", 6 + endD.vig.length * 2 + 1, "#2a2");
          if (endT > 2000 + endD.vig.length * 800) grid.textCenter("you carried $" + endD.my + " of it", 6 + endD.vig.length * 2 + 4, "#bbb");
          if (endT > 3000) grid.textCenter("[ tap ]", H - 3, Math.sin(Date.now() / 400) > 0 ? "#888" : "#bbb");
          renderBanner();
        }

        /* ── END GAME (failure) ────────────────────────────────── */
        function endGame(result) {
          if (phase === "done") return;
          if (result === "escaped") {
            initAct5();
            return;
          }
          phase = "done";
          loop.stop();
          const my = state.get("score") || 0,
            tot = my + s4AlyScore;
          let title, sub, color;
          if (result === "busted") {
            color = "#c33";
            title = "BUSTED!";
            sub = "Too many narcs. The cops came.";
          } else {
            color = "#c33";
            title = tot > 0 ? "CAUGHT!" : "CAUGHT EMPTY";
            sub = tot > 0 ? "Cops got you.\nRobins escaped with $" + s4AlyScore + "." : "Next time.";
          }
          overlay.classList.remove("hidden");
          ovTitle.textContent = title;
          ovTitle.style.color = color;
          ovSub.textContent = sub;
          ovHint.textContent = "";
          startBtn.textContent = "TRY AGAIN";
          overlay.querySelectorAll(".final").forEach((e) => e.remove());
          overlay.querySelectorAll(".give-up-btn").forEach((e) => e.remove());
          const gu = document.createElement("button");
          gu.className = "give-up-btn";
          gu.textContent = "GIVE UP AND LET SOMEONE ELSE TRY";
          gu.style.background = "#888";
          gu.style.marginTop = "4px";
          gu.addEventListener("click", () => {
            hasPlayed = false;
            startGame();
          });
          startBtn.after(gu);
          if (tot > 0) {
            const f = document.createElement("div");
            f.className = "final";
            f.textContent = "$" + tot;
            ovSub.after(f);
          }
          ovArt.style.color = color;
        }

        /* ── MAIN ──────────────────────────────────────────────── */
        function addFloat(t, x, y, co) {
          floats.push({ text: t, x, y, color: co, life: 1000, max: 1000 });
        }
        function update(dt) {
          for (let i = floats.length - 1; i >= 0; i--) {
            floats[i].life -= dt;
            floats[i].y -= 0.003 * dt;
            if (floats[i].life <= 0) floats.splice(i, 1);
          }
          if (phase === "act1") updateAct1(dt);
          else if (phase === "act2") updateAct2(dt);
          else if (phase === "act2b") updateAct2b(dt);
          else if (phase === "act3") updateAct3(dt);
          else if (phase === "act4") updateAct4(dt);
          else if (phase === "act5") updateAct5(dt);
          else if (phase === "end") updateEnd(dt);
          input.endFrame();
        }
        function render() {
          grid.clear();
          if (phase === "act1") renderAct1();
          else if (phase === "act2") renderAct2();
          else if (phase === "act2b") renderAct2b();
          else if (phase === "act3") renderAct3();
          else if (phase === "act4") renderAct4();
          else if (phase === "act5") renderAct5();
          else if (phase === "end") renderEnd();
          for (const f of floats) {
            if (f.life / f.max < 0.1) continue;
            for (let i = 0; i < f.text.length; i++) {
              const fx = Math.round(f.x) + i,
                fy = Math.round(f.y);
              if (fx >= 0 && fx < W && fy >= 0 && fy < H) grid.set(fx, fy, f.text[i], f.color);
            }
          }
          gs.innerHTML = grid.html();
        }
        function startGame() {
          floats.length = 0;
          s4AlyScore = 0;
          a2CrewCount = 0;
          dialogStack = [];
          overlay.classList.add("hidden");
          if (hasPlayed) {
            initAct2();
          } else {
            initAct1();
          }
          loop.start();
          // hasPlayed is set to true when the player reaches Act 2
        }
        ovTitle.textContent = "ROBIN  DES RUELLES";
        ovSub.textContent = "The people are hungry.\nThe food is there.";
        ovHint.innerHTML =
          '\u25B2\u25BC to move between rows<br>Walk into people to talk<br><br><span style="color:#aaa">A game about feeding our neighbours</span>';
        startBtn.textContent = "PLAY";
        startBtn.addEventListener("click", startGame);

        // DEV: number keys jump between acts
        window.addEventListener("keydown", function (e) {
          const jumps = {
            1: function () {
              initAct1();
            },
            2: function () {
              initAct2();
            },
            3: function () {
              initAct2b();
            },
            4: function () {
              a2CrewCount = Math.max(a2CrewCount, 5);
              initAct3();
            },
            5: function () {
              a2CrewCount = Math.max(a2CrewCount, 5);
              initAct4();
            },
            6: function () {
              a2CrewCount = Math.max(a2CrewCount, 5);
              s4AlyScore = s4AlyScore || 0;
              initAct5();
            },
            7: function () {
              a2CrewCount = Math.max(a2CrewCount, 5);
              s4AlyScore = s4AlyScore || 0;
              state.reset({ score: 80 });
              initEnd();
            },
          };
          if (!jumps[e.key]) return;
          try {
            loop.stop();
          } catch (_) {}
          overlay.classList.add("hidden");
          floats.length = 0;
          dialogStack = [];
          bannerTimer = 0;
          clickPending = false;
          jumps[e.key]();
          loop.start();
        });

        function boot() {
          measureGrid();
          grid = new Grid(W, H);
          loop = new GameLoop({ update, render });
        }
        if (document.fonts && document.fonts.ready) document.fonts.ready.then(boot);
        else setTimeout(boot, 200);
        let rTO;
        window.addEventListener("resize", () => {
          clearTimeout(rTO);
          rTO = setTimeout(() => {
            measureGrid();
            grid = new Grid(W, H);
          }, 200);
        });
      })();
    </script>
  </body>
</html>
