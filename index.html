<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <title>Robins des Ruelles</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=VT323&display=swap");
      :root {
        --c-accent: #8957ff; /* main character, titles, highlights */
        --c-accent-dim: #b05a40; /* accent but muted */
        --c-npc-conv: #7a8aaa; /* default NPC dialogue box color */
        --c-win: #4aba6a; /* recruitment success */
        --c-warn: #d4a030; /* heat, warnings */
        --c-info: #5cbdbd; /* info banners, fridge */
        --c-narc: #c44; /* narc reveal */
        --c-bg: #111; /* game background */
        --c-bg-hud: #1a1a1a; /* hud background */
        --c-text-dim: #888; /* muted text */
        --c-text-mid: #aaa; /* medium text */
        --c-sidewalk: #444; /* road borders */
        --c-road-dot: #333; /* subtle road texture */
        --c-bldg-1: #3a3535; /* building palette — very desaturated */
        --c-bldg-2: #353a35;
        --c-bldg-3: #35353a;
        --c-bldg-4: #3a3838;
        --c-bldg-5: #383a38;
        --c-bldg-6: #38383a;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--c-bg);
        color: var(--c-bg);
        font-family: "VT323", "Courier New", monospace;
        overflow: hidden;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
        -webkit-user-select: none;
      }
      #hud {
        width: 100%;
        max-width: 900px;
        padding: 6px 16px;
        font-size: 22px;
        letter-spacing: 2px;
        color: var(--c-text-mid);
        z-index: 10;
        flex-shrink: 0;
        background: transparent;
        border-bottom: 1px solid #2a2a2a;
        box-shadow: 0 1px 0 rgba(137, 87, 255, 0.15);
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-transform: lowercase;
      }

      #button-div {
        display: flex;
        padding-left: 10px;
      }

      #overlay #lang-btn {
        position: absolute;
        top: 20px;
        right: 20px;
      }

      #mute-btn,
      #lang-btn {
        background: none;
        border: 1px solid #444;
        color: #888;
        font-size: 18px;
        cursor: pointer;
        padding: 2px 8px;
        border-radius: 3px;
        font-family: inherit;
        flex-shrink: 0;
        margin-left: 5px;
      }
      #mute-btn:hover,
      #lang-btn:hover {
        border-color: #888;
        color: #ccc;
      }

      #scene-nav {
        width: 100%;
        max-width: 900px;
        display: flex;
        gap: 3px;
        padding: 3px 10px;
        background: #0d0d0d;
        border-bottom: 1px solid #1a1a1a;
        flex-shrink: 0;
      }
      #scene-nav button {
        flex: 1;
        font-family: "VT323", monospace;
        font-size: 16px;
        background: #111;
        color: #444;
        border: 1px solid #2a2a2a;
        padding: 3px 0;
        cursor: pointer;
        border-radius: 2px;
        touch-action: manipulation;
      }
      #scene-nav button:hover,
      #scene-nav button:active {
        color: #aaa;
        border-color: #555;
        background: #222;
      }

      #game-screen.chroma {
        animation: chroma-pulse 0.13s steps(1) infinite;
      }
      @keyframes chroma-pulse {
        0% {
          text-shadow:
            3px 0 rgba(255, 40, 60, 0.65),
            -3px 0 rgba(0, 180, 255, 0.65);
        }
        50% {
          text-shadow:
            -2px 0 rgba(255, 40, 60, 0.5),
            2px 0 rgba(0, 180, 255, 0.5);
        }
        100% {
          text-shadow:
            3px 0 rgba(255, 40, 60, 0.65),
            -3px 0 rgba(0, 180, 255, 0.65);
        }
      }

      #game-screen.flash-good {
        animation: flash-good 0.35s ease-out forwards;
      }
      @keyframes flash-good {
        0% {
          box-shadow: inset 0 0 0 1px rgba(17, 37, 37, 0.1);
        }
        60% {
          box-shadow: inset 0 0 0 2px rgba(24, 43, 43, 0.1);
        }
        100% {
          box-shadow: inset 0 0 0 0px rgba(92, 189, 189, 0);
        }
      }
      #game-screen.flash-gold {
        animation: flash-gold 0.3s ease-out forwards;
      }
      @keyframes flash-gold {
        0% {
          box-shadow: inset 0 0 0 3px rgba(20, 14, 8, 0.1);
        }
        100% {
          box-shadow: inset 0 0 0 0px rgba(29, 19, 10, 0);
        }
      }

      #hud .val {
        color: var(--c-accent);
        font-weight: bold;
        font-size: 26px;
        letter-spacing: 1px;
      }
      #hud .status {
        color: #2a7a2a;
        text-align: right;
        font-size: 18px;
        opacity: 0.85;
      }
      #game-wrap {
        width: 100%;
        max-width: 900px;
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #111;
      }
      #game-screen {
        font-family: "Courier New", "Consolas", "Monaco", monospace;
        font-variant-ligatures: none;
        font-feature-settings:
          "liga" 0,
          "calt" 0;
        text-rendering: geometricPrecision;
        letter-spacing: 0;
        word-spacing: 0;
        white-space: pre;
        line-height: 1;
        background: #111;
        overflow: hidden;
        padding: 0;
        margin: 0;
        position: absolute;
        inset: 0;
        cursor: pointer;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #0d0a11 0%, #0a0a0f 100%);
        z-index: 20;
        text-align: center;
        gap: 14px;
        font-family: "VT323", monospace;
        padding: 20px;
      }
      #overlay.hidden {
        display: none;
      }
      #overlay h1 {
        font-size: 52px;
        color: var(--c-accent);
        letter-spacing: 6px;
        /* text-shadow: 0 0 20px rgba(137, 87, 255, 0.4), 0 0 40px rgba(137, 87, 255, 0.2); */
        margin: 0;
        animation: titlepulse 3s ease-in-out infinite;
      }
      @keyframes titlepulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.82;
        }
      }
      #overlay .sub {
        font-size: 1.5rem;
        color: #c8b8e8;
        max-width: 440px;
        line-height: 1.5;
        white-space: pre-line;
        /* font-style: italic; */
        opacity: 0.9;
      }
      #overlay .endart {
        font-size: 28px;
        line-height: 1.1;
        font-family: "Courier New", monospace;
        white-space: pre;
        margin: 10px 0;
        color: var(--c-accent);
        /* text-shadow: 0 0 12px rgba(137, 87, 255, 0.6); */
        animation: artblink 1.2s ease-in-out infinite;
      }
      @keyframes artblink {
        0%,
        100% {
          opacity: 1;
          transform: translateY(0);
        }
        50% {
          opacity: 0.7;
          transform: translateY(-2px);
        }
      }
      #overlay .final {
        font-size: 36px;
        color: var(--c-accent);
        margin: 4px 0;
        font-weight: bold;
        /* text-shadow: 0 0 12px rgba(137, 87, 255, 0.4); */
      }
      #start-btn {
        margin-top: 16px;
        padding: 14px 52px;
        color: #fff;
        background: transparent;
        border: 2px solid var(--c-accent);
        font-family: "VT323", monospace;
        font-size: 28px;
        cursor: pointer;
        letter-spacing: 4px;
        border-radius: 2px;
        transition: all 0.2s ease;
      }
      #start-btn:hover {
        background: var(--c-accent);
        color: #fff;
        transform: scale(1.03);
      }
      #overlay .hint {
        font-size: 17px;
        color: #7a7a8a;
        max-width: 380px;
        line-height: 1.5;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <span><span id="hud-label">CREW</span> <span class="val" id="hud-score">0</span></span
      ><span class="status" id="hud-status"></span>
      <span id="button-div">
        <button id="mute-btn">mute</button>
      </span>
    </div>

    <div id="scene-nav">
      <button data-act="1">1</button><button data-act="2">2</button> <button data-act="3">3</button><button data-act="4">4</button>
      <button data-act="5">5</button><button data-act="6">6</button> <button data-act="7">7</button><button data-act="8">8</button>
    </div>
    <div id="game-wrap">
      <div id="game-screen"></div>
    </div>
    <div id="overlay">
      <div id="lang-div"><button id="lang-btn">FR</button></div>

      <h1 id="ov-title">ROBINS DES RUELLES</h1>
      <pre class="endart" id="ov-art">  @</pre>
      <div class="sub" id="ov-sub"></div>
      <div class="hint" id="ov-hint"></div>
      <button id="start-btn">PLAY</button>
    </div>
    <script src="lang-en.js"></script>
    <script src="lang-fr.js"></script>
    <script src="lang-init.js"></script>

    <script src="frames.js"></script>
    <script src="omc-kit.js"></script>
    <script src="game-data.js"></script>
    <script src="game-data-food.js"></script>
    <script src="game-data-words-engine.js"></script>
    <script id="words-script"></script>
    <script>      
      document.getElementById("words-script").src = window.LANG === window.LANG_FR ? "game-data-words-fr.js" : "game-data-words.js";
    </script>
    <script src="game.js"></script>
  </body>
</html>
