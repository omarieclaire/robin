<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <title>Robins des Ruelles</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=VT323&display=swap");
      :root {
        --c-accent: #e07050; /* main character, titles, highlights */
        --c-accent-dim: #b05a40; /* accent but muted */
        --c-npc-conv: #7a8aaa; /* default NPC dialogue box color */
        --c-win: #4aba6a; /* recruitment success */
        --c-warn: #d4a030; /* heat, warnings */
        --c-info: #5cbdbd; /* info banners, fridge */
        --c-narc: #c44; /* narc reveal */
        --c-bg: #111; /* game background */
        --c-bg-hud: #1a1a1a; /* hud background */
        --c-text-dim: #888; /* muted text */
        --c-text-mid: #aaa; /* medium text */
        --c-sidewalk: #444; /* road borders */
        --c-road-dot: #333; /* subtle road texture */
        --c-bldg-1: #3a3535; /* building palette — very desaturated */
        --c-bldg-2: #353a35;
        --c-bldg-3: #35353a;
        --c-bldg-4: #3a3838;
        --c-bldg-5: #383a38;
        --c-bldg-6: #38383a;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--c-bg);
        color: var(--c-bg);
        font-family: "VT323", "Courier New", monospace;
        overflow: hidden;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
        -webkit-user-select: none;
      }
      #hud {
        width: 100%;
        max-width: 900px;
        padding: 8px 14px 4px;
        font-size: 26px;
        letter-spacing: 1px;
        color: var(--c-text-mid);
        z-index: 10;
        flex-shrink: 0;
        background: var(--c-bg-hud);
        border-bottom: 2px solid #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #hud .val {
        color: var(--c-accent);
        font-weight: bold;
        font-size: 30px;
      }
      #hud .status {
        color: #2a7a2a;
        text-align: right;
        font-size: 22px;
      }
      #game-wrap {
        width: 100%;
        max-width: 900px;
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #111;
      }
      #game-screen {
        font-family: "Courier New", "Consolas", "Monaco", monospace;
        font-variant-ligatures: none;
        font-feature-settings:
          "liga" 0,
          "calt" 0;
        text-rendering: geometricPrecision;
        letter-spacing: 0;
        word-spacing: 0;
        white-space: pre;
        line-height: 1;
        background: #111;
        overflow: hidden;
        padding: 0;
        margin: 0;
        position: absolute;
        inset: 0;
        cursor: pointer;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(17, 17, 17, 0.97);
        z-index: 20;
        text-align: center;
        gap: 10px;
        font-family: "VT323", monospace;
      }
      #overlay.hidden {
        display: none;
      }
      #overlay h1 {
        font-size: 40px;
        color: var(--c-accent);
        letter-spacing: 3px;
      }
      #overlay .sub {
        font-size: 20px;
        color: var(--c-text-mid);
        max-width: 360px;
        line-height: 1.4;
        white-space: pre-line;
      }
      #overlay .endart {
        font-size: 15px;
        line-height: 1.1;
        font-family: "Courier New", monospace;
        white-space: pre;
        margin: 6px 0;
        color: var(--c-accent);
      }
      #overlay .final {
        font-size: 28px;
        color: var(--c-accent);
        margin: 4px 0;
        font-weight: bold;
      }
      #overlay button {
        margin-top: 8px;
        padding: 12px 36px;
        color: var(--c-accent);
        border: none;
        /* color: #fff; */
        font-family: "VT323", monospace;
        font-size: 24px;
        cursor: pointer;
        letter-spacing: 2px;
        border-radius: 3px;
      }
      #overlay button:hover {
        background: var(--c-accent-dim);
      }
      #overlay .hint {
        font-size: 16px;
        color: #888;
        max-width: 340px;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <span><span id="hud-label">CREW</span> <span class="val" id="hud-score">0</span></span
      ><span class="status" id="hud-status"></span>
    </div>
    <div id="game-wrap"><div id="game-screen"></div></div>
    <div id="overlay">
      <h1 id="ov-title">ROBINS DES RUELLES</h1>
      <pre class="endart" id="ov-art">  @</pre>
      <div class="sub" id="ov-sub"></div>
      <div class="hint" id="ov-hint"></div>
      <button id="start-btn">PLAY</button>
    </div>
    <script src="omc-kit.js"></script>
    <script>
      (function () {
        const { GameLoop, Input, State, Timer, Util, Device } = OMC;
        const gs = document.getElementById("game-screen");
        const hudScore = document.getElementById("hud-score"),
          hudStatus = document.getElementById("hud-status"),
          hudLabel = document.getElementById("hud-label");
        const overlay = document.getElementById("overlay"),
          ovTitle = document.getElementById("ov-title"),
          ovArt = document.getElementById("ov-art"),
          ovSub = document.getElementById("ov-sub"),
          ovHint = document.getElementById("ov-hint"),
          startBtn = document.getElementById("start-btn");
        const input = new Input();

        /* ── REPLAY TRACKING ─────────────────────────────────────── */
        let hasPlayed = false;

        /* ── RESPONSIVE SIZING ─────────────────────────────────── */
        let W, H;
        function measureGrid() {
          const wrap = document.getElementById("game-wrap"),
            r = wrap.getBoundingClientRect();
          const probe = document.createElement("span");
          probe.style.cssText =
            "font-family:'Courier New','Consolas','Monaco',monospace;white-space:pre;line-height:1;position:absolute;visibility:hidden;font-size:16px;letter-spacing:0";
          probe.textContent = "MMMMMMMMMMMMMMMMMMMM";
          gs.appendChild(probe);
          const cw16 = probe.getBoundingClientRect().width / 20;
          gs.removeChild(probe);
          const targetW = r.width > 800 ? 72 : r.width > 600 ? 60 : r.width > 480 ? 48 : r.width > 360 ? 38 : 32;
          const fs = r.width / ((targetW * cw16) / 16);
          const finalFS = Math.max(9, Math.min(Math.floor(fs), 24));
          const charW = finalFS * (cw16 / 16);
          W = Math.floor(r.width / charW);
          H = Math.floor(r.height / finalFS);
          W = Math.max(28, W);
          H = Math.max(16, Math.min(H, 40));
          gs.style.fontSize = finalFS + "px";
        }
        /* ── GRID ──────────────────────────────────────────────── */
        let grid;
        class Grid {
          constructor(w, h) {
            this.w = w;
            this.h = h;
            this.c = [];
            for (let y = 0; y < h; y++) {
              this.c[y] = [];
              for (let x = 0; x < w; x++) this.c[y][x] = { ch: " ", co: null };
            }
          }
          clear() {
            for (let y = 0; y < this.h; y++)
              for (let x = 0; x < this.w; x++) {
                this.c[y][x].ch = " ";
                this.c[y][x].co = null;
              }
          }
          set(x, y, ch, co) {
            x = Math.floor(x);
            y = Math.floor(y);
            if (x >= 0 && x < this.w && y >= 0 && y < this.h) {
              this.c[y][x].ch = ch;
              this.c[y][x].co = co || null;
            }
          }
          text(s, x, y, co) {
            for (let i = 0; i < s.length; i++) this.set(x + i, y, s[i], co);
          }
          textCenter(s, y, co) {
            this.text(s, Math.floor((this.w - s.length) / 2), y, co);
          }
          art(a, px, py, co) {
            px = Math.round(px);
            py = Math.round(py);
            a.forEach((l, r) => {
              for (let i = 0; i < l.length; i++) if (l[i] !== " ") this.set(px + i, py + r, l[i], co);
            });
          }
          html() {
            let o = "";
            for (let y = 0; y < this.h; y++) {
              let lc = null;
              for (let x = 0; x < this.w; x++) {
                const c = this.c[y][x];
                if (c.co !== lc) {
                  if (lc) o += "</span>";
                  if (c.co) o += '<span style="color:' + c.co + '">';
                  lc = c.co;
                }
                o += c.ch === "<" ? "&lt;" : c.ch === ">" ? "&gt;" : c.ch === "&" ? "&amp;" : c.ch;
              }
              if (lc) o += "</span>";
              o += "\n";
            }
            return o;
          }
        }
        /* ── CENTRALIZED STYLE CONFIG ──────────────────────────
           Box borders: edit these to restyle ALL boxes at once.
           convRender() uses CONV_BOX for conversation panels.
           renderBanner() uses BANNER_BOX for announcements.
           dialogRender() uses DIALOG_BOX for floating speech. */
        const CONV_BOX = { tl: "\u2554", tr: "\u2557", bl: "\u255A", br: "\u255D", h: "\u2550", v: "\u2551" };
        const BANNER_BOX = { tl: "\u2554", tr: "\u2557", bl: "\u255A", br: "\u255D", h: "\u2550", v: "\u2551" };
        const DIALOG_BOX = { tl: "\u250C", tr: "\u2510", bl: "\u2514", br: "\u2518", h: "\u2500", v: "\u2502" };
        /* Main character color — change this ONE place */
        const C_PLAYER = "#6f5cbd";
        const state = new State({ score: 0 });
        const tmr = new Timer();
        input.mapActions({ left: ["ArrowLeft", "a"], right: ["ArrowRight", "d"], up: ["ArrowUp", "w"], down: ["ArrowDown", "s"] });
        let loop, phase;
        const floats = [];
        let a2CrewCount = 0,
          s4AlyScore = 0;

        /* ── BANNER ────────────────────────────────────────────── */
        let bannerText = "",
          bannerColor = C_PLAYER,
          bannerTimer = 0;
        function showBanner(t, c, d) {
          bannerText = t;
          bannerColor = c || C_PLAYER;
          bannerTimer = d || 3000;
        }
        function updateBanner(dt) {
          if (bannerTimer > 0) bannerTimer -= dt;
        }
        function renderBanner() {
          if (bannerTimer <= 0) return;
          const mxW = W - 4,
            words = bannerText.split(" "),
            lines = [];
          let cur = "";
          for (const w of words) {
            if (cur.length + w.length + 1 > mxW) {
              lines.push(cur);
              cur = w;
            } else cur = cur ? cur + " " + w : w;
          }
          if (cur) lines.push(cur);
          const tH = lines.length + 4,
            // startY = phase === "act2" ? Math.max(H - tH - 2, Math.floor(H * 0.75)) : Math.max(1, Math.floor(H / 6 - tH / 2));
            startY = phase === "act2" ? Math.max(1, H - tH - 4) : Math.max(1, Math.floor(H / 6 - tH / 2));
          const boxW = Math.min(W, Math.max(...lines.map((l) => l.length)) + 6),
            bx = Math.floor((W - boxW) / 2);
          for (let y = startY; y < startY + tH && y < H; y++) for (let x = bx; x < bx + boxW && x < W; x++) grid.set(x, y, " ", null);
          grid.text(BANNER_BOX.tl + BANNER_BOX.h.repeat(boxW - 2) + BANNER_BOX.tr, bx, startY, bannerColor);
          grid.text(BANNER_BOX.v + " ".repeat(boxW - 2) + BANNER_BOX.v, bx, startY + 1, bannerColor);
          for (let i = 0; i < lines.length; i++) {
            const ly = startY + 2 + i;
            grid.text(BANNER_BOX.v + " ".repeat(boxW - 2) + BANNER_BOX.v, bx, ly, bannerColor);
            grid.text(lines[i], bx + 1 + Math.floor((boxW - 2 - lines[i].length) / 2), ly, bannerColor);
          }
          grid.text(BANNER_BOX.v + " ".repeat(boxW - 2) + BANNER_BOX.v, bx, startY + 2 + lines.length, bannerColor);
          grid.text(BANNER_BOX.bl + BANNER_BOX.h.repeat(boxW - 2) + BANNER_BOX.br, bx, startY + 3 + lines.length, bannerColor);
        }

        let dialogStack = [];
        function dialogPush(text, color, side, ax, ay, duration) {
          dialogStack.push({ text, color, side, ax, ay, timer: duration || 3000 });
        }
        function dialogUpdate(dt) {
          for (let i = dialogStack.length - 1; i >= 0; i--) {
            dialogStack[i].timer -= dt;
            if (dialogStack[i].timer <= 0) dialogStack.splice(i, 1);
          }
        }
        /* ── CONVERSATION PANEL (Act 2) ────────────────────── */
        let convLog = [];
        let convChoices = null;
        let convPlayerColor = C_PLAYER;
        let convNPCColor = "#888";
        let convVisible = false;
        let convAnchorPX = 0;
        let convAnchorNX = 10;
        let convAnchorY = 10;
        let convChoiceY1 = 0,
          convChoiceY2 = 0,
          convChoiceBX = 0,
          convChoiceBW = 0,
          convChoiceHover = -1;
        function convReset() {
          convLog = [];
          convChoices = null;
          convVisible = false;
        }
        function convAddLine(text, side, color) {
          convLog.push({ text, side, color });
        }
        function convShowChoices(labels) {
          convChoices = labels;
        }

        function convHideChoices() {
          convChoices = null;
        }

        function convRender() {
          if (!convVisible || (convLog.length === 0 && !convChoices)) return;
          const boxW = Math.min(W - 4, 32);
          const innerW = boxW - 4;
          // Measure total height first so we can anchor from the bottom
          const allBoxes = [];
          for (let i = 0; i < convLog.length; i++) {
            const entry = convLog[i];
            const words = entry.text.split(" "),
              lines = [];
            let cur = "";
            for (const w of words) {
              if (cur.length + w.length + 1 > innerW) {
                lines.push(cur);
                cur = w;
              } else cur = cur ? cur + " " + w : w;
            }
            if (cur) lines.push(cur);
            allBoxes.push({ lines, color: entry.color, side: entry.side, isChoice: false });
          }
          if (convChoices) {
            const choiceLines = [];
            for (let ci = 0; ci < convChoices.length; ci++) {
              const words = ("\u25B6 " + convChoices[ci]).split(" "),
                lines = [];
              let cur = "";
              for (const w of words) {
                if (cur.length + w.length + 1 > innerW) {
                  lines.push(cur);
                  cur = "  " + w;
                } else cur = cur ? cur + " " + w : w;
              }
              if (cur) lines.push(cur);
              choiceLines.push(...lines);
              if (ci < convChoices.length - 1) choiceLines.push("");
            }
            allBoxes.push({ lines: choiceLines, color: convPlayerColor, side: "you", isChoice: true });
          }
          // Total height: each box = lines.length + 2 (top/bottom border)
          let totalH = 2; // tails row + gap
          for (const box of allBoxes) totalH += box.lines.length + 2;
          // Anchor: bottom of stack is just above the characters
          const charY = convAnchorY;
          const bottomY = charY - 1;
          const topY = bottomY - totalH + 1;
          // Center horizontally between player and NPC
          const psx = convAnchorPX;
          const nsx = convAnchorNX;
          const centerX = Math.floor((psx + nsx) / 2);
          const bx = Util.clamp(Math.floor(centerX - boxW / 2), 0, W - boxW);
          // Clear background behind entire stack
          // for (let y = Math.max(0, topY); y <= bottomY && y < H; y++)
          //   for (let x = bx - 1; x < bx + boxW + 1 && x < W; x++)
          //     if (x >= 0) grid.set(x, y, " ", null);
          // Draw boxes top to bottom, offset by speaker
          const offset = Math.min(6, Math.floor(boxW / 4));
          const bxL = Util.clamp(bx - offset, 0, W - boxW);
          const bxR = Util.clamp(bx + offset, 0, W - boxW);
          let cy = Math.max(0, topY);
          for (const box of allBoxes) {
            if (cy + box.lines.length + 2 > H) break;
            const xPos = box.side === "them" ? bxR : bxL;
            // Clear behind this box
            for (let y = cy; y < cy + box.lines.length + 2 && y < H; y++)
              for (let x = xPos; x < xPos + boxW && x < W; x++) if (x >= 0) grid.set(x, y, " ", null);
            if (box.isChoice) {
              convChoiceY1 = cy;
              convChoiceBX = xPos;
              convChoiceBW = boxW;
            }
            grid.text(CONV_BOX.tl + CONV_BOX.h.repeat(boxW - 2) + CONV_BOX.tr, xPos, cy, box.color);
            cy++;
            for (let li = 0; li < box.lines.length; li++) {
              grid.text(CONV_BOX.v + " ".repeat(boxW - 2) + CONV_BOX.v, xPos, cy, box.color);
              if (box.lines[li] === "") {
                cy++;
                continue;
              }
              /* Choices: left-aligned with two shades + hover. Regular: centered. */
              const pad = box.isChoice ? 0 : Math.floor((innerW - box.lines[li].length) / 2);
              let lineCol = box.color;
              if (box.isChoice) {
                /* Figure out which choice this line belongs to */
                let choiceIdx = 0,
                  linesCount = 0;
                for (let ci = 0; ci < (convChoices || []).length; ci++) {
                  const cWords = ("\u25B6 " + convChoices[ci]).split(" ");
                  let cLines = [];
                  let cc = "";
                  for (const w of cWords) {
                    if (cc.length + w.length + 1 > innerW) {
                      cLines.push(cc);
                      cc = "  " + w;
                    } else cc = cc ? cc + " " + w : w;
                  }
                  if (cc) cLines.push(cc);
                  if (li >= linesCount && li < linesCount + cLines.length) {
                    choiceIdx = ci;
                    break;
                  }
                  linesCount += cLines.length + 1;
                }
                lineCol = choiceIdx === 0 ? "#c8a070" : "#8a9ab0";
                if (convChoiceHover === choiceIdx) lineCol = "#fff";
              }
              grid.text(box.lines[li], xPos + 2 + Math.max(0, pad), cy, lineCol);
              cy++;
            }
            grid.text(CONV_BOX.bl + CONV_BOX.h.repeat(boxW - 2) + CONV_BOX.br, xPos, cy, box.color);
            if (box.isChoice) {
              convChoiceY2 = cy;
            }
            // remove to remove  extra gap — boxes stack tight for comic-book feel */
            cy++;
          }

          // Short tails pointing to characters
          // if (cy < H) {
          //   const tailL = Util.clamp(psx, bx + 1, bx + boxW - 2);
          //   const tailR = Util.clamp(nsx, bx + 1, bx + boxW - 2);
          //   grid.set(tailL, cy, "\\", convPlayerColor);
          //   grid.set(tailR, cy, "/", convNPCColor);
          // }
        }

        function dialogRender() {
          const maxBoxW = Math.min(Math.floor(W / 2) + 4, 34);
          let nextY = H;
          for (let i = dialogStack.length - 1; i >= 0; i--) {
            const d = dialogStack[i];
            const mxW = maxBoxW - 4;
            const words = d.text.split(" "),
              lines = [];
            let cur = "";
            for (const w of words) {
              if (cur.length + w.length + 1 > mxW) {
                lines.push(cur);
                cur = w;
              } else cur = cur ? cur + " " + w : w;
            }
            if (cur) lines.push(cur);
            const boxH = lines.length + 2;
            const boxW = Math.min(maxBoxW, Math.max(...lines.map((l) => l.length)) + 4);
            // Left speaker: box anchored near left side of screen, close to anchor
            // Right speaker: box anchored near right side, close to anchor
            let bx;
            if (d.side === "left") {
              bx = Util.clamp(d.ax - boxW + 3, 0, W - boxW);
            } else if (d.side === "right") {
              bx = Util.clamp(d.ax - 3, 0, W - boxW);
            } else {
              bx = Util.clamp(Math.floor(d.ax - boxW / 2), 0, W - boxW);
            }
            // Stack: keep boxes close together, 1 row gap
            let by;
            if (i === dialogStack.length - 1) {
              by = Util.clamp(d.ay - boxH, 1, H - boxH);
            } else {
              by = Util.clamp(nextY - boxH - 1, 1, H - boxH);
            }
            nextY = by;
            // Clear background behind box
            for (let y = by; y < by + boxH && y < H; y++) for (let x = bx; x < bx + boxW && x < W; x++) grid.set(x, y, " ", null);
            grid.text(DIALOG_BOX.tl + DIALOG_BOX.h.repeat(boxW - 2) + DIALOG_BOX.tr, bx, by, d.color);
            for (let j = 0; j < lines.length; j++) {
              grid.text(DIALOG_BOX.v + " ".repeat(boxW - 2) + DIALOG_BOX.v, bx, by + 1 + j, d.color);
              grid.text(lines[j], bx + 2, by + 1 + j, d.color);
            }
            grid.text(DIALOG_BOX.bl + DIALOG_BOX.h.repeat(boxW - 2) + DIALOG_BOX.br, bx, by + 1 + lines.length, d.color);
          }
        }

        /* ── DIALOGUE POOLS ────────────────────────────────────── */

        const P_GREET = [
          "hey. you okay?",
          "rough out here, huh?",
          "you tired of this too?",
          "how are you holding up?",
          "hey. what's going on?",
          "you look like you get it.",
          "hey. got a minute?",
          "you from around here?",
          "hey neighbour.",
          "you look fed up too.",
          "salut. ça va?",
          "long day?",
          "real talk?",
          "you eating okay?",
          "hey. I know that look.",
        ];

        const P_REC = [
          "you seen the price of bread lately?",
          "$6 for tofu. Can you believe it?",
          "I can't afford to live. Can you?",
          "did you know that grocery profits are up 40%",
          "the Westons pocketed $2 billion",
          "bread is SIX dollars",
          "they throw food in the dumpsters every night.",
          "we're not keeping it together",
          "I used to eat three meals a day.",
          "my landlord raised rent again.",
          "they locked the dumpsters now.",
          "eggs are $9. EGGS.",
          "food bank ran out by Tuesday.",
          "the shelves are full but our fridges are empty.",
        ];
        const D_JOIN = [
          "I'm in",
          "let's do this",
          "I'm IN",
          "allons-y!",
          "I've nothing left to lose",
          "for the neighbourhood!",
          "say less. I'm in",
          "about damn time",
          "finally someone is doing something",
          "when do we start?",
          "you had me at robin hood",
          "I'll bring my tote bag",
          "let's eat!",
          "count me in, tabarnak",
          "I knew someone would snap eventually",
          "okay. okay! let's go.",
        ];
        const D_MULTI = [
          "hmm...tell me more?",
          "that's intense...",
          "I don't know",
          "keep talking...",
          "you serious?",
          "wait, really?",
          "go on...",
          "I'm listening...",
          "that's a lot to take in...",
          "hmmm...",
        ];
        const D_NARC = [
          "I'm calling 911!",
          "just get another job!!",
          "that's THEFT!",
          "I OWN stocks in Loblaws!",
          "just tighten your belt",

        /* ── SHARED: city grid (Act 1) ─────────────────────────── */
        const HA = [
          ["^", "\u25A1"],

        const HC = ["#3a3535", "#353a35", "#35353a", "#3a3838", "#383a38", "#38383a"];
        const HH = 2,

          RDW = 3,

        const BW = HPS * HW,
          BH = HH * 2 + RUH,
          CW = BW + RDW,
          CH = BH + RDH;

        function renderCity(cx, cy) {
          for (let sy = 0; sy < H; sy++)
            for (let sx = 0; sx < W; sx++) {
              const mx = Math.floor(cx) + sx,
                my = Math.floor(cy) + sy;
              const lx = ((mx % CW) + CW) % CW,
                ly = ((my % CH) + CH) % CH;
              const inB = lx < BW && ly < BH;
              const inRuelle = inB && ly >= HH && ly < HH + RUH;
              if (!inB) {
                if (ly === BH && lx < BW) grid.set(sx, sy, "\u2550", "#333");
                else if (ly === CH - 1 && lx < BW) grid.set(sx, sy, "\u2550", "#333");
                else if (lx === BW && ly < BH) grid.set(sx, sy, "\u2551", "#333");
                else if (lx === CW - 1 && ly < BH) grid.set(sx, sy, "\u2551", "#333");
                else if (lx === BW && ly === BH) grid.set(sx, sy, "\u255D", "#333");
                else if (lx === CW - 1 && ly === BH) grid.set(sx, sy, "\u255A", "#333");
                else if (lx === BW && ly === CH - 1) grid.set(sx, sy, "\u2557", "#333");
                else if (lx === CW - 1 && ly === CH - 1) grid.set(sx, sy, "\u2554", "#333");
              } else if (inRuelle) {
                /* Clean ruelles — no dots */
              } else {
                const hr = ly < HH ? 0 : 1,
                  hly = hr === 0 ? ly : ly - HH - RUH;
                const bc = ((Math.floor(mx / CW) % 30) + 30) % 30,
                  br = ((Math.floor(my / CH) % 30) + 30) % 30;
                const hi = Math.floor(lx / HW),
                  ai = (bc + br + hi + hr * 2) % HA.length,
                  ci = (bc * 3 + br * 7 + hi * 5 + hr) % HC.length;
                if (hly < HA[ai].length) {
                  const ch = HA[ai][hly];
                  if (ch !== " ") grid.set(sx, sy, ch, HC[ci]);
                }
              }
            }
        }

        function isRoad(wx, wy) {
          const lx = ((wx % CW) + CW) % CW,
            ly = ((wy % CH) + CH) % CH;
          if (lx >= BW || ly >= BH) return true;
          if (ly >= HH && ly < HH + RUH) return true;
          return false;
        }
        function hRoadY(row) {

        const A1_PSX_RATIO = 0.5,

        /* Array-of-turns encounter format */
        const A1E = [

        function initAct1() {
          phase = "act1";

          // Ambient NPCs
          a1AmbNPCs = [];
          const a1PlayerPathYs = new Set();

        function updateAct1(dt) {

            const tg = a1Path[a1PI + 1],

              a1Path = [{ x: a1PX, y: a1PY }, ...np];

          } else if (a1St === "tap") {

              if (clickSY >= convChoiceY1 && clickSY < splitY) {

            a1ST2 += dt;
            if (!a1DescPath) {
              // Build a path: go right to nearest vertical road, then down, then right a bit
              const curX = Math.round(a1PX);
              const curY = Math.round(a1PY);
              const nextVRoad = vRoadX(Math.floor(curX / CW) + 1);

                { x: nextVRoad, y: targetHRoad },
                { x: nextVRoad + 12, y: targetHRoad },
              ];
              a1DescPI = 0;
            }
            if (a1DescPI < a1DescPath.length) {
              const tg = a1DescPath[a1DescPI];
              const dx = tg.x - a1PX,
                dy = tg.y - a1PY;
              const d = Math.sqrt(dx * dx + dy * dy);
              if (d < 0.5) {
                a1PX = tg.x;

              a1ST2 = 0;
            }
          } else if (a1St === "loop") {
            if (a1PI >= a1Path.length - 1) {
              a1EI = 0;
              a1EncNPC = null;
              a1NP = 0;
              dialogStack = [];
              bannerTimer = 0;
              a1Path = [
                { x: a1PX, y: a1PY },
                { x: a1NPCs[0].x - 2, y: a1NPCs[0].y },
              ];
              a1PI = 0;
              a1St = "walk";
              a1ST2 = 0;
            } else {
              const tg = a1Path[a1PI + 1],
                dx = tg.x - a1PX,
                dy = tg.y - a1PY,
                d = Math.sqrt(dx * dx + dy * dy);
              if (d < 0.3) {
                a1PX = tg.x;
                a1PY = tg.y;
                a1PI++;
              } else {
                const s = 0.02 * dt;
                a1PX += (dx / d) * s;
                a1PY += (dy / d) * s;
              }
            }
          } else if (a1St === "done") {
            a1ST2 += dt;
            if (a1ST2 > 800) initAct2();
          }
        }

        function renderAct1() {
          renderCity(a1CX, a1CY);
          const ox = Math.floor(a1CX),

          for (const n of a1NPCs) {
            const sx = n.x - ox,

          for (const an of a1AmbNPCs) {

              asy = Math.round(an.y) - oy;

              grid.set(asx, asy, an.ch, an.col);
              if (an.msgT > 0) {
                const txt = an.msg.substring(0, Math.min(an.msg.length, W - 2));
                const tx = Util.clamp(asx - Math.floor(txt.length / 2), 0, W - txt.length);
                if (asy - 1 >= 0) grid.text(txt, tx, asy - 1, "#ccc");

          const px = Math.round(a1PX) - ox,

          convRender();

        function tileBuildings(blockW) {
          const pieces = [];
          let remain = blockW;
          let iter = 0;
          while (remain > 0 && iter++ < 20) {
            const fits = BUILDINGS.filter((b) => b.size <= remain);
            if (fits.length === 0) break;
            const canClean = fits.filter((b) => {
              const r = remain - b.size;
              return r === 0 || r >= 6;
            });
            const pool = canClean.length > 0 ? canClean : fits;
            const b = pool[Math.floor(Math.random() * pool.length)];
            pieces.push({ art: b.art, w: b.size });
            remain -= b.size;
          }
          return pieces;
        }
        /* Washed-out building colors — muted pastels so avatars pop */
        const A2_BCOL = ["#b9a89a", "#9ab89a", "#9a9ab8", "#b8a09a", "#9aa8b0", "#a89ab0", "#b0a898", "#98a8b0"];
        const A2_PA = [

        const A2_NPC = ["\u03BF", "\u235E"];
        const A2_NARC = ["\u03BF", "\u235E"];
        const A2_ROB = ["@", "\u0126"];

        /* 6 lanes */
        const A2_NUM_LANES = 3;
        let A2_RU_H = 3,
          A2_VRW = 7;

        let A2_BH_PER, A2_LANE_YS, A2_GND;
        let a2WX, a2T, a2Ht, a2Spd;
        let a2Blocks, a2Roads, a2NPCs, a2Crew, a2Clouds;
        let a2PX, a2PY, a2PRu, a2PAnim, a2PAnimT, a2TargetY, a2Hopping;
        let a2HopIntent, a2HopTimer;
        let a2TN, a2TP, a2TT, a2TalkCD, a2Choice, a2ChoiceLabels;
        let a2SV, a2SW, a2SD, a2SDT, a2StoreAutoGuide, a2StorePromptT;
        let a2Gen;
        let a2HudFlashT, a2HudFlashMsg; // HUD flash

        function a2Layout() {
          /* City grid: alternating building-row / street-row.
             4 streets, 5 building bands. Streets are 2 rows.
             Remaining space split evenly across building bands. */
          A2_GND = H - 1;
          A2_RU_H = 2;
          const totalStreetH = A2_NUM_LANES * A2_RU_H;
          const numBands = A2_NUM_LANES + 1;
          A2_BH_PER = Math.max(4, Math.floor((A2_GND - totalStreetH) / numBands));
          A2_LANE_YS = [];
          for (let i = 0; i < A2_NUM_LANES; i++) {
            A2_LANE_YS.push((i + 1) * A2_BH_PER + i * A2_RU_H);
          }
        }

        function a2RuY(ri) {
          return A2_LANE_YS[ri] || A2_LANE_YS[0];
        }
        function a2NpcY(n) {
          return a2RuY(n.ru);
        }

        function a2BandY(bi) {
          if (bi <= A2_NUM_LANES) {
            const y = bi * (A2_BH_PER + A2_RU_H);
            return { y, h: A2_BH_PER };
          }
          return { y: A2_GND - 2, h: 2 };
        }

        function a2GenChunk(from, to) {
          const lastRoadX = a2Roads.length > 0 ? a2Roads[a2Roads.length - 1].wx : -999;
          let rx = Math.max(from, lastRoadX + Util.randInt(30, 50));
          while (rx < to) {
            a2Roads.push({ wx: rx });
            rx += Util.randInt(30, 50);
          }
          a2Roads.sort((a, b) => a.wx - b.wx);
          const nearRoads = a2Roads.filter((r) => r.wx + A2_VRW > from - 80 && r.wx < to + 40);
          const roadXs = [-999, ...nearRoads.map((r) => r.wx), 99999];
          for (let ri = 0; ri < roadXs.length - 1; ri++) {
            const leftE = roadXs[ri] + (roadXs[ri] === -999 ? 999 : A2_VRW);
            const rightE = Math.min(roadXs[ri + 1], to);
            if (rightE <= from || leftE >= to || rightE - leftE < 8) continue;
            const overlap = a2Blocks.find((b) => b.band === 0 && b.wx < rightE && b.wx + b.w > leftE);
            if (overlap) {
              console.log("SKIP", leftE, rightE, "overlaps with", overlap.wx, overlap.wx + overlap.w);
              continue;
            }
            /* Building bands for 6+1 bands */
            for (let band = 0; band <= A2_NUM_LANES; band++) {
              const { y: bandY, h: bandH } = a2BandY(band);
              if (bandH < 2) continue;
              console.log("BLOCK", band, leftE, rightE, rightE - leftE);
              a2Blocks.push({ wx: leftE, y: bandY, w: rightE - leftE, h: bandH, band, bldgs: [] });
              const blk = a2Blocks[a2Blocks.length - 1];
              const availW = rightE - leftE - 2;
              const tiles = tileBuildings(availW);
              let bx = leftE + 1;
              for (const tile of tiles) {
                blk.bldgs.push({ dx: bx - leftE, art: tile.art, color: Util.pick(A2_BCOL), w: tile.w });
                bx += tile.w;
              }
            }
          }
          /* NPCs across all 6 lanes */
          for (let ri = 0; ri < A2_NUM_LANES; ri++) {
            for (let nx = from + Util.randInt(20, 35); nx < to; nx += Util.randInt(25, 45)) {
              let onRoad = false;
              for (const rd of a2Roads) if (nx >= rd.wx - 1 && nx <= rd.wx + A2_VRW + 1) onRoad = true;
              if (onRoad) continue;
              const r = Math.random();
              let tp, tl;
              if (r < 0.13) {
                tp = "narc";
                tl = 0;
              } else if (r < 0.42) {
                tp = "resist";
                tl = 1;
              } else {
                tp = "norm";
                tl = 1;
              }
              const npcKind = Math.random() < 0.5 ? "hungry" : "angry";
              /* Narc ambient tells */
              const ambLine = tp === "narc" ? Util.pick(D_AMB_NARC) : npcKind === "hungry" ? Util.pick(D_AMB_HUNGRY) : Util.pick(D_AMB_ANGRY);
              const npcArt = tp === "narc" ? ["%", "\u03C6"] : Util.pick(A2_NPC_ARTS);
              const npcCol = tp === "narc" ? "#b99" : Util.pick(A2_NPC_COLORS);
              a2NPCs.push({
                wx: nx,
                ru: ri,
                tp,
                tl,
                st: "idle",
                sp: "",
                spT: 0,
                col: npcCol,
                cd: 0,
                kind: npcKind,
                amb: ambLine,
                ambShow: false,
                art: npcArt,
              });
            }
          }
          // Clouds
          for (let cx = from + Util.randInt(8, 20); cx < to; cx += Util.randInt(20, 40))
            a2Clouds.push({
              wx: cx,
              y: Util.randInt(0, 1),
              art: Util.pick([
                [".-~~~-.", "(      )", " `~~~' "],
                [".-~~-.", "(     )", " `~~' "],
              ]),
            });
          a2Gen = to;
        }

        function initAct2() {
          phase = "act2";
          hasPlayed = true;
          a2Layout();
          a2CrewCount = 0;
          a2Ht = 0;
          a2T = 0;
          a2Spd = 0.006;
          a2WX = 0;

          a2Clouds = [];
          a2Gen = 0;

          a2HudFlashMsg = "";
          a2PRu = Math.max(0, A2_NUM_LANES - 2);
          a2PX = Math.floor(W / 2);
          a2PY = a2RuY(a2PRu) + Math.floor(A2_RU_H / 2);
          a2TargetY = a2PY;
          a2Hopping = false;
          a2HopIntent = 0;
          a2HopTimer = 0;
          a2PAnim = 0;
          a2PAnimT = 0;
          a2TN = null;
          a2TP = 0;
          a2TT = 0;
          a2TalkCD = 3000;
          a2SV = false;
          a2SW = 500;
          a2SD = false;
          a2SDT = null;
          a2StoreAutoGuide = false;
          a2StorePromptT = 0;
          dialogStack = [];
          a2GenChunk(0, W * 3);
          hudLabel.textContent = "CREW";
          hudScore.textContent = "0";
          hudStatus.textContent = "Tap \u25B2\u25BC to move!";
          hudStatus.style.color = "#2a7a2a";
          bannerTimer = 0;
          showBanner("Recruit your crew.", "#e8944a", 2500);
        }

        function updateAct2(dt) {
          if (!a2TN) a2T += dt; /* freeze game clock during conversations */
          updateBanner(dt);
          dialogUpdate(dt);
          if (a2TalkCD > 0) a2TalkCD -= dt;
          if (a2HudFlashT > 0) a2HudFlashT -= dt;
          for (const n of a2NPCs) {
            if (n.spT > 0) n.spT -= dt;
            if (n.cd > 0) n.cd -= dt;
          }
          a2PAnimT += dt;
          if (a2PAnimT > 250) {
            a2PAnimT = 0;
            a2PAnim = 1 - a2PAnim;
          }

          // Conversation (scroll pauses)
          if (a2TN) {
            a2TT += dt;
            const psx = Math.round(a2PX),
              nsx = Math.round(a2TN.wx - a2WX);
            const psy = Math.round(a2PY),
              nsy = a2NpcY(a2TN);
            if (a2TP === 0 && a2TT > 400) {
              dialogStack = [];
              convReset();
              convAnchorPX = Math.round(a2PX);
              convAnchorNX = Math.round(a2TN.wx - a2WX);
              convAnchorY = Math.round(a2PY);
              convPlayerColor = C_PLAYER;
              convNPCColor = a2TN.col || "#7a8aaa";
              convVisible = true;
              // Player speaks first with a greeting
              convAddLine(Util.pick(P_GREET), "you", convPlayerColor);
              a2TP = 12;
              a2TT = 0;
              a2Choice = -1;
            } else if (a2TP === 12 && a2TT > 1200) {
              // NPC responds with their mood line
              const opener = a2TN.tp === "narc" ? Util.pick(D_AMB_NARC) : a2TN.amb;
              convAddLine(opener, "them", convNPCColor);
              // Prepare choices after a pause
              if (a2TN.kind === "hungry") {
                a2ChoiceLabels = [Util.pick(PITCH_HUNGRY), Util.pick(PITCH_ANGRY)];
              } else {
                a2ChoiceLabels = [Util.pick(PITCH_ANGRY), Util.pick(PITCH_HUNGRY)];
              }
              a2TP = 13;
              a2TT = 0;
            } else if (a2TP === 13 && a2TT > 1000) {
              // Show choices
              convShowChoices(a2ChoiceLabels);
              a2TP = 1;
              a2TT = 0;
            } else if (a2TP === 1 && a2TT > 800) {
              if (clickPending) {
                clickPending = false;
                const splitY = Math.floor((convChoiceY1 + convChoiceY2) / 2);
                if (clickSY >= convChoiceY1 && clickSY <= convChoiceY2) {
                  if (clickSY < splitY) a2Choice = 0;
                  else a2Choice = 1;
                }
              }
              if (input.isDown("up")) a2Choice = 0;
              if (input.isDown("down")) a2Choice = 1;
              if (a2Choice >= 0) {
                const chosenLine = a2ChoiceLabels[a2Choice];
                convHideChoices();
                convAddLine(chosenLine, "you", convPlayerColor);
                a2TP = 2;
                a2TT = 0;
              }
            } else if (a2TP === 2 && a2TT > 1200) {
              const n = a2TN;
              const matched = (a2Choice === 0 && n.kind === "hungry") || (a2Choice === 1 && n.kind === "angry");
              if (n.tp !== "narc" && matched) {
                /* Easy yes — they respond enthusiastically */
                convAddLine(Util.pick(D_JOIN), "them", convNPCColor);
                a2TP = 14; /* new state: wait for confirming line */
              } else {
                /* Narc, resist, or wrong pitch — suspicious pause */
                convAddLine(Util.pick(["hmm...", "interesting...", "oh really...", "go on...", "I dunno about that..."]), "them", convNPCColor);
                a2TP = 11;
              }
              a2TT = 0;
            } else if (a2TP === 7 && a2TT > 2500) {
              a2TN.st = "done";
              a2TN.col = "#666";
              a2TN.cd = 9999;
              a2TN = null;
              a2TalkCD = 500;
              setTimeout(() => {
                dialogStack = [];
                convReset();
              }, 1000);
            } else if (a2TP === 8 && a2TT > 2500) {
              const n = a2TN;
              n.st = "rec";
              /* NPC keeps their original color */
              a2CrewCount++;
              a2Crew.push({ b: Math.random() * 6, ru: n.ru, art: n.art || A2_NPC });
              a2HudFlashT = 1500;
              a2HudFlashMsg = "+" + a2CrewCount + "!";
              showBanner(Util.pick(["New Robin!", "They're in!", "One more Robin!", "Crew grows!"]), "#5cbdbd", 1500);
              a2TN.cd = 1000;
              a2TN = null;
              a2TalkCD = 500;
              setTimeout(() => {
                dialogStack = [];
                convReset();
              }, 1000);
            } else if (a2TP === 9 && a2TT > 2500) {
              const n = a2TN;
              n.st = "angry";
              n.col = "#c33";
              a2Ht++;
              showBanner("That was a NARC!", "#c33", 1500);
              if (a2Ht >= A2_MH) setTimeout(() => endGame("busted"), 2000);
              a2TN.cd = 1000;
              a2TN = null;
              a2TalkCD = 500;
              setTimeout(() => {
                dialogStack = [];
                convReset();
              }, 1500);
            } else if (a2TP === 11 && a2TT > 800 && !convChoices) {
              convShowChoices(["oh well, what can you do", "what if it actually worked though?"]);
              a2Choice = -1;
            } else if (a2TP === 11 && convChoices) {
              if (clickPending) {
                clickPending = false;
                const splitY = Math.floor((convChoiceY1 + convChoiceY2) / 2);
                if (clickSY >= convChoiceY1 && clickSY <= convChoiceY2) {
                  a2Choice = clickSY < splitY ? 0 : 1;
                }
              }
              if (input.justPressed("up")) a2Choice = 0;
              if (input.justPressed("down")) a2Choice = 1;
              if (a2Choice === 0) {
                /* Back away safely */
                convHideChoices();
                convAddLine("oh well, what can you do", "you", convPlayerColor);
                a2TN.st = "done";
                a2TN.col = "#555";
                a2TN.cd = 9999;
                a2TN = null;
                a2TalkCD = 500;
                showBanner(Util.pick(["Played it safe.", "Dodged that one.", "Better safe than sorry."]), "#a80", 1200);
                setTimeout(() => {
                  dialogStack = [];
                  convReset();
                }, 800);
              } else if (a2Choice === 1) {
                /* Commit — outcome depends on NPC type */
                convHideChoices();
                convAddLine("what if it actually worked though?", "you", convPlayerColor);
                a2TP = 15;
                a2TT = 0;
              } else if (a2TT > 6000) {
                /* Timeout — auto-reveal */
                convHideChoices();
                if (a2TN.tp === "narc") {
                  convAddLine(Util.pick(D_NARC), "them", "#c44");
                  a2TP = 9;
                } else {
                  convAddLine(Util.pick(["not for me.", "nah.", "sorry."]), "them", convNPCColor);
                  a2TP = 7;
                }
                a2TT = 0;
              }
            } else if (a2TP === 15 && a2TT > 1200) {
              /* Committed to risky NPC — resolve based on type */
              const n = a2TN;
              if (n.tp === "narc") {
                convAddLine(Util.pick(D_NARC), "them", "#c44");
                a2TP = 9;
              } else if (n.tp === "resist") {
                /* Pressing sometimes works! ~50% chance they join */
                if (Math.random() < 0.5) {
                  convAddLine(
                    Util.pick(["...you know what, fine. I'm in.", "okay okay, you convinced me.", "ugh, alright. let's do it."]),
                    "them",
                    convNPCColor,
                  );
                  a2TP = 8;
                } else {
                  convAddLine(
                    Util.pick([
                      "maybe another time...",
                      "I hear you but... not now",
                      "it's a good idea but I can't right now",
                      "I want to but I'm scared",
                    ]),
                    "them",
                    convNPCColor,
                  );
                  a2TP = 10;
                }
              } else {
                convAddLine(Util.pick(["hmm... not convinced.", "not sure that's for me."]), "them", convNPCColor);
                a2TP = 7;
              }
              a2TT = 0;
            } else if (a2TP === 10 && a2TT > 2500) {
              const n = a2TN;
              n.st = "maybe";
              n.col = n.col;
              n.cd = 9999;
              a2TN = null;
              a2TalkCD = 500;
              showBanner(
                Util.pick([
                  "Didn't win that one... but maybe they'll come around.",
                  "Not yet. But they're thinking about it.",
                  "They need time. Maybe they'll show up later.",
                ]),
                "#a80",
                2000,
              );
              setTimeout(() => {
                dialogStack = [];
                convReset();
              }, 1000);
              setTimeout(
                () => {
                  if (n.st === "maybe") {
                    n.st = "rec";
                    a2CrewCount++;
                    a2Crew.push({ b: Math.random() * 6, ru: n.ru, art: n.art || A2_NPC });
                    a2HudFlashT = 1500;
                    a2HudFlashMsg = "+" + a2CrewCount + "!";
                    hudScore.textContent = a2CrewCount;
                    showBanner(Util.pick(["A straggler changed their mind!", "Someone came back!", "Late recruit!"]), "#5cbdbd", 1500);
                  }
                },
                3000 + Math.random() * 2000,
              );
            } else if (a2TP === 14 && a2TT > 1200) {
              /* Confirming line after easy-yes */
              convAddLine(Util.pick(["count me in.", "I'm in.", "let's do this.", "say less."]), "them", convNPCColor);
              a2TP = 8;
              a2TT = 0;
            }
            hudScore.textContent = a2CrewCount;
            return;
          }

          if (a2SD) {
            if (!a2SDT) {
              a2SDT = 0;
              /* No jarring banner — just a quiet beat before the scene shifts */
            }
            a2SDT += dt;
            if (a2SDT > 1200) {
              initAct2b();
            }
            return;
          }

          if (!a2SV && a2CrewCount >= A2_MIN) {
            a2SV = true;
            a2SD = true;
          }

          // Scroll
          a2Spd = 0.004 + a2T * 0.00000015;
          a2WX += a2Spd * dt;
          while (a2Gen < a2WX + W + 150) a2GenChunk(a2Gen, a2Gen + 80);

          /* Hop between lanes — queued, executes at gaps */
          if (input.isDown("up")) {
            a2HopIntent = -1;
            a2HopTimer = 3000;
          }
          if (input.isDown("down")) {
            a2HopIntent = 1;
            a2HopTimer = 3000;
          }
          if (clickPending && phase === "act2") {
            clickPending = false;
            const py = Math.round(a2PY);
            if (clickSY < py - 2) {
              a2HopIntent = -1;
              a2HopTimer = 3000;
            } else if (clickSY > py + 2) {
              a2HopIntent = 1;
              a2HopTimer = 3000;
            }
          }
          if (a2HopTimer > 0) a2HopTimer -= dt;
          if (a2HopTimer <= 0) a2HopIntent = 0;
          if (a2HopIntent !== 0 && !a2Hopping) {
            const pwx = Math.round(a2WX + a2PX);
            let atGap = false;
            for (const rd of a2Roads) {
              if (pwx >= rd.wx - 1 && pwx <= rd.wx + A2_VRW + 1) {
                atGap = true;
                break;
              }
            }
            if (!atGap) {
              for (const blk of a2Blocks) {
                if (Math.abs(pwx - blk.wx) <= 2 || Math.abs(pwx - (blk.wx + blk.w)) <= 2) {
                  atGap = true;
                  break;
                }
              }
            }
            if (atGap) {
              const newRu = Util.clamp(a2PRu + a2HopIntent, 0, A2_NUM_LANES - 1);
              if (newRu !== a2PRu) {
                a2PRu = newRu;
                a2PY = a2RuY(a2PRu) + Math.floor(A2_RU_H / 2);
                a2Hopping = false;
                a2HopIntent = 0;
                a2HopTimer = 0;
              }
            }
          }
          if (input.isDown("left")) a2PX -= 0.02 * dt;
          if (input.isDown("right")) a2PX += 0.02 * dt;
          a2PX = Util.clamp(a2PX, 4, W - 6);

          // Cleanup
          a2Blocks = a2Blocks.filter((b) => b.wx + b.w > a2WX - W);
          a2Roads = a2Roads.filter((r) => r.wx + A2_VRW > a2WX - W - 10);
          a2NPCs = a2NPCs.filter((n) => n.wx > a2WX - 20);
          a2Clouds = a2Clouds.filter((c) => c.wx + 10 > a2WX - W);

          // Show ambient mutters for nearby NPCs (suppress first 3s)
          const pwx2 = a2WX + a2PX;
          for (const n of a2NPCs) {
            if (n.st !== "idle") continue;
            if (n.ru !== a2PRu) continue;
            const dist = Math.abs(n.wx - pwx2);
            if (dist < 18 && dist > 3 && a2T > 3000) {
              n.ambShow = true;
            } else {
              n.ambShow = false;
            }
          }
          // Collision with NPCs — 3s grace period at start
          if (a2TalkCD <= 0 && a2T > 3000) {
            const pwx = a2WX + a2PX;
            for (const n of a2NPCs) {
              if (n.st !== "idle") continue;
              if (n.cd > 0) continue;
              if (n.ru !== a2PRu) continue;
              if (Math.abs(n.wx - pwx) < 3) {
                a2TN = n;
                a2TP = 0;
                a2TT = 0;
                a2Choice = -1;
                break;
              }
            }
          }

          hudLabel.textContent = "CREW";
          /* Flash HUD on recruit */
          if (a2HudFlashT > 0) {
            hudScore.textContent = a2HudFlashMsg;
            hudScore.style.color = "#2a2";
          } else {
            hudScore.textContent = a2CrewCount;
            hudScore.style.color = "#c33";
          }
          if (a2SV) hudStatus.textContent = "Store: " + Math.max(0, Math.floor((a2SW - a2WX) / 3)) + "m";
          else if (a2CrewCount < A2_MIN) hudStatus.textContent = "Need " + (A2_MIN - a2CrewCount) + " more";
          else hudStatus.textContent = "Keep going!";
          if (a2Ht > 0) hudStatus.textContent += " | HEAT:" + a2Ht + "/" + A2_MH;
          hudStatus.style.color = a2Ht >= 2 ? "#c33" : "#2a7a2a";
        }

        function renderAct2() {
          for (let ri = 0; ri < A2_NUM_LANES; ri++) {
            const ry = a2RuY(ri);
            /* Clean roads — no dot texture */
          }
          // Blocks — bottom sidewalk only, buildings bottom-aligned above it
          for (const blk of a2Blocks) {
            const sx = Math.round(blk.wx - a2WX);
            if (sx + blk.w < -1 || sx > W + 1) continue;
            const bx1 = sx,
              bx2 = sx + blk.w - 1,
              by2 = blk.y + blk.h - 1;
            // Bottom sidewalk: ╚═══════════╝
            if (by2 >= 0 && by2 < H) {
              if (bx1 >= 0 && bx1 < W) grid.set(bx1, by2, "\u255A", "#ccc");
              if (bx2 >= 0 && bx2 < W) grid.set(bx2, by2, "\u255D", "#ccc");
              for (let x = bx1 + 1; x < bx2; x++) {
                if (x >= 0 && x < W) grid.set(x, by2, "\u2550", "#ccc");
              }
            }
            // Buildings bottom-aligned just above the sidewalk
            for (const b of blk.bldgs) {
              const bsx = sx + b.dx;
              const maxH = blk.h - 1; // leave room for sidewalk row
              const artToRender = b.art.length > maxH ? b.art.slice(b.art.length - maxH) : b.art;
              const bsy = by2 - artToRender.length;
              grid.art(artToRender, bsx, bsy, b.color);
            }
          }
          // Vertical roads — clean open gaps between block columns
          for (const rd of a2Roads) {
            const sx = Math.round(rd.wx - a2WX);
            if (sx + A2_VRW < -1 || sx > W + 2) continue;
            for (let y = 0; y < A2_GND; y++)
              for (let rx = 0; rx < A2_VRW; rx++) {
                const xx = sx + rx;
                if (xx >= 0 && xx < W) grid.set(xx, y, " ", null);
              }
          }

          // NPCs — hide recruited ones (they're now in the crew trail)
          for (const n of a2NPCs) {
            if (n.st === "rec") continue;
            const sx = Math.round(n.wx - a2WX),
              sy = a2NpcY(n);
            if (sx < -3 || sx > W + 3) continue;
            let col = n.st === "angry" ? "#c44" : n.st === "done" ? "#333" : n.col;
            /* Narcs don't fidget (stand still / stiff) */
            let fidget = 0;
            if (n.tp !== "narc" && n.st === "idle") fidget = Math.round(Math.sin(a2T / 400 + n.wx * 3) * 0.6);
            /* Warning flash during narc bail-out window */
            if (a2TN === n && a2TP === 11) {
              col = Math.floor(a2TT / 150) % 2 === 0 ? "#c88" : "#f66";
            }
            const art = n.art || A2_NPC;
            grid.art(art, sx + fidget, sy, col);
          }
          // Crew trailing
          const ppx = Math.round(a2PX),
            ppy = Math.round(a2PY);
          for (let i = 0; i < a2Crew.length; i++) {
            const cx2 = ppx - 3 - i * 3,
              cy2 = ppy;
            const bob = Math.sin(Date.now() / 300 + a2Crew[i].b) * 0.3;
            if (cx2 >= 0 && cx2 + 3 < W) grid.art(a2Crew[i].art || A2_ROB, cx2, Math.round(cy2 + bob), "#3a9a3a");
          }
          // Player — glow effect at start
          const playerCol = a2T < 3000 ? (Math.floor(a2T / 150) % 2 === 0 ? "#fff" : C_PLAYER) : C_PLAYER;
          grid.art(A2_PA[a2PAnim], ppx, ppy, playerCol);

          // Ambient mutters above nearby NPCs
          for (const n of a2NPCs) {
            if (!n.ambShow || n.st !== "idle") continue;
            const nsx = Math.round(n.wx - a2WX),
              nsy = a2NpcY(n);
            if (nsx >= 0 && nsx < W - 5) {
              const txt = n.amb.substring(0, Math.min(n.amb.length, W - nsx - 1));
              grid.text(txt, nsx - Math.floor(txt.length / 2), nsy - 3, "#bbb");
            }
          }
          // Dialogue
          dialogRender();
          // Conversation panel (replaces old choice UI)
          convRender();
          /* Heat is shown in the HUD — no in-game overlay needed */
          renderBanner();
        }
